<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kütahya Yeşilay Futbol Okulu | Yönetim</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --yesil: #006a33; --sari: #f1c40f; --dark: #121212; --light: #f8faf9; }
        body, html { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: var(--light); color: #333; font-size: 16px; scroll-behavior: smooth; }

        header { 
            background: linear-gradient(135deg, var(--yesil) 0%, #004d26 100%); color: white; padding: 30px 5%; 
            display: flex; flex-direction: column; align-items: center; 
            border-bottom: 7px solid var(--sari); box-shadow: 0 8px 25px rgba(0,0,0,0.3); 
        }
        @media (min-width: 1024px) { header { flex-direction: row; justify-content: space-between; padding: 30px 80px; } }
        .club-info h1 { font-size: 2.1rem; font-weight: 900; text-transform: uppercase; margin: 0; letter-spacing: 2px; text-shadow: 3px 3px 0 rgba(0,0,0,0.1); }
        nav { margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        nav a { color: white; text-decoration: none; font-weight: 700; font-size: 0.95rem; cursor: pointer; text-transform: uppercase; }
        .admin-trigger { background: var(--sari); color: var(--yesil) !important; padding: 10px 20px; border-radius: 10px; font-weight: 900; border: none; cursor: pointer; }

        .main-content { padding: 35px 5%; box-sizing: border-box; }
        @media (min-width: 1024px) { .main-content { padding: 40px 80px; } }
        .page { display: none; }
        .page.active { display: block; }
        .section-title { font-weight: 900; font-size: 1.8rem; color: var(--yesil); border-left: 12px solid var(--sari); padding-left: 15px; text-transform: uppercase; margin-bottom: 30px; }

        .home-layout { display: flex; flex-direction: column; gap: 35px; }
        @media (min-width: 1024px) { .home-layout { display: grid; grid-template-columns: 3fr 1.2fr; gap: 40px; align-items: start; } }
        .grid-4 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        @media (min-width: 1200px) { .grid-4 { grid-template-columns: repeat(4, 1fr); gap: 20px; } }
        .v-img { width: 100%; height: 260px; object-fit: cover; border-radius: 20px; border: 5px solid white; box-shadow: 0 8px 20px rgba(0,0,0,0.1); cursor: pointer; }

        .ann-sidebar { background: white; padding: 25px; border-radius: 30px; border-top: 10px solid var(--sari); box-shadow: 0 12px 30px rgba(0,0,0,0.06); height: auto; }
        .ann-box { background: #fafafa; padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 6px solid var(--yesil); }

        .contact-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .info-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-top: 6px solid var(--sari); position: relative; }
        .contact-item { font-size: 0.95rem; margin-bottom: 10px; display: flex; justify-content: space-between; font-weight: 600; border-bottom: 1px solid #f0f0f0; }

        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center; }
        #lb-img { max-width: 90%; max-height: 85vh; border: 5px solid white; border-radius: 15px; }
        .lb-close { position: absolute; top: 20px; right: 30px; color: white; font-size: 50px; font-weight: bold; cursor: pointer; }

        /* --- YÖNETİCİ PANELİ (ŞİMDİ DÜZGÜN) --- */
        #admin-panel { display: none; position: fixed; inset: 0; background: #fff; z-index: 5000; flex-direction: column; }
        .admin-nav { background: #1a1a1a; color: white; padding: 12px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid var(--sari); }
        .admin-layout { display: flex; flex: 1; overflow: hidden; }
        .admin-sidebar { background: #262626; width: 240px; padding: 20px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .sidebar-btn { color: #aaa; padding: 12px; cursor: pointer; border-radius: 10px; font-weight: 700; font-size: 0.9rem; }
        .sidebar-btn.active { background: var(--yesil); color: white; }
        .admin-main { flex: 1; padding: 25px; overflow-y: auto; background: #f9f9f9; }
        .admin-card-item { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .btn-panel { background: var(--yesil); color: white; padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: 800; }
        
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 9999; justify-content: center; align-items: center; }
        .modal-box { background: white; padding: 40px; border-radius: 35px; width: 100%; max-width: 380px; border-top: 10px solid var(--sari); text-align: center; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-family: inherit; }
    </style>
</head>
<body>

    <div id="upload-progress-container" style="display:none; position:fixed; top:0; left:0; width:100%; height:6px; background: #eee; z-index: 20000;"><div id="upload-progress-bar" style="width:0%; height:100%; background: var(--yesil); transition: 0.3s;"></div></div>
    
    <div id="lightbox" onclick="closeLB()">
        <span class="lb-close">&times;</span>
        <img id="lb-img" src="" onclick="event.stopPropagation()">
    </div>

    <header>
        <div class="club-info"><h1>KÜTAHYA YEŞİLAY FUTBOL OKULU</h1></div>
        <nav>
            <a onclick="showPage('home')">ANASAYFA</a>
            <a onclick="showPage('groups')">GRUPLAR</a>
            <a onclick="showPage('coaches')">HOCALAR</a>
            <a onclick="showPage('contact')">İLETİŞİM</a>
            <button class="admin-trigger" onclick="openModal('login-modal')">YÖNETİM</button>
        </nav>
    </header>

    <div class="main-content">
        <div id="page-home" class="page active">
            <div class="home-layout">
                <div><h2 class="section-title">ANTRENMANDAN KARELER</h2><div id="p-vit" class="grid-4"></div></div>
                <div class="ann-sidebar"><h3 style="color:var(--yesil); margin-bottom:20px; font-weight:900;">📢 DUYURULAR</h3><div id="p-ann"></div></div>
            </div>
        </div>
        <div id="page-groups" class="page"><h2 class="section-title">Gruplarımız</h2><div id="p-grp" class="grid-4"></div></div>
        <div id="page-coaches" class="page"><h2 class="section-title">Teknik Kadro</h2><div id="p-hoc" class="grid-4"></div></div>
        <div id="page-contact" class="page">
            <div class="section-title">İLETİŞİM & ADRES</div>
            <div class="contact-grid">
                <div class="info-card" id="p-con-list"><h4>Yetkili Rehberi</h4></div>
                <div class="info-card"><h4>Okul Adresi</h4><div id="p-adr-text" style="font-size:0.95rem; color:#555; line-height:1.5;"></div></div>
            </div>
            <div class="section-title">BİZE YAZIN</div>
            <div style="background:white; padding:30px; border-radius:25px; box-shadow:0 10px 30px rgba(0,0,0,0.05); border-left:10px solid var(--yesil); max-width:600px; margin:0 auto;">
                <input type="text" id="v-ad" placeholder="Ad Soyad"><input type="tel" id="v-tel" placeholder="Telefon"><textarea id="v-mesaj" rows="3" placeholder="Mesajınız..."></textarea>
                <button class="btn-panel" style="width:100%" onclick="sendVeliMsg()">GÖNDER</button>
            </div>
        </div>
    </div>

    <div id="admin-panel">
        <div class="admin-nav"><b>YÖNETİCİ KABİNİ</b><button onclick="location.reload()" style="background:red; color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:900;">ÇIKIŞ</button></div>
        <div class="admin-layout">
            <div class="admin-sidebar" id="sidebar-menu"></div>
            <div id="admin-view-content" class="admin-main"></div>
        </div>
    </div>

    <div id="login-modal" class="modal-overlay" onclick="closeModal('login-modal')">
        <div class="modal-box" onclick="event.stopPropagation()">
            <h3 style="color:var(--yesil)">YETKİLİ GİRİŞİ</h3>
            <input type="text" id="u" placeholder="Kullanıcı Adı"><input type="password" id="p" placeholder="Şifre">
            <button class="btn-panel" style="width:100%" onclick="tryLogin()">GİRİŞ YAP</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://yesilay-futbol-okulu-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let db = { vitrin: [], gruplar: [], hocalar: [], duyurular: [], iletisim: { rehber: [], adres: "" }, mesajlar: [] };
        let currentUser = null;

        database.ref('/').on('value', (s) => { 
            if(s.val()) db = s.val(); 
            if(!db.iletisim) db.iletisim = { rehber: [], adres: "" };
            renderAll();
            if(currentUser) adminTab(document.querySelector('.sidebar-btn.active')?.dataset.tab || 'vitrin', document.querySelector('.sidebar-btn.active'));
        });

        function renderAll() {
            const vG = document.getElementById('p-vit'); vG.innerHTML = "";
            (db.vitrin || []).forEach(img => { vG.innerHTML += `<img src="${img}" class="v-img" onclick="openLB('${img}')">`; });
            const aL = document.getElementById('p-ann'); aL.innerHTML = "";
            (db.duyurular || []).slice(0, 4).forEach(a => { aL.innerHTML += `<div class="ann-box"><h4>${a.baslik}</h4><p>${a.metin}</p></div>`; });
            const gG = document.getElementById('p-grp'); gG.innerHTML = "";
            (db.gruplar || []).forEach(g => { gG.innerHTML += `<div class="info-card" style="text-align:center;"><h3>${g.ad}</h3><p style="color:var(--yesil); font-weight:bold;">${g.saat || ''}</p></div>`; });
            const hG = document.getElementById('p-hoc'); hG.innerHTML = "";
            (db.hocalar || []).forEach(h => { hG.innerHTML += `<div class="info-card" style="text-align:center;"><img src="${h.img}" style="width:120px;height:120px;border-radius:50%;object-fit:cover;border:4px solid var(--yesil);margin-bottom:10px;"><h3>${h.ad}</h3><p>${h.unvan || ''}</p></div>`; });
            const cL = document.getElementById('p-con-list'); cL.innerHTML = "<h4>Yetkili Rehberi</h4>";
            (db.iletisim.rehber || []).forEach(c => { cL.innerHTML += `<div class="contact-item">${c.ad} <span>${c.tel}</span></div>`; });
            document.getElementById('p-adr-text').innerHTML = `📍 ${db.iletisim.adres || 'Henüz eklenmemiş.'}`;
        }

        async function compress(b64) {
            return new Promise(r => {
                const img = new Image(); img.src = b64;
                img.onload = () => {
                    const canvas = document.createElement('canvas'); const m = 1200;
                    let w = img.width, h = img.height;
                    if(w > h) { if(w > m) { h *= m/w; w = m; } } else { if(h > m) { w *= m/h; h = m; } }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, w, h);
                    r(canvas.toDataURL('image/jpeg', 0.75));
                };
            });
        }

        function tryLogin() { 
            const u=document.getElementById('u').value.trim().toUpperCase(), p=document.getElementById('p').value.trim().toUpperCase(); 
            if(u==="ALİ" && p==="ALİ43") { currentUser={u:"ALİ"}; buildAdminSidebar(); closeModal('login-modal'); document.getElementById('admin-panel').style.display='flex'; } else alert("Hata!"); 
        }

        function buildAdminSidebar() { 
            const s = document.getElementById('sidebar-menu'); 
            s.innerHTML = `<div class="sidebar-btn" data-tab="vitrin" onclick="adminTab('vitrin', this)">🖼️ Vitrin</div><div class="sidebar-btn" data-tab="anns" onclick="adminTab('anns', this)">📢 Duyurular</div><div class="sidebar-btn" data-tab="groups" onclick="adminTab('groups', this)">⚽ Gruplar</div><div class="sidebar-btn" data-tab="coaches" onclick="adminTab('coaches', this)">👤 Hocalar</div><div class="sidebar-btn" data-tab="contact" onclick="adminTab('contact', this)">📞 Rehber</div><div class="sidebar-btn" data-tab="msgs" onclick="adminTab('msgs', this)">📩 Mesajlar</div>`;
            s.firstChild.click(); 
        }

        function adminTab(tab, btn) {
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
            const v = document.getElementById('admin-view-content'); v.innerHTML = `<h3>${btn.innerText} Yönetimi</h3>`;
            
            if(tab === 'vitrin') {
                v.innerHTML += `<input type="file" multiple onchange="upVit(event)"><div id="v-list" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(110px, 1fr)); gap:10px; margin-top:20px;"></div>`;
                (db.vitrin || []).forEach((img, i) => { v.querySelector('#v-list').innerHTML += `<div style="text-align:center; background:white; padding:10px; border-radius:10px;"><img src="${img}" style="width:100%;height:80px;object-fit:cover;border-radius:8px;"><button onclick="del('vitrin',${i})" style="color:red;border:none;background:none;cursor:pointer;font-weight:800;">SİL</button></div>`; });
            } else if(tab === 'anns') {
                v.innerHTML += `<button class="btn-panel" onclick="addA()">+ Duyuru Ekle</button><div id="a-list" style="margin-top:20px;"></div>`;
                (db.duyurular || []).forEach((a, i) => { v.querySelector('#a-list').innerHTML += `<div class="admin-card-item"><b>${a.baslik}</b><button onclick="del('duyurular',${i})" style="color:red;border:none;background:none;cursor:pointer;">SİL</button></div>`; });
            } else if(tab === 'groups') {
                v.innerHTML += `<button class="btn-panel" onclick="addG()">+ Grup Ekle</button><div id="g-list" style="margin-top:20px;"></div>`;
                (db.gruplar || []).forEach((g, i) => { v.querySelector('#g-list').innerHTML += `<div class="admin-card-item"><b>${g.ad} (${g.saat})</b><button onclick="del('gruplar',${i})" style="color:red;border:none;background:none;cursor:pointer;">SİL</button></div>`; });
            } else if(tab === 'coaches') {
                v.innerHTML += `<button class="btn-panel" onclick="addC()">+ Hoca Ekle</button><div id="c-list" style="margin-top:20px;"></div>`;
                (db.hocalar || []).forEach((h, i) => { v.querySelector('#c-list').innerHTML += `<div class="admin-card-item"><div><img src="${h.img}" style="width:40px;height:40px;border-radius:50%;margin-right:10px;"><b>${h.ad}</b></div><button onclick="del('hocalar',${i})" style="color:red;border:none;background:none;cursor:pointer;">SİL</button></div>`; });
            } else if(tab === 'contact') {
                v.innerHTML += `<h4>Rehber</h4><button class="btn-panel" onclick="addCt()">+ Yetkili Ekle</button><div id="ct-list" style="margin-top:15px;"></div><h4>Adres</h4><textarea id="adr-in">${db.iletisim.adres||''}</textarea><button class="btn-panel" onclick="saveAdr()">KAYDET</button>`;
                (db.iletisim.rehber || []).forEach((c, i) => { v.querySelector('#ct-list').innerHTML += `<div class="admin-card-item"><b>${c.ad}: ${c.tel}</b><button onclick="delCt(${i})" style="color:red;border:none;background:none;cursor:pointer;">SİL</button></div>`; });
            } else if(tab === 'msgs') {
                (db.mesajlar || []).forEach((m, i) => { v.innerHTML += `<div class="admin-card-item" style="flex-direction:column;align-items:flex-start;"><small>${m.tarih}</small><b>${m.ad} (${m.tel})</b><p>${m.msg}</p><button onclick="del('mesajlar',${i})" style="color:red;border:none;background:none;cursor:pointer;">MESAJI SİL</button></div>`; });
            }
        }

        async function upVit(e) {
            const files = Array.from(e.target.files); document.getElementById('upload-progress-container').style.display='block';
            for(let i=0; i<files.length; i++) {
                const b64 = await new Promise(r => { const fr = new FileReader(); fr.onload = ev => r(ev.target.result); fr.readAsDataURL(files[i]); });
                const comp = await compress(b64); if(!db.vitrin) db.vitrin=[]; db.vitrin.unshift(comp);
                document.getElementById('upload-progress-bar').style.width = ((i+1)/files.length*100)+'%';
            }
            database.ref('/').set(db); document.getElementById('upload-progress-container').style.display='none';
        }

        function addA() { const b=prompt("Başlık:"), m=prompt("Mesaj:"); if(b){ if(!db.duyurular) db.duyurular=[]; db.duyurular.unshift({baslik:b, metin:m}); database.ref('/').set(db); } }
        function addG() { const n=prompt("Grup Adı:"), s=prompt("Çalışma Saati:"); if(n){ if(!db.gruplar) db.gruplar=[]; db.gruplar.push({ad:n, saat:s}); database.ref('/').set(db); } }
        function addC() { 
            const n=prompt("Hoca Adı:"), u=prompt("Unvan:"); if(n){
                const inp=document.createElement('input'); inp.type='file';
                inp.onchange=async (e)=>{
                    const b64=await new Promise(r=>{const fr=new FileReader(); fr.onload=ev=>r(ev.target.result); fr.readAsDataURL(e.target.files[0]);});
                    const comp=await compress(b64); if(!db.hocalar) db.hocalar=[]; db.hocalar.push({ad:n, unvan:u, img:comp}); database.ref('/').set(db);
                }; inp.click();
            }
        }
        function addCt() { const n=prompt("İsim:"), t=prompt("Tel:"); if(n){ if(!db.iletisim.rehber) db.iletisim.rehber=[]; db.iletisim.rehber.push({ad:n, tel:t}); database.ref('/').set(db); } }
        function saveAdr() { db.iletisim.adres = document.getElementById('adr-in').value; database.ref('/').set(db); alert("Kaydedildi."); }
        function del(p, i) { if(confirm("Silinsin mi?")) { db[p].splice(i,1); database.ref('/').set(db); } }
        function delCt(i) { if(confirm("Silinsin mi?")) { db.iletisim.rehber.splice(i,1); database.ref('/').set(db); } }
        function openLB(s) { document.getElementById('lb-img').src=s; document.getElementById('lightbox').style.display='flex'; }
        function closeLB() { document.getElementById('lightbox').style.display='none'; }
        function openModal(id) { document.getElementById(id).style.display='flex'; }
        function closeModal(id) { document.getElementById(id).style.display='none'; }
        function showPage(p) { document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active')); document.getElementById('page-' + p).classList.add('active'); window.scrollTo(0,0); }
        function sendVeliMsg() { const ad=document.getElementById('v-ad').value, msg=document.getElementById('v-mesaj').value, tel=document.getElementById('v-tel').value; if(!ad || !msg) return alert("Eksik!"); if(!db.mesajlar) db.mesajlar=[]; db.mesajlar.unshift({ad, tel, msg, tarih:new Date().toLocaleString()}); database.ref('/').set(db); alert("İletildi."); }
    </script>
</body>
</html>
