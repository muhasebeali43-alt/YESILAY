<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kütahya Yeşilay Futbol Okulu | Yönetim</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --yesil: #006a33; --sari: #f1c40f; --dark: #121212; --light: #f8faf9; }
        body, html { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: var(--light); color: #333; font-size: 16px; scroll-behavior: smooth; }

        header { 
            background: linear-gradient(135deg, var(--yesil) 0%, #004d26 100%); color: white; padding: 30px 5%; 
            display: flex; flex-direction: column; align-items: center; 
            border-bottom: 7px solid var(--sari); box-shadow: 0 8px 25px rgba(0,0,0,0.3); 
        }
        @media (min-width: 1024px) { header { flex-direction: row; justify-content: space-between; padding: 30px 80px; } }
        .club-info h1 { font-size: 1.8rem; font-weight: 900; text-transform: uppercase; margin: 0; letter-spacing: 2px; }
        
        nav { margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        nav a { color: white; text-decoration: none; font-weight: 700; font-size: 0.9rem; cursor: pointer; text-transform: uppercase; }
        .admin-trigger { background: var(--sari); color: var(--yesil) !important; padding: 8px 15px; border-radius: 10px; font-weight: 900; border: none; cursor: pointer; }

        .main-content { padding: 35px 5%; box-sizing: border-box; }
        @media (min-width: 1024px) { .main-content { padding: 40px 80px; } }
        .page { display: none; }
        .page.active { display: block; }
        .section-title { font-weight: 900; font-size: 1.8rem; color: var(--yesil); border-left: 12px solid var(--sari); padding-left: 15px; text-transform: uppercase; margin-bottom: 30px; }

        .home-layout { display: flex; flex-direction: column; gap: 35px; }
        @media (min-width: 1024px) { .home-layout { display: grid; grid-template-columns: 3fr 1.2fr; gap: 40px; align-items: start; } }
        
        .grid-4 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        @media (min-width: 1200px) { .grid-4 { grid-template-columns: repeat(4, 1fr); gap: 20px; } }
        .v-img { width: 100%; height: 260px; object-fit: cover; border-radius: 20px; border: 5px solid white; box-shadow: 0 8px 20px rgba(0,0,0,0.1); cursor: pointer; }

        .ann-sidebar { background: white; padding: 25px; border-radius: 30px; border-top: 10px solid var(--sari); box-shadow: 0 12px 30px rgba(0,0,0,0.06); }
        .ann-box { background: #fafafa; padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 6px solid var(--yesil); }

        .card { background: white; padding: 25px; border-radius: 25px; text-align: center; border-bottom: 8px solid var(--yesil); box-shadow: 0 8px 20px rgba(0,0,0,0.04); }
        .card img { width: 140px; height: 140px; border-radius: 50%; border: 5px solid var(--yesil); object-fit: cover; margin-bottom: 15px; }

        .contact-card { background: white; padding: 30px; border-radius: 25px; border-left: 15px solid var(--yesil); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        #admin-panel { display: none; position: fixed; inset: 0; background: #fff; z-index: 5000; flex-direction: column; }
        .admin-nav { background: var(--dark); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 6px solid var(--sari); }
        .admin-layout { display: flex; flex: 1; overflow: hidden; flex-direction: column; }
        @media (min-width: 1024px) { .admin-layout { flex-direction: row; } }
        .admin-sidebar { background: #1a1a1a; width: 100%; padding: 15px; display: flex; overflow-x: auto; gap: 10px; }
        @media (min-width: 1024px) { .admin-sidebar { width: 250px; flex-direction: column; overflow-x: hidden; } }
        .sidebar-btn { color: #aaa; padding: 12px; cursor: pointer; border-radius: 10px; font-weight: 700; white-space: nowrap; }
        .sidebar-btn.active { background: var(--yesil); color: white; }
        .admin-main { flex: 1; padding: 25px; overflow-y: auto; background: #f4f6f5; }
        .admin-item { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); z-index: 9999; justify-content: center; align-items: center; padding: 20px; }
        .modal-box { background: white; padding: 35px; border-radius: 30px; width: 100%; max-width: 400px; text-align: center; border-top: 10px solid var(--sari); position: relative; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-family: inherit; }
        .btn-action { background: var(--yesil); color: white; padding: 14px; width: 100%; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; }
        
        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center; cursor: pointer; }
        #lb-img { max-width: 90%; max-height: 85vh; border: 4px solid white; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="lightbox" onclick="this.style.display='none'"><img id="lb-img" src=""></div>

    <header>
        <div class="club-info"><h1>KÜTAHYA YEŞİLAY FUTBOL OKULU</h1></div>
        <nav>
            <a onclick="showPage('home')">ANASAYFA</a>
            <a onclick="showPage('groups')">GRUPLAR</a>
            <a onclick="showPage('coaches')">HOCALAR</a>
            <a onclick="showPage('contact')">İLETİŞİM</a>
            <button class="admin-trigger" onclick="openModal('login-modal')">YÖNETİM</button>
        </nav>
    </header>

    <div class="main-content">
        <div id="page-home" class="page active">
            <div class="home-layout">
                <div><h2 class="section-title">ANTRENMAN KARELERİ</h2><div id="pub-vit" class="grid-4"></div></div>
                <div class="ann-sidebar"><h3 style="color:var(--yesil); margin:0 0 20px 0;">📢 DUYURULAR</h3><div id="pub-ann"></div></div>
            </div>
        </div>
        <div id="page-groups" class="page"><h2 class="section-title">Gruplarımız</h2><div id="pub-grp" class="grid-4"></div></div>
        <div id="page-coaches" class="page"><h2 class="section-title">Teknik Kadro</h2><div id="pub-hoc" class="grid-4"></div></div>
        <div id="page-contact" class="page">
            <h2 class="section-title">İletişim Bilgileri</h2>
            <div id="pub-con" class="contact-card"></div>
        </div>
    </div>

    <div id="admin-panel">
        <div class="admin-nav"><b>YÖNETİCİ KABİNİ</b><button onclick="location.reload()" style="background:red; color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:800;">ÇIKIŞ</button></div>
        <div class="admin-layout"><div class="admin-sidebar" id="side-menu"></div><div id="admin-content" class="admin-main"></div></div>
    </div>

    <div id="login-modal" class="modal-overlay" onclick="closeModal('login-modal')">
        <div class="modal-box" onclick="event.stopPropagation()">
            <h3 style="color:var(--yesil)">YETKİLİ GİRİŞİ</h3>
            <input type="text" id="u" placeholder="Kullanıcı Adı"><input type="password" id="p" placeholder="Şifre">
            <button class="btn-action" onclick="tryLogin()">GİRİŞ YAP</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://yesilay-futbol-okulu-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let db = { vitrin: [], gruplar: [], hocalar: [], duyurular: [], iletisim: [] };

        database.ref('/').on('value', (s) => { if(s.val()) db = s.val(); renderPublic(); });

        function renderPublic() {
            const vG = document.getElementById('pub-vit'); vG.innerHTML = "";
            (db.vitrin || []).forEach(img => { vG.innerHTML += `<img src="${img}" class="v-img" onclick="openLB('${img}')">`; });
            const aG = document.getElementById('pub-ann'); aG.innerHTML = "";
            (db.duyurular || []).forEach(a => { aG.innerHTML += `<div class="ann-box"><h4>${a.baslik}</h4><p>${a.metin}</p></div>`; });
            const gG = document.getElementById('pub-grp'); gG.innerHTML = "";
            (db.gruplar || []).forEach(g => { gG.innerHTML += `<div class="card"><h3>${g.ad}</h3><p style="color:var(--yesil); font-weight:bold;">${g.saat || ''}</p></div>`; });
            const hG = document.getElementById('pub-hoc'); hG.innerHTML = "";
            (db.hocalar || []).forEach(h => { hG.innerHTML += `<div class="card"><img src="${h.img || 'https://via.placeholder.com/150'}"><h3>${h.ad}</h3><p>${h.unvan || ''}</p></div>`; });
            const cG = document.getElementById('pub-con'); cG.innerHTML = "";
            (db.iletisim || []).forEach(c => { cG.innerHTML += `<p style="font-size:1.1rem; border-bottom:1px solid #eee; padding-bottom:10px;">👤 <b>${c.ad}:</b> <a href="tel:${c.tel}" style="color:var(--yesil); text-decoration:none;">${c.tel}</a></p>`; });
        }

        function tryLogin() {
            const user = document.getElementById('u').value.trim().toUpperCase();
            const pass = document.getElementById('p').value.trim().toUpperCase();
            if(user === "ALİ" && pass === "ALİ43") {
                closeModal('login-modal'); document.getElementById('admin-panel').style.display='flex'; buildSidebar();
            } else alert("Hatalı Giriş!");
        }

        function buildSidebar() {
            const s = document.getElementById('side-menu');
            const menu = [{id:'vit', n:'🖼️ Vitrin'}, {id:'ann', n:'📢 Duyurular'}, {id:'grp', n:'⚽ Gruplar'}, {id:'hoc', n:'👤 Hocalar'}, {id:'con', n:'📞 İletişim'}];
            s.innerHTML = menu.map(m => `<div class="sidebar-btn" onclick="openTab('${m.id}', this)">${m.n}</div>`).join('');
            s.firstChild.click();
        }

        function openTab(tab, btn) {
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
            const main = document.getElementById('admin-content'); main.innerHTML = `<h3>${btn.innerText} Yönetimi</h3>`;
            
            if(tab === 'vit') {
                main.innerHTML += `<input type="file" multiple onchange="upVit(event)"><div id="v-sort" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(120px, 1fr)); gap:10px; margin-top:20px;"></div>`;
                const container = document.getElementById('v-sort');
                (db.vitrin || []).forEach((img, i) => { container.innerHTML += `<div data-id="${i}" style="position:relative;"><img src="${img}" style="width:100%; height:80px; object-fit:cover; border-radius:10px;"><button onclick="del('vitrin',${i})" style="position:absolute; top:0; right:0; background:red; color:white; border:none; cursor:pointer;">X</button></div>`; });
                new Sortable(container, { animation: 150, onEnd: () => { db.vitrin = Array.from(container.children).map(el => db.vitrin[el.dataset.id]); save(); } });
            } else if(tab === 'ann') {
                main.innerHTML += `<button class="btn-action" style="width:auto; padding:10px 20px;" onclick="addA()">+ Duyuru Ekle</button>`;
                (db.duyurular || []).forEach((a, i) => { main.innerHTML += `<div class="admin-item"><b>${a.baslik}</b><button onclick="del('duyurular',${i})">Sil</button></div>`; });
            } else if(tab === 'grp') {
                main.innerHTML += `<button class="btn-action" style="width:auto; padding:10px 20px;" onclick="addG()">+ Grup Ekle</button>`;
                (db.gruplar || []).forEach((g, i) => { main.innerHTML += `<div class="admin-item"><b>${g.ad}</b><button onclick="del('gruplar',${i})">Sil</button></div>`; });
            } else if(tab === 'hoc') {
                main.innerHTML += `<button class="btn-action" style="width:auto; padding:10px 20px;" onclick="addH()">+ Hoca Ekle</button>`;
                (db.hocalar || []).forEach((h, i) => { main.innerHTML += `<div class="admin-item"><b>${h.ad}</b><button onclick="del('hocalar',${i})">Sil</button></div>`; });
            } else if(tab === 'con') {
                main.innerHTML += `<button class="btn-action" style="width:auto; padding:10px 20px;" onclick="addC()">+ Kişi Ekle</button>`;
                (db.iletisim || []).forEach((c, i) => { main.innerHTML += `<div class="admin-item"><b>${c.ad}</b><button onclick="del('iletisim',${i})">Sil</button></div>`; });
            }
        }

        async function compress(b64) {
            return new Promise(r => {
                const img = new Image(); img.src = b64;
                img.onload = () => {
                    const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                    const max = 1200; let w = img.width, h = img.height;
                    if(w > h) { if(w > max) { h *= max/w; w = max; } } else { if(h > max) { w *= max/h; h = max; } }
                    canvas.width = w; canvas.height = h; ctx.drawImage(img, 0, 0, w, h);
                    r(canvas.toDataURL('image/jpeg', 0.7));
                };
            });
        }

        function upVit(e) {
            const files = Array.from(e.target.files);
            files.forEach(f => {
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    const compressed = await compress(ev.target.result);
                    if(!db.vitrin) db.vitrin = [];
                    db.vitrin.unshift(compressed); save();
                };
                reader.readAsDataURL(f);
            });
        }

        function addA() { const b=prompt("Başlık:"), m=prompt("Mesaj:"); if(b){ if(!db.duyurular) db.duyurular=[]; db.duyurular.unshift({baslik:b, metin:m}); save(); } }
        function addG() { const n=prompt("Grup Adı:"), s=prompt("Saat:"); if(n){ if(!db.gruplar) db.gruplar=[]; db.gruplar.push({ad:n, saat:s}); save(); } }
        function addH() {
            const n=prompt("Hoca Adı:"), u=prompt("Unvan:");
            if(n) {
                const inp = document.createElement('input'); inp.type = 'file';
                inp.onchange = (e) => {
                    const r = new FileReader(); r.onload = async (ev) => {
                        const comp = await compress(ev.target.result);
                        if(!db.hocalar) db.hocalar = [];
                        db.hocalar.push({ad:n, unvan:u, img:comp}); save();
                    }; r.readAsDataURL(e.target.files[0]);
                }; inp.click();
            }
        }
        function addC() { const n=prompt("Ad:"), t=prompt("Tel:"); if(n){ if(!db.iletisim) db.iletisim=[]; db.iletisim.push({ad:n, tel:t}); save(); } }
        function del(path, i) { if(confirm("Silinsin mi?")) { db[path].splice(i, 1); save(); } }
        function save() { database.ref('/').set(db); }
        function openLB(s) { document.getElementById('lb-img').src=s; document.getElementById('lightbox').style.display='flex'; }
        function openModal(id) { document.getElementById(id).style.display='flex'; }
        function closeModal(id) { document.getElementById(id).style.display='none'; }
        function showPage(p) { document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active')); document.getElementById('page-' + p).classList.add('active'); window.scrollTo(0,0); }
    </script>
</body>
</html>
