<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kütahya Yeşilay Futbol Okulu | Yönetim</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --yesil: #006a33; --sari: #f1c40f; --dark: #1e1e1e; --light: #f4f7f6; --beyaz: #ffffff; }
        body, html { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: var(--light); color: #333; font-size: 16px; }

        header { background: linear-gradient(135deg, var(--yesil) 0%, #004d26 100%); color: white; padding: 20px 5%; display: flex; flex-direction: column; align-items: center; border-bottom: 6px solid var(--sari); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        @media (min-width: 1024px) { header { flex-direction: row; justify-content: space-between; padding: 20px 80px; } }
        .club-info h1 { font-size: 1.6rem; font-weight: 900; text-transform: uppercase; margin: 0; letter-spacing: 2px; }
        
        nav { margin-top: 15px; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        nav a { color: white; text-decoration: none; font-weight: 700; font-size: 0.9rem; cursor: pointer; text-transform: uppercase; }
        .admin-trigger { background: var(--sari); color: var(--yesil) !important; padding: 6px 15px; border-radius: 8px; font-weight: 900; border: none; cursor: pointer; }

        .main-content { padding: 30px 5%; box-sizing: border-box; }
        @media (min-width: 1024px) { .main-content { padding: 40px 80px; } }
        .page { display: none; }
        .page.active { display: block; }
        .section-title { font-weight: 900; font-size: 1.8rem; color: var(--yesil); border-left: 12px solid var(--sari); padding-left: 15px; text-transform: uppercase; margin-bottom: 30px; }

        /* ANA SAYFA DÜZENİ */
        .home-layout { display: flex; flex-direction: column; gap: 30px; }
        @media (min-width: 1024px) { .home-layout { display: grid; grid-template-columns: 3fr 1.2fr; gap: 40px; align-items: start; } }
        
        .vitrin-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        @media (min-width: 768px) { .vitrin-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1200px) { .vitrin-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; } }
        .vitrin-img { width: 100%; height: 260px; object-fit: cover; border-radius: 20px; border: 5px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.1); cursor: pointer; background: #eee; }

        .ann-sidebar { background: white; padding: 25px; border-radius: 30px; border-top: 10px solid var(--sari); box-shadow: 0 10px 30px rgba(0,0,0,0.06); }
        .ann-box { background: #fafafa; padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 6px solid var(--yesil); }
        .ann-box h4 { margin: 0 0 10px 0; color: var(--yesil); font-size: 1.1rem; }
        .ann-box p { margin: 0; font-size: 1rem; line-height: 1.5; color: #555; }

        /* YÖNETİM PANELİ (KİBAR VE TAM) */
        #admin-panel { display: none; position: fixed; inset: 0; background: #fff; z-index: 5000; flex-direction: column; }
        .admin-nav { background: var(--dark); color: white; padding: 12px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid var(--sari); }
        .admin-layout { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        @media (min-width: 1024px) { .admin-layout { flex-direction: row; } }
        .admin-sidebar { background: #262626; padding: 15px; display: flex; overflow-x: auto; gap: 10px; }
        @media (min-width: 1024px) { .admin-sidebar { width: 220px; flex-direction: column; } }
        .sidebar-btn { color: #aaa; padding: 12px 15px; cursor: pointer; border-radius: 10px; font-weight: 700; font-size: 0.9rem; white-space: nowrap; }
        .sidebar-btn.active { background: var(--yesil); color: white; }
        .admin-main { flex: 1; padding: 25px; overflow-y: auto; background: #f9f9f9; }
        .admin-card { background: white; padding: 12px 18px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; font-size: 0.95rem; }
        .admin-btn { border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 0.8rem; margin-left: 5px; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 6000; justify-content: center; align-items: center; padding: 20px; }
        .modal-box { background: white; padding: 30px; border-radius: 30px; width: 95%; max-width: 450px; position: relative; max-height: 90vh; overflow-y: auto; }
        .modal-close { position: absolute; top: 15px; right: 20px; font-size: 30px; cursor: pointer; font-weight: bold; }
        
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-family: inherit; font-size: 1rem; }
        .btn-add-main { background: var(--yesil) !important; color: white !important; padding: 15px; width: 100%; border: none; border-radius: 12px; cursor: pointer; font-weight: 800; margin-top: 10px; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div id="upload-progress-container" style="display:none; position:fixed; top:0; left:0; width:100%; height:6px; background: #eee; z-index: 20000;"><div id="upload-progress-bar" style="width:0%; height:100%; background: var(--yesil); transition: 0.3s;"></div></div>

    <header>
        <div class="club-info"><h1>Kütahya Yeşilay Futbol Okulu</h1></div>
        <nav>
            <a onclick="showPage('home')">ANASAYFA</a>
            <a onclick="showPage('groups')">GRUPLAR</a>
            <a onclick="showPage('coaches')">HOCALAR</a>
            <a onclick="showPage('contact')">İLETİŞİM / BİZE YAZIN</a>
            <button class="admin-trigger" onclick="openModal('login-modal')">YÖNETİM</button>
        </nav>
    </header>

    <div class="main-content">
        <div id="page-home" class="page active">
            <div class="home-layout">
                <div>
                    <h2 class="section-title">ANTRENMANDAN KARELER</h2>
                    <div id="public-vitrin" class="vitrin-grid"></div>
                </div>
                <div class="ann-sidebar">
                    <h3 style="color:var(--yesil); margin:0 0 20px 0; font-weight: 900;">📢 DUYURULAR</h3>
                    <div id="public-anns"></div>
                </div>
            </div>
        </div>

        <div id="page-groups" class="page">
            <h2 class="section-title">Gruplarımız</h2>
            <div id="public-groups" class="grid-responsive" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px;"></div>
        </div>

        <div id="page-coaches" class="page">
            <h2 class="section-title">Teknik Kadro</h2>
            <div id="public-coaches" class="grid-responsive" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px;"></div>
        </div>
        
        <div id="page-contact" class="page">
            <h2 class="section-title">İletişim & Okul Adresi</h2>
            <div id="public-contact-list" style="background:white; padding:30px; border-radius:25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 25px;"></div>
            <div id="public-address" style="background:#fff; padding:30px; border-radius:25px; border-left:15px solid var(--sari); box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 40px; font-size: 1.1rem; line-height: 1.6;"></div>
            
            <h2 class="section-title">Bize Yazın</h2>
            <div style="background:white; padding:35px; border-radius:30px; box-shadow: 0 15px 40px rgba(0,0,0,0.08); border-top: 10px solid var(--sari);">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px;">
                    <input type="text" id="v-ad" placeholder="Adınız Soyadınız">
                    <input type="tel" id="v-tel" placeholder="Telefon Numaranız">
                </div>
                <textarea id="v-mesaj" rows="5" placeholder="Mesajınızı buraya yazınız..."></textarea>
                <button class="btn-add-main" onclick="sendVeliMsg()">MESAJI YÖNETİME GÖNDER</button>
            </div>
        </div>
    </div>

    <div id="admin-panel">
        <div class="admin-nav"><b>YÖNETİCİ KABİNİ</b><button onclick="location.reload()" style="background:red; color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight: 800;">ÇIKIŞ</button></div>
        <div class="admin-layout">
            <div class="admin-sidebar" id="sidebar-menu"></div>
            <div id="admin-view-content" class="admin-main"></div>
        </div>
    </div>

    <div id="login-modal" class="modal-overlay" onclick="closeModal('login-modal')">
        <div class="modal-box" style="max-width:350px;" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeModal('login-modal')">&times;</span>
            <h3 style="color:var(--yesil); text-align:center;">Yetkili Girişi</h3>
            <input type="text" id="u" placeholder="Kullanıcı"><input type="password" id="p" placeholder="Şifre">
            <button class="btn-add-main" onclick="tryLogin()">GİRİŞ YAP</button>
        </div>
    </div>

    <div id="group-photo-modal" class="modal-overlay" onclick="closeModal('group-photo-modal')">
        <div class="modal-box" style="max-width:750px;" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeModal('group-photo-modal')">&times;</span>
            <h3 id="gp-title" style="color:var(--yesil)">Albüm Yönetimi</h3>
            <input type="file" multiple onchange="upGroupBulk(event)">
            <div id="gp-list" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(130px, 1fr)); gap:15px; margin-top:20px;"></div>
        </div>
    </div>

    <div id="user-modal" class="modal-overlay" onclick="closeModal('user-modal')">
        <div class="modal-box" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeModal('user-modal')">&times;</span>
            <h3 id="user-title">Yetki Tanımları</h3>
            <input type="text" id="new-u" placeholder="Kullanıcı Adı"><input type="password" id="new-p" placeholder="Şifre">
            <div id="perm-box" style="text-align:left; border:1px solid #eee; padding:20px; border-radius:15px;">
                <label><input type="checkbox" id="p-vit"> Vitrin Düzenleme</label><br>
                <label><input type="checkbox" id="p-grp"> Grupları Yönetme</label><br>
                <label><input type="checkbox" id="p-hoc"> Hocaları Yönetme</label><br>
                <label><input type="checkbox" id="p-ann"> Duyuru Yayınlama</label><br>
                <label><input type="checkbox" id="p-con"> İletişim & Mesajlar</label>
            </div>
            <button class="btn-add-main" onclick="saveUser()">KAYDET</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://yesilay-futbol-okulu-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let db = { vitrin: [], gruplar: [], hocalar: [], duyurular: [], iletisim: { rehber: [], adres: "" }, users: [], mesajlar: [] };
        let currentUser = null, curG = null, editingUserIdx = null;

        database.ref('/').on('value', (s) => { 
            if(s.val()) db = s.val(); 
            if(!db.iletisim) db.iletisim = { rehber: [], adres: "" };
            if(!db.users || !db.users.find(u => u.isFounder)) {
                if(!db.users) db.users = [];
                db.users.unshift({u: "ALİ", p: "ALİ43", isFounder: true, perms: {vit:true, grp:true, hoc:true, ann:true, con:true, usr:true}});
                database.ref('/').set(db);
            }
            renderAll();
            if(currentUser) adminTab(document.querySelector('.sidebar-btn.active')?.dataset.tab || 'vitrin', document.querySelector('.sidebar-btn.active'));
        });

        function syncDB() { database.ref('/').set(db); }

        function renderAll() {
            const vGrid = document.getElementById('public-vitrin'); vGrid.innerHTML = "";
            (db.vitrin || []).forEach(img => { const src = typeof img === 'string' ? img : img.src; vGrid.innerHTML += `<img src="${src}" class="vitrin-img">`; });
            
            const aL = document.getElementById('public-anns'); aL.innerHTML = "";
            (db.duyurular || []).forEach(a => { aL.innerHTML += `<div class="ann-box"><h4>${a.baslik}</h4><p>${a.metin}</p></div>`; });
            
            const gG = document.getElementById('public-groups'); gG.innerHTML = "";
            (db.gruplar || []).forEach(g => { gG.innerHTML += `<div class="card" style="padding: 30px; border-radius: 25px; background: white; border-bottom: 6px solid var(--yesil);"><h3>${g.ad}</h3><p style="font-weight:bold; color:var(--yesil);">${g.saat || ''}</p></div>`; });
            
            const hG = document.getElementById('public-coaches'); hG.innerHTML = "";
            (db.hocalar || []).forEach(h => { const src = h.img ? (typeof h.img === 'string' ? h.img : h.img.src) : ""; hG.innerHTML += `<div class="card" style="padding:30px; border-radius:25px; background:white; border-bottom:6px solid var(--yesil);"><img src="${src}" style="width:130px; height:130px; border-radius:50%; border:5px solid var(--yesil); object-fit:cover; margin-bottom:15px;"><h3>${h.ad}</h3><p style="color:#666;">${h.unvan || ''}</p></div>`; });
            
            const cL = document.getElementById('public-contact-list'); cL.innerHTML = "";
            (db.iletisim.rehber || []).forEach(c => { cL.innerHTML += `<p style="font-size:1.2rem; margin:10px 0; border-bottom:1px solid #f0f0f0; padding-bottom:10px;">👤 <b>${c.ad}:</b> <a href="tel:${c.tel}" style="color:var(--yesil); text-decoration:none; font-weight:bold;">${c.tel}</a></p>`; });
            document.getElementById('public-address').innerHTML = `📍 <b>Okul Adresi:</b><br>${db.iletisim.adres || 'Henüz Eklenmemiş'}`;
        }

        function adminTab(tab, btn) {
            if(!btn) return;
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
            const v = document.getElementById('admin-view-content'); v.innerHTML = "";
            
            if(tab === 'vitrin') {
                v.innerHTML = `<h4>Vitrin</h4><input type="file" multiple onchange="upVitBulk(event)"><div id="v-sort" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(120px, 1fr)); gap:12px; margin-top:20px;"></div>`;
                (db.vitrin || []).forEach((img, i) => { const src = typeof img === 'string' ? img : img.src; v.querySelector('#v-sort').innerHTML += `<div class="admin-card" style="flex-direction:column; padding:10px;"><img src="${src}" style="width:100%; height:80px; object-fit:cover; border-radius:10px;"><button class="admin-btn" style="color:red; margin-top:5px;" onclick="del('vitrin',${i})">Sil</button></div>`; });
            }
            else if(tab === 'groups') {
                v.innerHTML = `<button class="admin-btn" style="background:var(--yesil); color:white; padding:10px 20px; margin-bottom:15px;" onclick="addG()">+ Yeni Grup</button><div id="g-sort"></div>`;
                (db.gruplar || []).forEach((g, i) => { v.querySelector('#g-sort').innerHTML += `<div class="admin-card"><b>${g.ad}</b> (${g.saat||''})<div><button class="admin-btn" style="background:#e3f2fd; color:#1976d2;" onclick="editG(${i})">Düzelt</button><button class="admin-btn" style="background:#e8f5e9; color:#2e7d32;" onclick="openGPhotos(${i})">Albüm</button><button class="admin-btn" style="color:red;" onclick="del('gruplar',${i})">Sil</button></div></div>`; });
            }
            else if(tab === 'anns') {
                v.innerHTML = `<button class="admin-btn" style="background:var(--yesil); color:white; padding:10px 20px; margin-bottom:15px;" onclick="addA()">+ Yeni Duyuru</button><div id="a-sort"></div>`;
                (db.duyurular || []).forEach((a, i) => { v.querySelector('#a-sort').innerHTML += `<div class="admin-card"><b>${a.baslik}</b><button class="admin-btn" style="color:red;" onclick="del('duyurular',${i})">Sil</button></div>`; });
            }
            else if(tab === 'contact') {
                v.innerHTML = `<h4>Rehber</h4><button class="admin-btn" style="background:var(--yesil); color:white; margin-bottom:10px;" onclick="addCt()">+ Ekle</button><div id="ct-list"></div>
                               <h4 style="margin-top:30px;">Okul Adresi</h4><textarea id="adr-in" rows="3">${db.iletisim.adres||''}</textarea><button class="btn-add-main" style="width:200px;" onclick="saveAdr()">ADRESİ KAYDET</button>`;
                (db.iletisim.rehber || []).forEach((c, i) => { v.querySelector('#ct-list').innerHTML += `<div class="admin-card"><b>${c.ad}</b>: ${c.tel}<button class="admin-btn" style="color:red;" onclick="delCt(${i})">Sil</button></div>`; });
            }
            else if(tab === 'messages') {
                v.innerHTML = `<h4>Veli Mesajları</h4>`;
                (db.mesajlar || []).forEach((m, i) => { v.innerHTML += `<div class="admin-card" style="flex-direction:column; align-items:flex-start; padding:20px; border-left:8px solid var(--sari);"><small>${m.tarih}</small><b>${m.ad} (${m.tel})</b><p style="margin:10px 0; font-size:1rem; line-height:1.4;">${m.msg}</p><button class="admin-btn" style="color:red; background:#ffebee;" onclick="delMsg(${i})">MESAJI SİL</button></div>`; });
            }
            else if(tab === 'users') {
                v.innerHTML = `<button class="admin-btn" style="background:var(--yesil); color:white; padding:10px 20px; margin-bottom:15px;" onclick="openUserModal()">+ Yetkili Ekle</button><div id="u-list"></div>`;
                (db.users || []).forEach((u, i) => { v.innerHTML += `<div class="admin-card"><b>${u.u} ${u.isFounder?'(K)':''}</b><button class="admin-btn" style="background:#f0f0f0;" onclick="openUserModal(${i})">Düzenle / Yetki</button></div>`; });
            }
        }

        // PANEL FONKSİYONLARI
        function upVitBulk(e) { runUp(e.target.files, (res) => { if(!db.vitrin) db.vitrin=[]; db.vitrin.unshift({src:res}); syncDB(); }); }
        function addG() { const n=prompt("Grup:"), s=prompt("Saat:"); if(n) { if(!db.gruplar) db.gruplar=[]; db.gruplar.push({ad:n, saat:s, fotos:[]}); syncDB(); } }
        function editG(i) { const n=prompt("Ad:", db.gruplar[i].ad), s=prompt("Saat:", db.gruplar[i].saat); if(n) { db.gruplar[i].ad=n; db.gruplar[i].saat=s; syncDB(); } }
        function addA() { const b=prompt("Duyuru Başlığı:"), m=prompt("Mesajınız:"); if(b) { if(!db.duyurular) db.duyurular=[]; db.duyurular.unshift({baslik:b, metin:m}); syncDB(); } }
        function addCt() { const n=prompt("İsim:"), t=prompt("Tel:"); if(n) { db.iletisim.rehber.push({ad:n, tel:t}); syncDB(); } }
        function saveAdr() { db.iletisim.adres = document.getElementById('adr-in').value; syncDB(); alert("Adres Güncellendi!"); }
        function delMsg(i) { if(confirm("Mesajı sil?")) { db.mesajlar.splice(i,1); syncDB(); } }
        function delCt(i) { if(confirm("Yetkiliyi sil?")) { db.iletisim.rehber.splice(i,1); syncDB(); } }
        function del(p, i) { if(confirm("Silinsin mi?")) { db[p].splice(i,1); syncDB(); } }
        
        async function runUp(files, cb) {
            const total = files.length; document.getElementById('upload-progress-container').style.display='block';
            for(let i=0; i<total; i++) {
                const b64 = await new Promise(r => { const fr = new FileReader(); fr.onload = e => r(e.target.result); fr.readAsDataURL(files[i]); });
                cb(b64); document.getElementById('upload-progress-bar').style.width = ((i+1)/total*100)+'%';
            }
            setTimeout(()=>document.getElementById('upload-progress-container').style.display='none', 1000);
        }

        function openGPhotos(i) { curG=i; document.getElementById('gp-title').innerText=db.gruplar[i].ad + " Albümü"; openModal('group-photo-modal'); renderGP(); }
        function renderGP() {
            const c = document.getElementById('gp-list'); c.innerHTML = "";
            (db.gruplar[curG].fotos || []).forEach((img, idx) => {
                const src = typeof img === 'string' ? img : img.src;
                c.innerHTML += `<div style="position:relative;"><img src="${src}" style="width:100%; height:90px; object-fit:cover; border-radius:10px;"><button onclick="delGP(${idx})" style="position:absolute; top:2px; right:2px; background:red; color:white; border:none; border-radius:50%; width:22px; height:22px; cursor:pointer;">&times;</button></div>`;
            });
        }
        function upGroupBulk(e) { runUp(e.target.files, (res) => { if(!db.gruplar[curG].fotos) db.gruplar[curG].fotos=[]; db.gruplar[curG].fotos.unshift({src:res}); syncDB(); renderGP(); }); }
        function delGP(i) { db.gruplar[curG].fotos.splice(i,1); syncDB(); renderGP(); }

        function openUserModal(idx = null) { 
            editingUserIdx = idx; const u = idx !== null ? db.users[idx] : null; 
            document.getElementById('new-u').value = u ? u.u : ""; document.getElementById('new-p').value = u ? u.p : "";
            document.getElementById('perm-box').style.display = (u && u.isFounder) ? "none" : "block";
            if(u && !u.isFounder) {
                document.getElementById('p-vit').checked=u.perms.vit; document.getElementById('p-grp').checked=u.perms.grp;
                document.getElementById('p-hoc').checked=u.perms.hoc; document.getElementById('p-ann').checked=u.perms.ann;
                document.getElementById('p-con').checked=u.perms.con;
            }
            openModal('user-modal'); 
        }
        function saveUser() {
            const u = document.getElementById('new-u').value.trim(), p = document.getElementById('new-p').value.trim(); if(!u || !p) return alert("Hata!");
            let perms = { vit:document.getElementById('p-vit').checked, grp:document.getElementById('p-grp').checked, hoc:document.getElementById('p-hoc').checked, ann:document.getElementById('p-ann').checked, con:document.getElementById('p-con').checked };
            if(editingUserIdx !== null) { const f = db.users[editingUserIdx].isFounder; db.users[editingUserIdx] = {u, p, perms: f ? {vit:true,grp:true,hoc:true,ann:true,con:true,usr:true} : perms, isFounder: f}; }
            else { db.users.push({u, p, perms, isFounder:false}); }
            database.ref('/').set(db); closeModal('user-modal');
        }

        function tryLogin() { const u=document.getElementById('u').value.trim().toUpperCase(), p=document.getElementById('p').value.trim(); currentUser = (db.users || []).find(user => user.u.toUpperCase() === u && user.p.toUpperCase() === p); if(currentUser) { buildAdminSidebar(); closeModal('login-modal'); document.getElementById('admin-panel').style.display='flex'; } else alert("Hata!"); }
        function buildAdminSidebar() { 
            const s = document.getElementById('sidebar-menu'); const p = currentUser.perms; s.innerHTML = "";
            if(p.vit) s.innerHTML += `<div class="sidebar-btn" data-tab="vitrin" onclick="adminTab('vitrin', this)">🖼️ Vitrin</div>`;
            if(p.grp) s.innerHTML += `<div class="sidebar-btn" data-tab="groups" onclick="adminTab('groups', this)">⚽ Gruplar</div>`;
            if(p.hoc) s.innerHTML += `<div class="sidebar-btn" data-tab="coaches" onclick="adminTab('coaches', this)">👤 Hocalar</div>`;
            if(p.ann) s.innerHTML += `<div class="sidebar-btn" data-tab="anns" onclick="adminTab('anns', this)">📢 Duyurular</div>`;
            if(p.con) s.innerHTML += `<div class="sidebar-btn" data-tab="contact" onclick="adminTab('contact', this)">📞 İletişim</div><div class="sidebar-btn" data-tab="messages" onclick="adminTab('messages', this)">📩 Mesajlar</div>`;
            if(p.usr) s.innerHTML += `<div class="sidebar-btn" data-tab="users" onclick="adminTab('users', this)" style="color:var(--sari)">🔑 Yetkililer</div>`;
            s.firstChild.click(); 
        }
        function sendVeliMsg() { const ad = document.getElementById('v-ad').value, tel = document.getElementById('v-tel').value, msg = document.getElementById('v-mesaj').value; if(!ad || !msg) return alert("Boş bırakma!"); if(!db.mesajlar) db.mesajlar = []; db.mesajlar.unshift({ad, tel, msg, tarih: new Date().toLocaleString()}); database.ref('/').set(db); alert("Mesajınız iletildi."); }
        function openModal(id) { document.getElementById(id).style.display='flex'; }
        function closeModal(id) { document.getElementById(id).style.display='none'; }
        function showPage(p) { document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active')); document.getElementById('page-' + p).classList.add('active'); window.scrollTo(0,0); }
    </script>
</body>
</html>
