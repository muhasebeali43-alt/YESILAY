<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kütahya Yeşilay Futbol Okulu | Yönetim</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --yesil: #006a33; --sari: #f1c40f; --dark: #121212; --light: #f8faf9; --beyaz: #ffffff; }
        body, html { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: var(--light); color: #333; overflow-x: hidden; }

        header { background: linear-gradient(135deg, var(--yesil) 0%, #004d26 100%); color: white; padding: 25px 5%; display: flex; flex-direction: column; align-items: center; border-bottom: 7px solid var(--sari); box-shadow: 0 5px 20px rgba(0,0,0,0.4); }
        @media (min-width: 1024px) { header { flex-direction: row; justify-content: space-between; padding: 25px 80px; } }
        .club-info h1 { font-size: 1.6rem; font-weight: 900; text-transform: uppercase; margin: 0; letter-spacing: 2px; }
        
        nav { margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        nav a { color: white; text-decoration: none; font-weight: 700; font-size: 0.9rem; cursor: pointer; text-transform: uppercase; }
        .admin-trigger { background: var(--sari); color: var(--yesil) !important; padding: 8px 15px; border-radius: 10px; font-weight: 900; border: none; cursor: pointer; }

        .main-content { padding: 40px 5%; box-sizing: border-box; }
        @media (min-width: 1024px) { .main-content { padding: 40px 80px; } }
        .page { display: none; }
        .page.active { display: block; }
        .section-title { font-weight: 900; font-size: 2rem; color: var(--yesil); border-left: 12px solid var(--sari); padding-left: 20px; text-transform: uppercase; margin-bottom: 30px; }

        /* HOCA DÜZENİ: Masaüstünde 4'lü */
        .grid-responsive { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        @media (min-width: 1200px) { .hoca-grid { grid-template-columns: repeat(4, 1fr); } }

        .card { background: white; padding: 30px 15px; border-radius: 25px; text-align: center; border-bottom: 6px solid var(--yesil); box-shadow: 0 10px 25px rgba(0,0,0,0.04); cursor: pointer; transition: 0.3s; position: relative; }
        .card img { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; border: 5px solid var(--yesil); margin-bottom: 15px; background: #eee; }
        .saat-kutu { background: var(--sari); color: var(--yesil); font-size: 0.75rem; font-weight: 800; padding: 5px 10px; border-radius: 8px; margin-top: 10px; display: inline-block; }

        /* LIGHTBOX & X BUTONU */
        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center; padding: 20px; }
        #lb-img { max-width: 95%; max-height: 85vh; border: 5px solid white; border-radius: 15px; box-shadow: 0 0 50px rgba(0,0,0,0.5); object-fit: contain; }
        .lb-close { position: absolute; top: 30px; right: 30px; color: white; font-size: 40px; cursor: pointer; background: rgba(255,255,255,0.2); width: 50px; height: 50px; display: flex; justify-content: center; align-items: center; border-radius: 50%; transition: 0.3s; }
        .lb-close:hover { background: rgba(255,255,255,0.4); }

        /* ADMIN PANEL */
        #admin-panel { display: none; position: fixed; inset: 0; background: #fff; z-index: 5000; flex-direction: column; }
        .admin-nav { background: var(--dark); color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 6px solid var(--sari); }
        .admin-sidebar { background: #1a1a1a; padding: 20px; display: flex; overflow-x: auto; gap: 10px; }
        @media (min-width: 1024px) { .admin-sidebar { width: 260px; flex-direction: column; } }
        .sidebar-btn { color: #aaa; padding: 15px; cursor: pointer; border-radius: 12px; font-weight: 700; white-space: nowrap; }
        .sidebar-btn.active { background: var(--yesil); color: white; }
        .admin-main { flex: 1; padding: 30px; overflow-y: auto; background: #f4f6f5; }
        
        .admin-card { background: white; padding: 15px 25px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-family: inherit; }
        .btn-add { background: var(--yesil) !important; color: white !important; padding: 15px; width: 100%; border: none; border-radius: 12px; cursor: pointer; font-weight: 800; }
        
        #upload-progress-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 6px; background: #eee; z-index: 20000; }
        #upload-progress-bar { width: 0%; height: 100%; background: var(--sari); transition: width 0.3s; }
    </style>
</head>
<body>

    <div id="upload-progress-container"><div id="upload-progress-bar"></div></div>

    <div id="lightbox" onclick="this.style.display='none'">
        <span class="lb-close">&times;</span>
        <img id="lb-img" src="" onclick="event.stopPropagation()">
    </div>

    <header>
        <div class="club-info"><h1>Kütahya Yeşilay Futbol Okulu</h1></div>
        <nav>
            <a onclick="showPage('home')">ANASAYFA</a>
            <a onclick="showPage('groups')">GRUPLAR</a>
            <a onclick="showPage('coaches')">HOCALAR</a>
            <a onclick="showPage('contact')">İLETİŞİM</a>
            <button class="admin-trigger" onclick="openModal('login-modal')">YÖNETİM</button>
        </nav>
    </header>

    <div class="main-content">
        <div id="page-home" class="page active">
            <h2 class="section-title">ANTRENMAN KARELERİ</h2>
            <div id="public-vitrin" class="grid-responsive" style="grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));"></div>
        </div>

        <div id="page-groups" class="page">
            <h2 class="section-title">Gruplarımız</h2>
            <div id="public-groups" class="grid-responsive"></div>
        </div>

        <div id="page-coaches" class="page">
            <h2 class="section-title">Teknik Kadro</h2>
            <div id="public-coaches" class="grid-responsive hoca-grid"></div>
        </div>

        <div id="page-contact" class="page">
            <h2 class="section-title">İletişim Kanallarımız</h2>
            <div id="public-contact-area" style="background:white; padding:35px; border-radius:30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom:30px; border-left: 15px solid var(--yesil);"></div>
            
            <h2 class="section-title" id="form-title-display">Bize Yazın</h2>
            <div style="background:white; padding:35px; border-radius:30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 10px solid var(--sari);">
                <input type="text" id="v-ad" placeholder="Adınız Soyadınız">
                <input type="tel" id="v-tel" placeholder="Telefon Numaranız">
                <textarea id="v-mesaj" rows="5" placeholder="Mesajınızı buraya yazınız..."></textarea>
                <button class="btn-add" onclick="sendVeliMsg()">MESAJI YÖNETİME GÖNDER</button>
            </div>
        </div>
    </div>

    <div id="admin-panel">
        <div class="admin-nav"><b>YÖNETİM SİSTEMİ</b><button onclick="location.reload()" style="background:red; color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;">ÇIKIŞ</button></div>
        <div style="display:flex; flex:1; overflow:hidden;" class="admin-layout-wrapper">
            <div class="admin-sidebar" id="sidebar-menu"></div>
            <div id="admin-view-content" class="admin-main"></div>
        </div>
    </div>

    <div id="login-modal" class="modal-overlay" onclick="closeModal('login-modal')">
        <div style="background:white; padding:40px; border-radius:30px; width:320px;" onclick="event.stopPropagation()">
            <h3 style="color:var(--yesil); text-align:center; margin-top:0;">Giriş</h3>
            <input type="text" id="u" placeholder="Kullanıcı Adı">
            <input type="password" id="p" placeholder="Şifre">
            <button class="btn-add" onclick="tryLogin()">GİRİŞ YAP</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://yesilay-futbol-okulu-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let db = { vitrin: [], gruplar: [], hocalar: [], iletisim: { adres: "", tels: [], wp: "", formTitle: "" }, mesajlar: [] };
        let currentUser = null;

        database.ref('/').on('value', (snapshot) => { if(snapshot.val()) db = snapshot.val(); renderAll(); });
        function syncDB() { database.ref('/').set(db); }

        // RESİM SIKIŞTIRMA
        async function compressImage(file, maxWidth = 1000) {
            return new Promise((resolve) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image(); img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const scale = maxWidth / img.width;
                        canvas.width = maxWidth; canvas.height = img.height * scale;
                        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                };
            });
        }

        function renderAll() {
            // Vitrin
            const vGrid = document.getElementById('public-vitrin'); vGrid.innerHTML = "";
            (db.vitrin || []).forEach(img => { vGrid.innerHTML += `<img src="${img.src || img}" class="card" style="height:220px; object-fit:cover; padding:0; border:4px solid white;" onclick="openLB('${img.src || img}')" loading="lazy">`; });

            // Gruplar
            const gGrid = document.getElementById('public-groups'); gGrid.innerHTML = "";
            (db.gruplar || []).forEach(g => {
                const src = (g.fotos && g.fotos[0]) ? (g.fotos[0].src || g.fotos[0]) : "";
                gGrid.innerHTML += `<div class="card" onclick="openLB('${src}')"><h3>${g.ad}</h3><div class="saat-kutu">${g.saat}</div><br><small>${(g.fotos||[]).length} Fotoğraf</small></div>`;
            });

            // Hocalar
            const hGrid = document.getElementById('public-coaches'); hGrid.innerHTML = "";
            (db.hocalar || []).forEach(h => {
                const src = h.img ? (h.img.src || h.img) : "";
                hGrid.innerHTML += `<div class="card" onclick="openLB('${src}')"><img src="${src}"><h3>${h.ad}</h3><p>${h.unvan}</p></div>`;
            });

            // İletişim
            const c = db.iletisim || {};
            document.getElementById('public-contact-area').innerHTML = `
                <p style="font-size:1.1rem;">📍 <b>Adres:</b> ${c.adres || 'Eklenmedi'}</p>
                ${(c.tels || []).map(t => `<p style="font-size:1.1rem;">📞 <b>${t.ad}:</b> <a href="tel:${t.tel}" style="color:var(--yesil); text-decoration:none;">${t.tel}</a></p>`).join('')}
                <p style="font-size:1.1rem;">💬 <b>WhatsApp:</b> <a href="https://wa.me/${c.wp}" target="_blank" style="color:var(--yesil); font-weight:bold;">Tıkla Mesaj Gönder</a></p>
            `;
            document.getElementById('form-title-display').innerText = c.formTitle || "Bize Yazın";
        }

        function tryLogin() {
            const u = document.getElementById('u').value.trim().toUpperCase();
            const p = document.getElementById('p').value.trim();
            if(u === "ALİ" && p === "ALİ43") {
                currentUser = { perms: { vit:true, grp:true, hoc:true, con:true } };
                document.getElementById('admin-panel').style.display='flex';
                closeModal('login-modal');
                buildSidebar();
            } else alert("Hatalı!");
        }

        function buildSidebar() {
            const s = document.getElementById('sidebar-menu');
            s.innerHTML = `
                <div class="sidebar-btn" onclick="adminTab('vitrin', this)">🖼️ VİTRİN</div>
                <div class="sidebar-btn" onclick="adminTab('groups', this)">⚽ GRUPLAR</div>
                <div class="sidebar-btn" onclick="adminTab('coaches', this)">👤 HOCALAR</div>
                <div class="sidebar-btn" onclick="adminTab('contact', this)">📞 AYARLAR</div>
                <div class="sidebar-btn" onclick="adminTab('msgs', this)" style="background:var(--sari); color:var(--yesil)">📩 MESAJLAR (${(db.mesajlar||[]).length})</div>
            `;
            s.firstChild.click();
        }

        function adminTab(tab, btn) {
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
            const v = document.getElementById('admin-view-content'); v.innerHTML = "";

            if(tab === 'contact') {
                const c = db.iletisim || {};
                v.innerHTML = `
                    <h3>Genel Bilgiler</h3>
                    <input id="adm-adres" placeholder="Kulüp Adresi" value="${c.adres||''}">
                    <input id="adm-wp" placeholder="WhatsApp (905...)" value="${c.wp||''}">
                    <input id="adm-form" placeholder="Form Başlığı (Örn: Bize Yazın)" value="${c.formTitle||''}">
                    <button class="btn-add" onclick="saveContact()">BİLGİLERİ GÜNCELLE</button>
                    <hr style="margin:20px 0;">
                    <h4>Telefon Numaraları</h4>
                    <button class="btn-add" style="width:auto; padding:8px 15px;" onclick="addTel()">+ Yeni Numara Ekle</button>
                    <div id="adm-tel-list" style="margin-top:15px;"></div>
                `;
                (c.tels || []).forEach((t, i) => {
                    document.getElementById('adm-tel-list').innerHTML += `<div class="admin-card"><b>${t.ad}: ${t.tel}</b><button onclick="delTel(${i})" style="color:red; border:none; background:none; cursor:pointer;">Sil</button></div>`;
                });
            } else if(tab === 'vitrin') {
                v.innerHTML = `<h3>Vitrin (Sürükle Yükle)</h3><input type="file" multiple onchange="upVit(event)"><div id="v-list" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(120px, 1fr)); gap:10px; margin-top:20px;"></div>`;
                (db.vitrin || []).forEach((img, i) => {
                    document.getElementById('v-list').innerHTML += `<div style="position:relative;"><img src="${img.src || img}" style="width:100%; height:80px; object-fit:cover; border-radius:10px;"><button onclick="delVit(${i})" style="position:absolute; top:0; right:0; background:red; color:white; border:none; cursor:pointer; border-radius:5px;">X</button></div>`;
                });
            } else if(tab === 'coaches') {
                v.innerHTML = `<h3>Teknik Kadro</h3><button class="btn-add" style="width:auto;" onclick="addCoach()">+ Hoca Ekle</button><div id="h-list" style="margin-top:20px;"></div>`;
                (db.hocalar || []).forEach((h, i) => {
                    v.querySelector('#h-list').innerHTML += `<div class="admin-card"><b>${h.ad}</b> <button onclick="delCoach(${i})" style="color:red; border:none; background:none; cursor:pointer;">SİL</button></div>`;
                });
            } else if(tab === 'msgs') {
                (db.mesajlar || []).forEach((m, i) => {
                    v.innerHTML += `<div class="admin-card" style="flex-direction:column; align-items:flex-start;">
                        <b>${m.ad}</b> <small>${m.tel}</small><p style="margin:5px 0;">${m.msg}</p><small style="color:#888;">${m.tarih}</small>
                        <button onclick="delMsg(${i})" style="color:red; border:none; background:none; cursor:pointer; align-self:flex-end;">BU MESAJI SİL</button>
                    </div>`;
                });
            } else if(tab === 'groups') {
                v.innerHTML = `<h3>Gruplar</h3><button class="btn-add" style="width:auto;" onclick="addGroup()">+ Yeni Grup</button><div id="g-list" style="margin-top:20px;"></div>`;
                (db.gruplar || []).forEach((g, i) => {
                    v.querySelector('#g-list').innerHTML += `<div class="admin-card"><b>${g.ad}</b> <div><button onclick="upGImg(${i})">Foto Ekle</button> <button onclick="delGroup(${i})" style="color:red; margin-left:10px;">SİL</button></div></div>`;
                });
            }
        }

        // --- KAYIT VE SİLME FONKSİYONLARI ---
        function saveContact() { db.iletisim.adres = document.getElementById('adm-adres').value; db.iletisim.wp = document.getElementById('adm-wp').value; db.iletisim.formTitle = document.getElementById('adm-form').value; syncDB(); alert("Güncellendi!"); }
        function addTel() { const ad = prompt("İsim:"), tel = prompt("Numara:"); if(ad && tel) { if(!db.iletisim.tels) db.iletisim.tels = []; db.iletisim.tels.push({ad, tel}); syncDB(); adminTab('contact', document.querySelector('.sidebar-btn.active')); } }
        function delTel(i) { db.iletisim.tels.splice(i, 1); syncDB(); adminTab('contact', document.querySelector('.sidebar-btn.active')); }
        function delVit(i) { db.vitrin.splice(i, 1); syncDB(); adminTab('vitrin', document.querySelector('.sidebar-btn.active')); }
        function delMsg(i) { db.mesajlar.splice(i, 1); syncDB(); adminTab('msgs', document.querySelector('.sidebar-btn.active')); }
        function delCoach(i) { if(confirm("Hoca silinsin mi?")) { db.hocalar.splice(i,1); syncDB(); adminTab('coaches', document.querySelector('.sidebar-btn.active')); } }
        function delGroup(i) { if(confirm("Grup silinsin mi?")) { db.gruplar.splice(i,1); syncDB(); adminTab('groups', document.querySelector('.sidebar-btn.active')); } }

        async function upVit(e) {
            document.getElementById('upload-progress-container').style.display='block';
            for(let f of e.target.files) {
                const comp = await compressImage(f);
                if(!db.vitrin) db.vitrin = []; db.vitrin.unshift({src: comp});
            }
            syncDB(); document.getElementById('upload-progress-container').style.display='none'; adminTab('vitrin', document.querySelector('.sidebar-btn.active'));
        }

        function addCoach() {
            const ad = prompt("Hoca Adı:"); if(!ad) return;
            const inp = document.createElement('input'); inp.type = 'file';
            inp.onchange = async e => {
                const comp = await compressImage(e.target.files[0], 400);
                if(!db.hocalar) db.hocalar = [];
                db.hocalar.push({ad, unvan: "Antrenör", img: {src: comp}});
                syncDB(); adminTab('coaches', document.querySelector('.sidebar-btn.active'));
            }; inp.click();
        }

        function addGroup() {
            const ad = prompt("Grup Adı:"), saat = prompt("Saat:");
            if(ad) { if(!db.gruplar) db.gruplar = []; db.gruplar.push({ad, saat, fotos:[]}); syncDB(); adminTab('groups', document.querySelector('.sidebar-btn.active')); }
        }

        async function upGImg(i) {
            const inp = document.createElement('input'); inp.type = 'file';
            inp.onchange = async e => {
                const comp = await compressImage(e.target.files[0]);
                if(!db.gruplar[i].fotos) db.gruplar[i].fotos = [];
                db.gruplar[i].fotos.push({src: comp});
                syncDB(); alert("Fotoğraf eklendi.");
            }; inp.click();
        }

        function sendVeliMsg() {
            const ad = document.getElementById('v-ad').value, tel = document.getElementById('v-tel').value, msg = document.getElementById('v-mesaj').value;
            if(!ad || !msg) return alert("Ad ve Mesaj alanları zorunludur!");
            if(!db.mesajlar) db.mesajlar = [];
            db.mesajlar.unshift({ ad, tel, msg, tarih: new Date().toLocaleString() });
            syncDB(); alert("Mesajınız iletildi."); document.getElementById('v-ad').value=""; document.getElementById('v-tel').value=""; document.getElementById('v-mesaj').value="";
        }

        // Modallar ve LB
        function openLB(s) { if(s){ document.getElementById('lb-img').src=s; document.getElementById('lightbox').style.display='flex'; } }
        function openModal(id) { document.getElementById(id).style.display='flex'; }
        function closeModal(id) { document.getElementById(id).style.display='none'; }
        function showPage(p) { document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active')); document.getElementById('page-' + p).classList.add('active'); window.scrollTo(0,0); }
    </script>
</body>
</html>
