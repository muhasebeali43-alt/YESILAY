<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kütahya Yeşilay Futbol Okulu | Yönetim</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --yesil: #006a33; --sari: #f1c40f; --dark: #121212; --light: #f8faf9; }
        body, html { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: var(--light); color: #333; font-size: 18px; }

        /* --- DEV VE HEYBETLİ BAŞLIK --- */
        header { 
            background: linear-gradient(135deg, var(--yesil) 0%, #004d26 100%); color: white; padding: 40px 5%; 
            display: flex; flex-direction: column; align-items: center; 
            border-bottom: 8px solid var(--sari); box-shadow: 0 8px 25px rgba(0,0,0,0.3); 
        }
        @media (min-width: 1024px) { header { flex-direction: row; justify-content: space-between; padding: 45px 80px; } }
        .club-info h1 { font-size: 2.3rem; font-weight: 900; text-transform: uppercase; margin: 0; letter-spacing: 2px; text-shadow: 3px 3px 0 rgba(0,0,0,0.1); }
        
        nav { margin-top: 25px; display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        nav a { color: white; text-decoration: none; font-weight: 800; font-size: 1.1rem; cursor: pointer; text-transform: uppercase; }
        .admin-trigger { background: var(--sari); color: var(--yesil) !important; padding: 12px 25px; border-radius: 12px; font-weight: 900; border: none; cursor: pointer; font-size: 1.1rem; }

        .main-content { padding: 40px 5%; box-sizing: border-box; }
        @media (min-width: 1024px) { .main-content { padding: 50px 80px; } }
        .page { display: none; }
        .page.active { display: block; }
        .section-title { font-weight: 900; font-size: 2.2rem; color: var(--yesil); border-left: 15px solid var(--sari); padding-left: 20px; text-transform: uppercase; margin-bottom: 40px; }

        .home-layout { display: flex; flex-direction: column; gap: 40px; }
        @media (min-width: 1024px) { .home-layout { display: grid; grid-template-columns: 3fr 1.2fr; gap: 50px; align-items: start; } }
        
        /* 4'LÜ IZGARA DÜZENİ */
        .grid-4 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        @media (min-width: 1200px) { .grid-4 { grid-template-columns: repeat(4, 1fr); gap: 25px; } }
        .v-img { width: 100%; height: 280px; object-fit: cover; border-radius: 25px; border: 6px solid white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s; }

        /* --- AKILLI DUYURU PANOSU (MAX 4) --- */
        .ann-sidebar { 
            background: white; padding: 30px; border-radius: 35px; border-top: 12px solid var(--sari); 
            box-shadow: 0 15px 40px rgba(0,0,0,0.08); height: auto; transition: all 0.5s ease;
        }
        .ann-box { background: #fafafa; padding: 25px; border-radius: 20px; margin-bottom: 20px; border-left: 8px solid var(--yesil); }
        .ann-box h4 { margin: 0 0 10px 0; color: var(--yesil); font-weight: 800; font-size: 1.2rem; }
        .ann-box p { margin: 0; font-size: 1.1rem; line-height: 1.4; color: #555; }

        /* HOCA KARTLARI (HEYBETLİ) */
        .coach-card { background: white; padding: 45px 20px; border-radius: 35px; text-align: center; border-bottom: 10px solid var(--yesil); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .coach-card img { width: 180px; height: 180px; border-radius: 50%; border: 7px solid var(--yesil); object-fit: cover; margin-bottom: 20px; cursor: pointer; }

        /* LIGHTBOX */
        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 10000; justify-content: center; align-items: center; cursor: pointer; }
        #lb-img { max-width: 90%; max-height: 85vh; border: 6px solid white; border-radius: 20px; }

        /* YÖNETİM PANELİ (KİBAR TASARIM) */
        #admin-panel { display: none; position: fixed; inset: 0; background: #fff; z-index: 5000; flex-direction: column; }
        .admin-nav { background: var(--dark); color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 6px solid var(--sari); }
        .admin-layout { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        @media (min-width: 1024px) { .admin-layout { flex-direction: row; } }
        .admin-sidebar { background: #262626; padding: 20px; display: flex; overflow-x: auto; gap: 12px; }
        @media (min-width: 1024px) { .admin-sidebar { width: 240px; flex-direction: column; } }
        .sidebar-btn { color: #aaa; padding: 14px 20px; cursor: pointer; border-radius: 12px; font-weight: 700; font-size: 1rem; }
        .sidebar-btn.active { background: var(--yesil); color: white; }
        .admin-main { flex: 1; padding: 30px; overflow-y: auto; background: #f9f9f9; }
        .admin-card { background: white; padding: 12px 18px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; font-size: 0.95rem; }
        .admin-btn { border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 0.8rem; margin-left: 5px; }

        input, textarea { width: 100%; padding: 15px; margin: 12px 0; border: 1px solid #ddd; border-radius: 12px; font-family: inherit; font-size: 1.1rem; box-sizing: border-box; }
        .btn-ok { background: var(--yesil) !important; color: white !important; padding: 18px; width: 100%; border: none; border-radius: 15px; cursor: pointer; font-weight: 900; font-size: 1.2rem; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 6000; justify-content: center; align-items: center; padding: 25px; }
        .modal-box { background: white; padding: 35px; border-radius: 35px; width: 95%; max-width: 500px; position: relative; max-height: 90vh; overflow-y: auto; }
        .modal-close { position: absolute; top: 15px; right: 20px; font-size: 30px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="upload-progress-container" style="display:none; position:fixed; top:0; left:0; width:100%; height:8px; background: #eee; z-index: 20000;"><div id="upload-progress-bar" style="width:0%; height:100%; background: var(--yesil); transition: 0.3s;"></div></div>
    <div id="lightbox" onclick="this.style.display='none'"><img id="lb-img" src=""></div>

    <header>
        <div class="club-info"><h1>KÜTAHYA YEŞİLAY FUTBOL OKULU</h1></div>
        <nav>
            <a onclick="showPage('home')">ANASAYFA</a>
            <a onclick="showPage('groups')">GRUPLAR</a>
            <a onclick="showPage('coaches')">HOCALAR</a>
            <a onclick="showPage('contact')">İLETİŞİM / BİZE YAZIN</a>
            <button class="admin-trigger" onclick="openModal('login-modal')">YÖNETİM</button>
        </nav>
    </header>

    <div class="main-content">
        <div id="page-home" class="page active">
            <div class="home-layout">
                <div><h2 class="section-title">ANTRENMANDAN KARELER</h2><div id="p-vit" class="grid-4"></div></div>
                <div class="ann-sidebar">
                    <h3 style="color:var(--yesil); margin-bottom:20px; font-weight:900;">📢 DUYURULAR</h3>
                    <div id="p-ann"></div>
                </div>
            </div>
        </div>

        <div id="page-groups" class="page"><h2 class="section-title">Gruplarımız</h2><div id="p-grp" class="grid-4"></div></div>

        <div id="page-coaches" class="page"><h2 class="section-title">Teknik Kadro</h2><div id="p-hoc" class="grid-4"></div></div>

        <div id="page-contact" class="page">
            <h2 class="section-title">İletişim & Adres</h2>
            <div id="p-con" style="background:white; padding:40px; border-radius:30px; box-shadow:0 10px 30px rgba(0,0,0,0.05); margin-bottom:35px;"></div>
            <div id="p-adr" style="background:#fff; padding:40px; border-radius:30px; border-left:20px solid var(--sari); box-shadow:0 10px 30px rgba(0,0,0,0.05); font-size:1.4rem; line-height:1.6;"></div>
            
            <h2 class="section-title">Bize Yazın</h2>
            <div style="background:white; padding:45px; border-radius:35px; box-shadow:0 15px 40px rgba(0,0,0,0.08); border-top:12px solid var(--sari);">
                <input type="text" id="v-ad" placeholder="Ad Soyad"><input type="tel" id="v-tel" placeholder="Telefon">
                <textarea id="v-mesaj" rows="5" placeholder="Mesajınızı buraya yazınız..."></textarea>
                <button class="btn-ok" onclick="sendVeliMsg()">GÖNDER</button>
            </div>
        </div>
    </div>

    <div id="admin-panel">
        <div class="admin-nav"><b>YÖNETİCİ KABİNİ</b><button onclick="location.reload()" style="background:red; color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:900;">ÇIKIŞ</button></div>
        <div class="admin-layout">
            <div class="admin-sidebar" id="sidebar-menu"></div>
            <div id="admin-view-content" class="admin-main"></div>
        </div>
    </div>

    <div id="login-modal" class="modal-overlay" onclick="closeModal('login-modal')">
        <div class="modal-box" style="max-width:350px;" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeModal('login-modal')">&times;</span>
            <h3 style="color:var(--yesil); text-align:center;">Giriş</h3>
            <input type="text" id="u" placeholder="Kullanıcı"><input type="password" id="p" placeholder="Şifre">
            <button class="btn-ok" onclick="tryLogin()">GİRİŞ</button>
        </div>
    </div>

    <div id="user-modal" class="modal-overlay" onclick="closeModal('user-modal')">
        <div class="modal-box" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeModal('user-modal')">&times;</span>
            <h3 id="user-title">Yetki Tanımları</h3>
            <input type="text" id="new-u" placeholder="Kullanıcı"><input type="password" id="new-p" placeholder="Şifre">
            <div id="perm-box" style="text-align:left; border:1px solid #eee; padding:20px; border-radius:15px; font-size: 0.9rem;">
                <label><input type="checkbox" id="p-vit"> Vitrin</label><br><label><input type="checkbox" id="p-grp"> Gruplar</label><br>
                <label><input type="checkbox" id="p-hoc"> Hocalar</label><br><label><input type="checkbox" id="p-ann"> Duyurular</label><br>
                <label><input type="checkbox" id="p-con"> İletişim</label>
            </div>
            <button class="btn-ok" onclick="saveUser()">KAYDET</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://yesilay-futbol-okulu-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let db = { vitrin: [], gruplar: [], hocalar: [], duyurular: [], iletisim: { rehber: [], adres: "" }, users: [], mesajlar: [] };
        let currentUser = null, editingUserIdx = null;

        database.ref('/').on('value', (s) => { 
            if(s.val()) db = s.val(); 
            if(!db.iletisim) db.iletisim = { rehber: [], adres: "" };
            if(!db.users || !db.users.find(u => u.isFounder)) {
                if(!db.users) db.users = [];
                db.users.unshift({u: "ALİ", p: "ALİ43", isFounder: true, perms: {vit:true, grp:true, hoc:true, ann:true, con:true, usr:true}});
                database.ref('/').set(db);
            }
            renderAll();
            if(currentUser) adminTab(document.querySelector('.sidebar-btn.active')?.dataset.tab || 'vitrin', document.querySelector('.sidebar-btn.active'));
        });

        function renderAll() {
            const vGrid = document.getElementById('p-vit'); vGrid.innerHTML = "";
            (db.vitrin || []).forEach(img => { const src = typeof img === 'string' ? img : img.src; vGrid.innerHTML += `<img src="${src}" class="v-img" onclick="openLB('${src}')">`; });
            const aL = document.getElementById('p-ann'); aL.innerHTML = "";
            (db.duyurular || []).slice(0,4).forEach(a => { aL.innerHTML += `<div class="ann-box"><h4>${a.baslik}</h4><p>${a.metin}</p></div>`; });
            const gG = document.getElementById('p-grp'); gG.innerHTML = "";
            (db.gruplar || []).forEach(g => { gG.innerHTML += `<div class="coach-card" style="cursor:pointer;" onclick="showPage('groups')"><h3>${g.ad}</h3><p style="color:var(--yesil); font-weight:bold;">${g.saat || ''}</p></div>`; });
            const hG = document.getElementById('p-hoc'); hG.innerHTML = "";
            (db.hocalar || []).forEach(h => { const src = h.img ? (typeof h.img === 'string' ? h.img : h.img.src) : ""; hG.innerHTML += `<div class="coach-card"><img src="${src}" onclick="openLB('${src}')"><h3>${h.ad}</h3><p>${h.unvan || ''}</p></div>`; });
            const cL = document.getElementById('p-con'); cL.innerHTML = "";
            (db.iletisim.rehber || []).forEach(c => { cL.innerHTML += `<p style="font-size:1.3rem; margin:10px 0; border-bottom:1px solid #f0f0f0; padding-bottom:10px;">👤 <b>${c.ad}:</b> <a href="tel:${c.tel}" style="color:var(--yesil); text-decoration:none; font-weight:bold;">${c.tel}</a></p>`; });
            document.getElementById('p-adr').innerHTML = `📍 <b>Okul Adresi:</b><br>${db.iletisim.adres || 'Eklenmemiş'}`;
        }

        // --- SIKIŞTIRMA VE PANEL FONKSİYONLARI ---
        async function compress(b64) {
            return new Promise(r => {
                const img = new Image(); img.src = b64;
                img.onload = () => {
                    const canvas = document.createElement('canvas'); const m = 1200;
                    let w = img.width, h = img.height;
                    if(w > h) { if(w > m) { h *= m/w; w = m; } } else { if(h > m) { w *= m/h; h = m; } }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, w, h);
                    r(canvas.toDataURL('image/jpeg', 0.75));
                };
            });
        }
        async function runUp(files, cb) {
            const total = files.length; document.getElementById('upload-progress-container').style.display='block';
            for(let i=0; i<total; i++) {
                const b64 = await new Promise(r => { const fr = new FileReader(); fr.onload = e => r(e.target.result); fr.readAsDataURL(files[i]); });
                const comp = await compress(b64); cb(comp); document.getElementById('upload-progress-bar').style.width = ((i+1)/total*100)+'%';
            }
            setTimeout(()=>document.getElementById('upload-progress-container').style.display='none', 1000);
        }

        function adminTab(tab, btn) {
            if(!btn) return;
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
            const v = document.getElementById('admin-view-content'); v.innerHTML = "";
            if(tab === 'vitrin') {
                v.innerHTML = `<h4>Vitrin</h4><input type="file" multiple onchange="upVitBulk(event)"><div id="v-sort" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(110px, 1fr)); gap:12px; margin-top:20px;"></div>`;
                (db.vitrin || []).forEach((img, i) => { const src = typeof img === 'string' ? img : img.src; v.querySelector('#v-sort').innerHTML += `<div class="admin-card" style="flex-direction:column; padding:10px;"><img src="${src}" style="width:100%; height:70px; object-fit:cover;"><button class="admin-btn" style="color:red" onclick="del('vitrin',${i})">Sil</button></div>`; });
            }
            else if(tab === 'groups') {
                v.innerHTML = `<button class="admin-btn" style="background:var(--yesil); color:white; padding:10px 20px; margin-bottom:15px;" onclick="addG()">+ Grup</button><div id="g-sort"></div>`;
                (db.gruplar || []).forEach((g, i) => { v.querySelector('#g-sort').innerHTML += `<div class="admin-card"><b>${g.ad}</b><div><button class="admin-btn" onclick="editG(${i})">Düzelt</button><button class="admin-btn" style="color:red" onclick="del('gruplar',${i})">Sil</button></div></div>`; });
            }
            else if(tab === 'coaches') {
                v.innerHTML = `<button class="admin-btn" style="background:var(--yesil); color:white; margin-bottom:15px;" onclick="addC()">+ Hoca</button><div id="c-sort"></div>`;
                (db.hocalar || []).forEach((h, i) => { const src = h.img ? (typeof h.img === 'string' ? h.img : h.img.src) : ""; v.querySelector('#c-sort').innerHTML += `<div class="admin-card"><div style="display:flex;align-items:center;gap:10px;"><img src="${src}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;"><b>${h.ad}</b></div><div><button class="admin-btn" onclick="editC(${i})">Ad/Unvan</button><button class="admin-btn" onclick="upHImg(${i})">Foto</button><button class="admin-btn" style="color:red" onclick="del('hocalar',${i})">Sil</button></div></div>`; });
            }
            else if(tab === 'anns') {
                v.innerHTML = `<button class="admin-btn" style="background:var(--yesil); color:white; padding:10px 20px; margin-bottom:15px;" onclick="addA()">+ Duyuru</button><div id="a-sort"></div>`;
                (db.duyurular || []).forEach((a, i) => { v.querySelector('#a-sort').innerHTML += `<div class="admin-card"><b>${a.baslik}</b><button class="admin-btn" style="color:red" onclick="del('duyurular',${i})">Sil</button></div>`; });
            }
            else if(tab === 'contact') {
                v.innerHTML = `<h4>Rehber</h4><button class="admin-btn" style="background:var(--yesil); color:white; margin-bottom:10px;" onclick="addCt()">+ Ekle</button><div id="ct-list"></div><h4>Adres</h4><textarea id="adr-in" rows="3">${db.iletisim.adres||''}</textarea><button class="btn-ok" style="width:200px" onclick="saveAdr()">KAYDET</button>`;
                (db.iletisim.rehber || []).forEach((c, i) => { v.querySelector('#ct-list').innerHTML += `<div class="admin-card"><b>${c.ad}</b>: ${c.tel}<button class="admin-btn" style="color:red" onclick="delCt(${i})">Sil</button></div>`; });
            }
            else if(tab === 'users') {
                v.innerHTML = `<button class="admin-btn" style="background:var(--yesil); color:white; margin-bottom:10px;" onclick="openUserModal()">+ Yetkili</button><div id="u-list"></div>`;
                (db.users || []).forEach((u, i) => { v.innerHTML += `<div class="admin-card"><b>${u.u} ${u.isFounder?'(K)':''}</b><button class="admin-btn" onclick="openUserModal(${i})">Yetkiler</button></div>`; });
            }
        }

        function upVitBulk(e) { runUp(e.target.files, (res) => { if(!db.vitrin) db.vitrin=[]; db.vitrin.unshift({src:res}); database.ref('/').set(db); }); }
        function addG() { const n=prompt("Grup:"), s=prompt("Saat:"); if(n) { if(!db.gruplar) db.gruplar=[]; db.gruplar.push({ad:n, saat:s}); database.ref('/').set(db); } }
        function editG(i) { const n=prompt("Ad:", db.gruplar[i].ad), s=prompt("Saat:", db.gruplar[i].saat); if(n) { db.gruplar[i].ad=n; db.gruplar[i].saat=s; database.ref('/').set(db); } }
        function addC() { const n=prompt("Hoca:"), u=prompt("Unvan:"); if(n) { if(!db.hocalar) db.hocalar=[]; db.hocalar.push({ad:n, unvan:u, img:""}); database.ref('/').set(db); } }
        function editC(i) { const n=prompt("Ad:", db.hocalar[i].ad), u=prompt("Unvan:", db.hocalar[i].unvan); if(n) { db.hocalar[i].ad=n; db.hocalar[i].unvan=u; database.ref('/').set(db); } }
        function upHImg(i) { const inp=document.createElement('input'); inp.type='file'; inp.onchange=e=>{ runUp(e.target.files, (res) => { db.hocalar[i].img=res; database.ref('/').set(db); }); }; inp.click(); }
        function addA() { const b=prompt("Duyuru Başlığı:"), m=prompt("Mesaj:"); if(b) { if(!db.duyurular) db.duyurular=[]; db.duyurular.unshift({baslik:b, metin:m}); database.ref('/').set(db); } }
        function addCt() { const n=prompt("İsim:"), t=prompt("Tel:"); if(n) { db.iletisim.rehber.push({ad:n, tel:t}); database.ref('/').set(db); } }
        function saveAdr() { db.iletisim.adres = document.getElementById('adr-in').value; database.ref('/').set(db); alert("Kaydedildi!"); }
        function delCt(i) { if(confirm("Sil?")) { db.iletisim.rehber.splice(i,1); database.ref('/').set(db); } }
        function del(p, i) { if(confirm("Sil?")) { db[p].splice(i,1); database.ref('/').set(db); } }
        function openUserModal(idx = null) { editingUserIdx = idx; const u = idx !== null ? db.users[idx] : null; document.getElementById('new-u').value = u ? u.u : ""; document.getElementById('new-p').value = u ? u.p : ""; openModal('user-modal'); }
        function saveUser() { const u = document.getElementById('new-u').value.trim(), p = document.getElementById('new-p').value.trim(); if(!u || !p) return alert("Hata!"); let perms = { vit:document.getElementById('p-vit').checked, grp:document.getElementById('p-grp').checked, hoc:document.getElementById('p-hoc').checked, ann:document.getElementById('p-ann').checked, con:document.getElementById('p-con').checked }; if(editingUserIdx !== null) { const f = db.users[editingUserIdx].isFounder; db.users[editingUserIdx] = {u, p, perms: f ? {vit:true,grp:true,hoc:true,ann:true,con:true,usr:true} : perms, isFounder: f}; } else { db.users.push({u, p, perms, isFounder:false}); } database.ref('/').set(db); closeModal('user-modal'); }
        function tryLogin() { const u=document.getElementById('u').value.trim().toUpperCase(), p=document.getElementById('p').value.trim(); currentUser = (db.users || []).find(user => user.u.toUpperCase() === u && user.p.toUpperCase() === p); if(currentUser) { buildAdminSidebar(); closeModal('login-modal'); document.getElementById('admin-panel').style.display='flex'; } else alert("Hata!"); }
        function buildAdminSidebar() { 
            const s = document.getElementById('sidebar-menu'); const p = currentUser.perms; s.innerHTML = "";
            if(p.vit) s.innerHTML += `<div class="sidebar-btn" data-tab="vitrin" onclick="adminTab('vitrin', this)">🖼️ Vitrin</div>`;
            if(p.grp) s.innerHTML += `<div class="sidebar-btn" data-tab="groups" onclick="adminTab('groups', this)">⚽ Gruplar</div>`;
            if(p.hoc) s.innerHTML += `<div class="sidebar-btn" data-tab="coaches" onclick="adminTab('coaches', this)">👤 Hocalar</div>`;
            if(p.ann) s.innerHTML += `<div class="sidebar-btn" data-tab="anns" onclick="adminTab('anns', this)">📢 Duyurular</div>`;
            if(p.con) s.innerHTML += `<div class="sidebar-btn" data-tab="contact" onclick="adminTab('contact', this)">📞 İletişim</div>`;
            if(p.usr) s.innerHTML += `<div class="sidebar-btn" data-tab="users" onclick="adminTab('users', this)" style="color:var(--sari)">🔑 Yetkililer</div>`;
            s.firstChild.click(); 
        }
        function openLB(s) { document.getElementById('lb-img').src = s; document.getElementById('lightbox').style.display = 'flex'; }
        function openModal(id) { document.getElementById(id).style.display='flex'; }
        function closeModal(id) { document.getElementById(id).style.display='none'; }
        function showPage(p) { document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active')); document.getElementById('page-' + p).classList.add('active'); window.scrollTo(0,0); }
        function sendVeliMsg() { alert("Gönderildi."); }
    </script>
</body>
</html>
