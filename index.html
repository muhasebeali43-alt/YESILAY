<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kütahya Yeşilay Futbol Okulu | Yönetim</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --yesil: #006a33; --sari: #f1c40f; --dark: #121212; --light: #f8faf9; --beyaz: #ffffff; }
        body, html { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: var(--light); color: #333; overflow-x: hidden; }

        header { background: linear-gradient(135deg, var(--yesil) 0%, #004d26 100%); color: white; padding: 25px 5%; display: flex; flex-direction: column; align-items: center; border-bottom: 7px solid var(--sari); box-shadow: 0 5px 20px rgba(0,0,0,0.4); }
        @media (min-width: 1024px) { header { flex-direction: row; justify-content: space-between; padding: 25px 80px; } }
        .club-info h1 { font-size: 1.6rem; font-weight: 900; text-transform: uppercase; margin: 0; letter-spacing: 2px; }
        nav { margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        nav a { color: white; text-decoration: none; font-weight: 700; font-size: 0.9rem; cursor: pointer; text-transform: uppercase; }
        .admin-trigger { background: var(--sari); color: var(--yesil) !important; padding: 8px 15px; border-radius: 10px; font-weight: 900; border: none; cursor: pointer; }

        #upload-progress-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 6px; background: #eee; z-index: 20000; }
        #upload-progress-bar { width: 0%; height: 100%; background: var(--sari); transition: width 0.3s; box-shadow: 0 0 10px var(--sari); }
        #upload-status-text { display: none; position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: var(--dark); color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; z-index: 20001; font-weight: bold; }

        .main-content { padding: 40px 5%; box-sizing: border-box; }
        @media (min-width: 1024px) { .main-content { padding: 40px 80px; } }
        .page { display: none; }
        .page.active { display: block; }
        .section-title { font-weight: 900; font-size: 2rem; color: var(--yesil); border-left: 12px solid var(--sari); padding-left: 20px; text-transform: uppercase; margin-bottom: 30px; }

        .home-layout { display: flex; flex-direction: column; gap: 30px; }
        @media (max-width: 1023px) { .ann-sidebar { order: -1; } } 
        @media (min-width: 1024px) { .home-layout { display: grid; grid-template-columns: 3fr 1.2fr; gap: 40px; align-items: start; } }
        
        .vitrin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .vitrin-img { width: 100%; height: 220px; object-fit: cover; border-radius: 20px; border: 5px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; background: #eee; }

        .ann-sidebar { background: white; padding: 25px; border-radius: 30px; border-top: 10px solid var(--sari); box-shadow: 0 10px 30px rgba(0,0,0,0.06); }
        .ann-box { background: #fafafa; padding: 18px; border-radius: 15px; margin-bottom: 15px; border-left: 6px solid var(--yesil); }

        .grid-responsive { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; padding: 30px 15px; border-radius: 25px; text-align: center; border-bottom: 6px solid var(--yesil); box-shadow: 0 10px 25px rgba(0,0,0,0.04); cursor: pointer; position: relative; }
        .card img { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; border: 5px solid var(--yesil); margin-bottom: 15px; background: #eee; }
        .saat-kutu { background: var(--sari); color: var(--yesil); font-size: 0.75rem; font-weight: 800; padding: 5px 10px; border-radius: 8px; margin-top: 10px; display: inline-block; }

        .wp-btn { display: block; background: #25d366; color: white !important; padding: 15px; border-radius: 15px; text-decoration: none; font-weight: 800; text-align: center; margin-top: 20px; font-size: 1.1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 10000; justify-content: center; align-items: center; padding: 20px; cursor: pointer; }
        #lb-img { max-width: 95%; max-height: 85vh; border: 5px solid white; border-radius: 15px; box-shadow: 0 0 50px rgba(0,0,0,0.5); object-fit: contain; }

        #admin-panel { display: none; position: fixed; inset: 0; background: #fff; z-index: 5000; flex-direction: column; }
        .admin-nav { background: var(--dark); color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 6px solid var(--sari); }
        .admin-layout { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        @media (min-width: 1024px) { .admin-layout { flex-direction: row; } }
        .admin-sidebar { background: #1a1a1a; padding: 20px; display: flex; overflow-x: auto; gap: 10px; }
        @media (min-width: 1024px) { .admin-sidebar { width: 260px; flex-direction: column; } }
        .sidebar-btn { color: #aaa; padding: 15px; cursor: pointer; border-radius: 12px; font-weight: 700; white-space: nowrap; }
        .sidebar-btn.active { background: var(--yesil); color: white; }
        .admin-main { flex: 1; padding: 30px; overflow-y: auto; background: #f4f6f5; }
        .admin-card { background: white; padding: 15px 25px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; cursor: grab; }
        
        .pos-btn { padding: 4px 8px; font-size: 0.7rem; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; margin: 2px; background: white; }
        .pos-btn.active { background: var(--yesil); color: white; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 6000; justify-content: center; align-items: center; padding: 20px; }
        .modal-box { background: white; padding: 40px; border-radius: 30px; width: 100%; max-width: 500px; position: relative; text-align: center; max-height: 90vh; overflow-y: auto; }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-family: inherit; }
        .btn-add { background: var(--yesil) !important; color: white !important; padding: 15px; width: 100%; border: none; border-radius: 12px; cursor: pointer; font-weight: 800; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="upload-progress-container"><div id="upload-progress-bar"></div></div>
    <div id="upload-status-text">İşleniyor...</div>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lb-img" src="">
    </div>

    <header>
        <div class="club-info"><h1>Kütahya Yeşilay Futbol Okulu</h1></div>
        <nav>
            <a onclick="showPage('home')">ANASAYFA</a>
            <a onclick="showPage('groups')">GRUPLAR</a>
            <a onclick="showPage('coaches')">HOCALAR</a>
            <a onclick="showPage('contact')">İLETİŞİM / BİZE YAZIN</a>
            <button class="admin-trigger" onclick="openModal('login-modal')">YÖNETİM</button>
        </nav>
    </header>

    <div class="main-content">
        <div id="page-home" class="page active">
            <div class="home-layout">
                <div><h2 class="section-title">ANTRENMAN KARELERİ</h2><div id="public-vitrin" class="vitrin-grid"></div></div>
                <div class="ann-sidebar"><h3 style="color:var(--yesil); margin:0 0 20px 0;">📢 DUYURULAR</h3><div id="public-anns"></div></div>
            </div>
        </div>
        <div id="page-groups" class="page"><h2 class="section-title">Gruplarımız</h2><div id="public-groups" class="grid-responsive"></div></div>
        <div id="page-coaches" class="page"><h2 class="section-title">Teknik Kadro</h2><div id="public-coaches" class="grid-responsive"></div></div>
        
        <div id="page-contact" class="page">
            <h2 class="section-title">İletişim Kanallarımız</h2>
            <div style="background:white; padding:35px; border-radius:30px; border-left:20px solid var(--yesil); box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 40px;">
                <div id="public-contact"></div>
                <a id="public-wp" href="#" target="_blank" class="wp-btn">🟢 WHATSAPP İLE MESAJ GÖNDER</a>
            </div>
            <h2 class="section-title">Bize Yazın</h2>
            <div style="background:white; padding:35px; border-radius:30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 10px solid var(--sari);">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px;">
                    <input type="text" id="v-ad" placeholder="Adınız Soyadınız">
                    <input type="tel" id="v-tel" placeholder="Telefon Numaranız">
                </div>
                <textarea id="v-mesaj" rows="5" placeholder="Mesajınızı buraya yazınız..."></textarea>
                <button class="btn-add" onclick="sendVeliMsg()">MESAJI YÖNETİME GÖNDER</button>
            </div>
        </div>
    </div>

    <div id="admin-panel">
        <div class="admin-nav"><b>YÖNETİM SİSTEMİ</b><button onclick="location.reload()" style="background:red; color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;">ÇIKIŞ</button></div>
        <div class="admin-layout">
            <div class="admin-sidebar" id="sidebar-menu"></div>
            <div id="admin-view-content" class="admin-main"></div>
        </div>
    </div>

    <div id="login-modal" class="modal-overlay" onclick="closeModal('login-modal')">
        <div class="modal-box" style="max-width:350px;" onclick="event.stopPropagation()">
            <h3 style="color:var(--yesil); margin-top:0;">Giriş</h3>
            <input type="text" id="u" placeholder="Kullanıcı Adı">
            <input type="password" id="p" placeholder="Şifre">
            <button class="btn-add" onclick="tryLogin()">GİRİŞ YAP</button>
        </div>
    </div>

    <div id="group-photo-modal" class="modal-overlay" onclick="closeModal('group-photo-modal')">
        <div class="modal-box" style="max-width:750px;" onclick="event.stopPropagation()">
            <h3 id="gp-title">Albüm</h3>
            <input type="file" multiple onchange="upGroupBulk(event)">
            <div id="gp-list" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(130px, 1fr)); gap:15px; margin-top:20px;"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://yesilay-futbol-okulu-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let db = { vitrin: [], gruplar: [], hocalar: [], duyurular: [], iletisim: [], mesajlar: [], wpNo: "" };
        let currentUser = null;

        database.ref('/').on('value', (snapshot) => { 
            if(snapshot.val()) db = snapshot.val(); 
            renderAll(); 
            if(currentUser) adminTab(document.querySelector('.sidebar-btn.active')?.dataset.tab || 'vitrin', document.querySelector('.sidebar-btn.active')); 
        });

        function syncDB() { database.ref('/').set(db); }

        function renderAll() {
            const vGrid = document.getElementById('public-vitrin'); vGrid.innerHTML = "";
            (db.vitrin || []).forEach(img => { const src = img.src || img; const pos = img.pos || 'center'; vGrid.innerHTML += `<img src="${src}" class="vitrin-img" style="object-position:${pos}" onclick="openLB('${src}')">`; });
            
            const aList = document.getElementById('public-anns'); aList.innerHTML = "";
            (db.duyurular || []).forEach(a => { aList.innerHTML += `<div class="ann-box"><h4>${a.baslik}</h4><p>${a.metin}</p></div>`; });
            
            const gGrid = document.getElementById('public-groups'); gGrid.innerHTML = "";
            (db.gruplar || []).forEach(g => { const f = (g.fotos || [])[0]; const src = f ? (f.src || f) : ''; gGrid.innerHTML += `<div class="card" onclick="openLB('${src}')"><h3>${g.ad}</h3>${g.saat ? '<div class="saat-kutu">⏰ '+g.saat+'</div>' : ''}<br><small>FOTO (${(g.fotos||[]).length})</small></div>`; });
            
            const hGrid = document.getElementById('public-coaches'); hGrid.innerHTML = "";
            (db.hocalar || []).forEach(h => { const src = h.img ? (h.img.src || h.img) : ""; const pos = h.img ? (h.img.pos || 'center') : 'center'; hGrid.innerHTML += `<div class="card" onclick="openLB('${src}')"><img src="${src}" style="object-position:${pos}"><h3>${h.ad}</h3><p>${h.unvan}</p></div>`; });
            
            const cArea = document.getElementById('public-contact'); cArea.innerHTML = "";
            (db.iletisim || []).forEach(c => { cArea.innerHTML += `<p style="font-size:1.2rem; border-bottom:1px solid #eee; padding-bottom:10px;">👤 <b>${c.ad}:</b> ${c.tel}</p>`; });
            
            document.getElementById('public-wp').href = `https://wa.me/${db.wpNo || "905000000000"}`;
        }

        // --- HIZLANDIRMA VE SIKIŞTIRMA ---
        async function compressImage(base64Str) {
            return new Promise((resolve) => {
                const img = new Image(); img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas'); const max = 1200;
                    let w = img.width, h = img.height;
                    if (w > h) { if (w > max) { h *= max / w; w = max; } } else { if (h > max) { w *= max / h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
            });
        }

        async function processFiles(files, callback) {
            let count = 0; const total = files.length;
            document.getElementById('upload-progress-container').style.display = 'block';
            for (let file of files) {
                const res = await new Promise(r => { const f = new FileReader(); f.onload = e => r(e.target.result); f.readAsDataURL(file); });
                const compressed = await compressImage(res); callback(compressed);
                count++; document.getElementById('upload-progress-bar').style.width = (count/total)*100 + '%';
            }
            setTimeout(() => { document.getElementById('upload-progress-container').style.display='none'; }, 1000);
        }

        function tryLogin() {
            const u = document.getElementById('u').value.trim().toUpperCase();
            const p = document.getElementById('p').value.trim().toUpperCase();
            if(u === "ALİ" && p === "ALİ43") {
                currentUser = "ALİ"; closeModal('login-modal'); buildAdminSidebar(); document.getElementById('admin-panel').style.display='flex';
            } else alert("Hatalı!");
        }

        function buildAdminSidebar() {
            const side = document.getElementById('sidebar-menu'); side.innerHTML = `
                <div class="sidebar-btn" data-tab="vitrin" onclick="adminTab('vitrin', this)">🖼️ VİTRİN</div>
                <div class="sidebar-btn" data-tab="groups" onclick="adminTab('groups', this)">⚽ GRUPLAR</div>
                <div class="sidebar-btn" data-tab="coaches" onclick="adminTab('coaches', this)">👤 HOCALAR</div>
                <div class="sidebar-btn" data-tab="anns" onclick="adminTab('anns', this)">📢 DUYURULAR</div>
                <div class="sidebar-btn" data-tab="contact" onclick="adminTab('contact', this)">📞 İLETİŞİM & WP</div>
            `;
            side.firstChild.click();
        }

        function adminTab(tab, btn) {
            if(!btn) return;
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
            const view = document.getElementById('admin-view-content'); view.innerHTML = "";
            
            if(tab === 'vitrin') {
                view.innerHTML = `<input type="file" multiple onchange="upVitBulk(event)"><p><small>Sürükleyerek yerlerini değiştirebilirsiniz.</small></p><div id="v-sort" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(140px, 1fr)); gap:15px; margin-top:20px;"></div>`;
                (db.vitrin || []).forEach((img, i) => { 
                    const src = img.src || img; const pos = img.pos || 'center';
                    document.getElementById('v-sort').innerHTML += `<div data-id="${i}" class="sort-item" style="position:relative; background:white; padding:10px; border-radius:15px; cursor:grab;"><img src="${src}" style="width:100%; height:110px; object-fit:cover; object-position:${pos}; border-radius:10px;"><div style="text-align:center; margin-top:5px;"><button class="pos-btn ${pos==='top'?'active':''}" onclick="setVPos(${i},'top')">Ü</button><button class="pos-btn ${pos==='center'?'active':''}" onclick="setVPos(${i},'center')">O</button><button class="pos-btn ${pos==='bottom'?'active':''}" onclick="setVPos(${i},'bottom')">A</button></div><button onclick="delVit(${i})" style="position:absolute; top:-5px; right:-5px; background:red; color:white; border:none; border-radius:50%; width:25px; height:25px;">&times;</button></div>`; 
                });
                
                // SÜRÜKLE BIRAK AKTİFLEŞTİRME
                new Sortable(document.getElementById('v-sort'), {
                    animation: 150,
                    onEnd: function() {
                        let newVitrin = [];
                        document.querySelectorAll('#v-sort .sort-item').forEach(el => {
                            newVitrin.push(db.vitrin[el.dataset.id]);
                        });
                        db.vitrin = newVitrin;
                        syncDB();
                    }
                });
            } else if(tab === 'contact') {
                view.innerHTML = `<h3>WP Ayarı</h3><input id="adm-wp" value="${db.wpNo||''}"><button onclick="db.wpNo=document.getElementById('adm-wp').value;syncDB();alert('OK')">KAYDET</button><hr><button onclick="addCt()">+ Yeni Kişi</button><div id="ct-list"></div>`;
                (db.iletisim || []).forEach((c, i) => { document.getElementById('ct-list').innerHTML += `<div class="admin-card"><b>${c.ad}</b> <button onclick="del('iletisim', ${i})">Sil</button></div>`; });
            } else if(tab === 'coaches') {
                view.innerHTML = `<button onclick="addC()">+ Yeni Hoca</button><div id="c-sort"></div>`;
                (db.hocalar || []).forEach((h, i) => { document.getElementById('c-sort').innerHTML += `<div class="admin-card"><b>${h.ad}</b> <button onclick="del('hocalar', ${i})">Sil</button></div>`; });
            } else if(tab === 'groups') {
                view.innerHTML = `<button onclick="addG()">+ Yeni Grup</button><div id="g-sort"></div>`;
                (db.gruplar || []).forEach((g, i) => { document.getElementById('g-sort').innerHTML += `<div class="admin-card"><b>${g.ad}</b> <button onclick="curG=${i};openModal('group-photo-modal');renderGP()">Albüm</button> <button onclick="del('gruplar', ${i})">Sil</button></div>`; });
            }
        }

        function setVPos(i, p) { if(typeof db.vitrin[i] === 'string') db.vitrin[i] = {src: db.vitrin[i], pos: p}; else db.vitrin[i].pos = p; syncDB(); }
        function upVitBulk(e) { processFiles(e.target.files, (res) => { if(!db.vitrin) db.vitrin=[]; db.vitrin.unshift({src: res, pos: 'center'}); syncDB(); }); }
        function delVit(i) { db.vitrin.splice(i, 1); syncDB(); }
        function addCt() { const n=prompt("Ad:"), t=prompt("Tel:"); if(n) { if(!db.iletisim) db.iletisim=[]; db.iletisim.push({ad:n, tel:t}); syncDB(); } }
        function addC() { const n=prompt("Ad:"); if(n) { if(!db.hocalar) db.hocalar=[]; db.hocalar.push({ad:n, unvan:"Antrenör"}); syncDB(); } }
        function addG() { const n=prompt("Ad:"); if(n) { if(!db.gruplar) db.gruplar=[]; db.gruplar.push({ad:n, saat:"-", fotos:[]}); syncDB(); } }
        function del(p, i) { if(confirm("Sil?")) { db[p].splice(i, 1); syncDB(); } }
        function openLB(s) { if(s){ document.getElementById('lb-img').src=s; document.getElementById('lightbox').style.display='flex'; } }
        function openModal(id) { document.getElementById(id).style.display='flex'; }
        function closeModal(id) { document.getElementById(id).style.display='none'; }
        function showPage(p) { document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active')); document.getElementById('page-' + p).classList.add('active'); window.scrollTo(0,0); }
        function sendVeliMsg() { alert("Gönderildi"); }
    </script>
</body>
</html>
