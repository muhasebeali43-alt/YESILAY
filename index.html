<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kütahya Yeşilay Futbol Okulu | Resmi Yönetim Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --yesil: #006a33; --sari: #f1c40f; --dark: #121212; --light: #f4f7f6; --beyaz: #ffffff; }
        body, html { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: var(--light); color: #333; overflow-x: hidden; }

        /* --- ZİRVEDEKİ HEYBETLİ BAŞLIK --- */
        header { 
            background: linear-gradient(135deg, var(--yesil) 0%, #004d26 100%); color: white; padding: 35px 5%; 
            display: flex; flex-direction: column; align-items: center; 
            border-bottom: 8px solid var(--sari); box-shadow: 0 10px 30px rgba(0,0,0,0.4); 
        }
        @media (min-width: 1024px) { header { flex-direction: row; justify-content: space-between; padding: 35px 80px; } }
        .club-info h1 { font-size: 2.3rem; font-weight: 900; text-transform: uppercase; margin: 0; letter-spacing: 2.5px; text-shadow: 4px 4px 0 rgba(0,0,0,0.2); }
        
        nav { margin-top: 25px; display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; }
        nav a { color: white; text-decoration: none; font-weight: 800; font-size: 1rem; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        nav a:hover { color: var(--sari); transform: scale(1.1); }
        .admin-trigger { background: var(--sari); color: var(--yesil) !important; padding: 12px 25px; border-radius: 12px; font-weight: 900; border: none; cursor: pointer; font-size: 1rem; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        .main-content { padding: 50px 5%; box-sizing: border-box; }
        @media (min-width: 1024px) { .main-content { padding: 50px 80px; } }
        .page { display: none; }
        .page.active { display: block; }
        .section-title { font-weight: 900; font-size: 2.2rem; color: var(--yesil); border-left: 15px solid var(--sari); padding-left: 20px; text-transform: uppercase; margin-bottom: 40px; text-shadow: 2px 2px 0 rgba(0,0,0,0.05); }

        /* --- PROFESYONEL YERLEŞİM --- */
        .home-layout { display: flex; flex-direction: column; gap: 40px; }
        @media (min-width: 1024px) { .home-layout { display: grid; grid-template-columns: 3fr 1.2fr; gap: 50px; align-items: start; } }
        
        .vitrin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        .vitrin-img { width: 100%; height: 280px; object-fit: cover; border-radius: 25px; border: 6px solid white; box-shadow: 0 10px 25px rgba(0,0,0,0.15); cursor: pointer; transition: 0.4s; }
        .vitrin-img:hover { transform: scale(1.03) translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.25); }

        /* --- ESNEK VE ŞIK DUYURU PANOSU --- */
        .ann-sidebar { background: white; padding: 30px; border-radius: 35px; border-top: 12px solid var(--sari); box-shadow: 0 15px 40px rgba(0,0,0,0.1); height: auto; transition: 0.5s ease; }
        .ann-box { background: #fdfdfd; padding: 22px; border-radius: 20px; margin-bottom: 20px; border-left: 8px solid var(--yesil); box-shadow: 0 5px 15px rgba(0,0,0,0.03); }
        .ann-box h4 { margin: 0 0 10px 0; color: var(--yesil); font-weight: 900; font-size: 1.3rem; }
        .ann-box p { margin: 0; font-size: 1.05rem; line-height: 1.5; color: #444; }

        .grid-responsive { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .card { background: white; padding: 40px 20px; border-radius: 35px; text-align: center; border-bottom: 10px solid var(--yesil); box-shadow: 0 15px 35px rgba(0,0,0,0.06); transition: 0.3s; }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 160px; height: 160px; border-radius: 50%; object-fit: cover; border: 7px solid var(--yesil); margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .card h3 { font-size: 1.5rem; font-weight: 900; margin: 10px 0; color: var(--dark); }

        /* --- PRESTİJLİ İLETİŞİM --- */
        .info-card { background: white; padding: 35px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 10px solid var(--sari); margin-bottom: 25px; }
        .contact-item { font-size: 1.15rem; margin-bottom: 15px; display: flex; justify-content: space-between; font-weight: 700; border-bottom: 2px solid #f9f9f9; padding-bottom: 10px; }
        .contact-item span { color: var(--yesil); }
        
        .form-card { background: white; padding: 45px; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); border-left: 15px solid var(--yesil); max-width: 700px; margin: 0 auto; }
        input, textarea { width: 100%; padding: 18px; margin: 12px 0; border: 2px solid #eee; border-radius: 15px; box-sizing: border-box; font-family: inherit; font-size: 1rem; transition: 0.3s; }
        input:focus { border-color: var(--yesil); outline: none; background: #f9fffb; }
        .btn-add { background: var(--yesil); color: white; padding: 20px; width: 100%; border: none; border-radius: 18px; cursor: pointer; font-weight: 900; font-size: 1.2rem; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,106,51,0.2); }
        .btn-add:hover { background: #004d26; transform: scale(1.02); }

        /* --- LIGHTBOX & X İŞARETİ --- */
        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 10000; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        #lb-img { max-width: 90%; max-height: 85vh; border: 6px solid white; border-radius: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .lb-close { position: absolute; top: 30px; right: 40px; color: white; font-size: 60px; font-weight: 200; cursor: pointer; transition: 0.3s; opacity: 0.7; }
        .lb-close:hover { opacity: 1; color: var(--sari); transform: rotate(90deg); }

        /* --- VIP YÖNETİM PANELİ --- */
        #admin-panel { display: none; position: fixed; inset: 0; background: #fff; z-index: 5000; flex-direction: column; }
        .admin-nav { background: var(--dark); color: white; padding: 18px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 7px solid var(--sari); }
        .admin-layout { display: flex; flex: 1; overflow: hidden; }
        .admin-sidebar { background: #1a1a1a; width: 280px; padding: 25px; display: flex; flex-direction: column; gap: 15px; box-shadow: 5px 0 20px rgba(0,0,0,0.1); }
        .sidebar-btn { color: #888; padding: 18px; cursor: pointer; border-radius: 15px; font-weight: 800; transition: 0.3s; font-size: 1rem; }
        .sidebar-btn.active { background: var(--yesil); color: white; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .admin-main { flex: 1; padding: 40px; overflow-y: auto; background: #f0f2f1; }
        .admin-card-row { background: white; padding: 20px 30px; border-radius: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #e0e0e0; box-shadow: 0 5px 10px rgba(0,0,0,0.02); }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 9999; justify-content: center; align-items: center; }
        .modal-box { background: white; padding: 50px; border-radius: 45px; width: 100%; max-width: 420px; text-align: center; border-top: 15px solid var(--sari); box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="upload-progress" style="display:none; position:fixed; top:0; left:0; width:100%; height:10px; background:#eee; z-index:20000;"><div id="up-bar" style="width:0%; height:100%; background:var(--yesil); transition:0.3s;"></div></div>
    
    <div id="lightbox" onclick="closeLB()"><span class="lb-close">&times;</span><img id="lb-img" src="" onclick="event.stopPropagation()"></div>

    <header>
        <div class="club-info"><h1>KÜTAHYA YEŞİLAY FUTBOL OKULU</h1></div>
        <nav>
            <a onclick="showPage('home')">ANASAYFA</a>
            <a onclick="showPage('groups')">GRUPLAR</a>
            <a onclick="showPage('coaches')">HOCALAR</a>
            <a onclick="showPage('contact')">İLETİŞİM</a>
            <button class="admin-trigger" onclick="openModal('login-modal')">YÖNETİM</button>
        </nav>
    </header>

    <div class="main-content">
        <div id="page-home" class="page active">
            <div class="home-layout">
                <div><h2 class="section-title">ANTRENMANDAN KARELER</h2><div id="p-vit" class="vitrin-grid"></div></div>
                <div class="ann-sidebar"><h2 style="color:var(--yesil); margin:0 0 25px 0; font-weight:900;">📢 DUYURULAR</h2><div id="p-ann"></div></div>
            </div>
        </div>
        <div id="page-groups" class="page"><h2 class="section-title">Gruplarımız</h2><div id="p-grp" class="grid-responsive"></div></div>
        <div id="page-coaches" class="page"><h2 class="section-title">Teknik Kadro</h2><div id="p-hoc" class="grid-responsive"></div></div>
        <div id="page-contact" class="page">
            <h2 class="section-title">İletişim & Adres</h2>
            <div class="info-card" id="p-con-list"></div>
            <div class="info-card"><h4>Okul Lokasyonu</h4><div id="p-adr-text" style="font-size:1.1rem; line-height:1.6; color:#555;"></div></div>
            <h2 class="section-title">Bize Yazın</h2>
            <div class="form-card">
                <input type="text" id="v-ad" placeholder="Ad Soyad"><input type="tel" id="v-tel" placeholder="Telefon"><textarea id="v-mesaj" rows="4" placeholder="Mesajınız..."></textarea>
                <button class="btn-add" onclick="sendVeliMsg()">GÜÇLÜ GÖNDER</button>
            </div>
        </div>
    </div>

    <div id="admin-panel">
        <div class="admin-nav"><b>🛡️ PRO YÖNETİM KABİNİ</b><button onclick="location.reload()" style="background:#ff4757; color:white; border:none; padding:10px 20px; border-radius:12px; cursor:pointer; font-weight:900;">GÜVENLİ ÇIKIŞ</button></div>
        <div class="admin-layout"><div class="admin-sidebar" id="sidebar-menu"></div><div id="admin-view-content" class="admin-main"></div></div>
    </div>

    <div id="login-modal" class="modal-overlay" onclick="closeModal('login-modal')">
        <div class="modal-box" onclick="event.stopPropagation()">
            <h2 style="color:var(--yesil); font-weight:900;">YETKİ KONTROLÜ</h2><p style="color:#888; margin-bottom:30px;">Kulüp verilerine erişim için kimlik doğrulayın.</p>
            <input type="text" id="u" placeholder="Yönetici Adı"><input type="password" id="p" placeholder="Şifre">
            <button class="btn-add" onclick="tryLogin()">SİSTEME GİRİŞ YAP</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://yesilay-futbol-okulu-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let db = { vitrin: [], gruplar: [], hocalar: [], duyurular: [], iletisim: { rehber: [], adres: "" }, mesajlar: [] };
        let currentUser = null;

        database.ref('/').on('value', (s) => { 
            if(s.val()) db = s.val(); 
            if(!db.iletisim) db.iletisim = { rehber: [], adres: "" };
            renderAll();
            if(currentUser) adminTab(document.querySelector('.sidebar-btn.active')?.dataset.tab || 'vit', document.querySelector('.sidebar-btn.active'));
        });

        function renderAll() {
            const vG = document.getElementById('p-vit'); vG.innerHTML = "";
            (db.vitrin || []).forEach(img => { const src = typeof img === 'string' ? img : img.src; const pos = typeof img === 'string' ? 'center' : (img.pos || 'center'); vG.innerHTML += `<img src="${src}" class="vitrin-img" style="object-position:${pos}" onclick="openLB('${src}')">`; });
            const aL = document.getElementById('p-ann'); aL.innerHTML = "";
            (db.duyurular || []).slice(0, 4).forEach(a => { aL.innerHTML += `<div class="ann-box"><h4>${a.baslik}</h4><p>${a.metin}</p></div>`; });
            const gG = document.getElementById('p-grp'); gG.innerHTML = "";
            (db.gruplar || []).forEach(g => { gG.innerHTML += `<div class="card" onclick="showPage('groups')"><h3>${g.ad}</h3><p style="color:var(--yesil); font-weight:900; font-size:1.2rem;">${g.saat || ''}</p></div>`; });
            const hG = document.getElementById('p-hoc'); hG.innerHTML = "";
            (db.hocalar || []).forEach(h => { const src = h.img ? (typeof h.img === 'string' ? h.img : h.img.src) : ""; const pos = h.img ? (typeof h.img === 'string' ? 'center' : (h.img.pos || 'center')) : 'center'; hG.innerHTML += `<div class="card"><img src="${src}" style="object-position:${pos}"><h3>${h.ad}</h3><p style="font-weight:700; color:var(--yesil);">${h.unvan || ''}</p></div>`; });
            const cL = document.getElementById('p-con-list'); cL.innerHTML = "<h4>📋 Yetkili İletişim Rehberi</h4>";
            (db.iletisim.rehber || []).forEach(c => { cL.innerHTML += `<div class="contact-item">${c.ad} <span>${c.tel}</span></div>`; });
            document.getElementById('p-adr-text').innerHTML = `📍 ${db.iletisim.adres || 'Adres bilgisi güncelleniyor...'}`;
        }

        async function compress(b64) {
            return new Promise(r => {
                const img = new Image(); img.src = b64;
                img.onload = () => {
                    const canvas = document.createElement('canvas'); const m = 1200;
                    let w = img.width, h = img.height;
                    if(w > h) { if(w > m) { h *= m/w; w = m; } } else { if(h > m) { w *= m/h; h = m; } }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, w, h);
                    r(canvas.toDataURL('image/jpeg', 0.8));
                };
            });
        }

        function tryLogin() { 
            const u=document.getElementById('u').value.trim().toUpperCase(), p=document.getElementById('p').value.trim().toUpperCase(); 
            if(u==="ALİ" && p==="ALİ43") { currentUser={u:"ALİ"}; buildSidebar(); closeModal('login-modal'); document.getElementById('admin-panel').style.display='flex'; } else alert("GEÇERSİZ YETKİ!"); 
        }

        function buildSidebar() { 
            const s = document.getElementById('sidebar-menu'); 
            const menu = [{id:'vit', n:'🖼️ VİTRİN'}, {id:'ann', n:'📢 DUYURULAR'}, {id:'grp', n:'⚽ GRUPLAR'}, {id:'hoc', n:'👤 HOCALAR'}, {id:'con', n:'📞 REHBER'}, {id:'msg', n:'📩 MESAJLAR'}];
            s.innerHTML = menu.map(m => `<div class="sidebar-btn" data-tab="${m.id}" onclick="adminTab('${m.id}', this)">${m.n}</div>`).join('');
            s.firstChild.click(); 
        }

        function adminTab(tab, btn) {
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
            const v = document.getElementById('admin-view-content'); v.innerHTML = `<h2 style="color:var(--yesil); border-bottom:4px solid var(--sari); padding-bottom:10px;">${btn.innerText} YÖNETİMİ</h2>`;
            if(tab === 'vit') {
                v.innerHTML += `<input type="file" multiple onchange="upVit(event)"><div id="v-sort" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(150px, 1fr)); gap:20px; margin-top:30px;"></div>`;
                const c = document.getElementById('v-sort');
                (db.vitrin || []).forEach((img, i) => { const src = typeof img === 'string' ? img : img.src; const pos = typeof img === 'string' ? 'center' : (img.pos || 'center'); c.innerHTML += `<div data-id="${i}" style="position:relative; background:white; padding:15px; border-radius:20px; box-shadow:0 10px 20px rgba(0,0,0,0.05);"><img src="${src}" style="width:100%; height:110px; object-fit:cover; object-position:${pos}; border-radius:12px;"><div style="text-align:center; margin-top:10px;"><button class="pos-btn ${pos==='top'?'active':''}" onclick="setVPos(${i},'top')">Ü</button><button class="pos-btn ${pos==='center'?'active':''}" onclick="setVPos(${i},'center')">O</button><button class="pos-btn ${pos==='bottom'?'active':''}" onclick="setVPos(${i},'bottom')">A</button></div><button onclick="del('vitrin',${i})" style="position:absolute; top:-5px; right:-5px; background:#ff4757; color:white; border:none; border-radius:50%; width:30px; height:30px; cursor:pointer; font-weight:900;">×</button></div>`; });
                new Sortable(c, { animation: 150, onEnd: () => { db.vitrin = Array.from(c.children).map(el => db.vitrin[el.dataset.id]); database.ref('/').set(db); } });
            } else if(tab === 'ann') {
                v.innerHTML += `<button class="btn-add" style="width:auto; padding:15px 30px;" onclick="addA()">+ YENİ DUYURU EKLE</button><div id="a-list" style="margin-top:30px;"></div>`;
                (db.duyurular || []).forEach((a, i) => { v.querySelector('#a-list').innerHTML += `<div class="admin-card-row"><b>${a.baslik}</b><button onclick="del('duyurular',${i})" style="color:#ff4757; font-weight:900; background:none; border:none; cursor:pointer;">SİL</button></div>`; });
            } else if(tab === 'msg') {
                (db.mesajlar || []).forEach((m, i) => { v.innerHTML += `<div class="admin-card-row" style="flex-direction:column; align-items:flex-start;"><small style="color:var(--yesil); font-weight:800;">📅 ${m.tarih}</small><h4 style="margin:5px 0;">👤 ${m.ad} (${m.tel})</h4><p style="background:#f9f9f9; padding:15px; border-radius:12px; width:100%; box-sizing:border-box;">${m.msg}</p><button onclick="del('mesajlar',${i})" style="color:#ff4757; font-weight:900; background:none; border:none; cursor:pointer;">MESAJI SİSTEMDEN SİL</button></div>`; });
            }
        }

        async function upVit(e) { 
            const files = Array.from(e.target.files); document.getElementById('upload-progress').style.display='block';
            for(let i=0; i<files.length; i++) {
                const b64 = await new Promise(r => { const fr = new FileReader(); fr.onload = ev => r(ev.target.result); fr.readAsDataURL(files[i]); });
                const comp = await compress(b64); if(!db.vitrin) db.vitrin=[]; db.vitrin.unshift({src:comp, pos:'center'});
                document.getElementById('up-bar').style.width = ((i+1)/files.length*100)+'%';
            }
            database.ref('/').set(db); document.getElementById('upload-progress').style.display='none';
        }

        function setVPos(i, p) { db.vitrin[i].pos = p; database.ref('/').set(db); }
        function addA() { const b=prompt("Duyuru Başlığı:"), m=prompt("Detaylı Mesaj:"); if(b){ if(!db.duyurular) db.duyurular=[]; db.duyurular.unshift({baslik:b, metin:m}); database.ref('/').set(db); } }
        function sendVeliMsg() { const ad=document.getElementById('v-ad').value, msg=document.getElementById('v-mesaj').value, tel=document.getElementById('v-tel').value; if(!ad || !msg) return alert("EKSİK ALAN BIRAKMAYIN!"); if(!db.mesajlar) db.mesajlar=[]; db.mesajlar.unshift({ad, tel, msg, tarih:new Date().toLocaleString('tr-TR')}); database.ref('/').set(db); alert("MESAJINIZ BAŞARIYLA İLETİLDİ."); }
        function del(p, i) { if(confirm("BU KAYIT KALICI OLARAK SİLİNECEK, ONAYLIYOR MUSUNUZ?")) { db[p].splice(i,1); database.ref('/').set(db); } }
        function openLB(s) { document.getElementById('lb-img').src = s; document.getElementById('lightbox').style.display = 'flex'; }
        function closeLB() { document.getElementById('lightbox').style.display = 'none'; }
        function openModal(id) { document.getElementById(id).style.display='flex'; }
        function closeModal(id) { document.getElementById(id).style.display='none'; }
        function showPage(p) { document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active')); document.getElementById('page-' + p).classList.add('active'); window.scrollTo(0,0); }
    </script>
</body>
</html>
