<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kütahya Yeşilay Futbol Okulu | Yönetim</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --yesil: #006a33; --sari: #f1c40f; --dark: #121212; --light: #f8faf9; --beyaz: #ffffff; }
        body, html { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: var(--light); color: #333; overflow-x: hidden; }

        header { background: linear-gradient(135deg, var(--yesil) 0%, #004d26 100%); color: white; padding: 25px 5%; display: flex; flex-direction: column; align-items: center; border-bottom: 7px solid var(--sari); box-shadow: 0 5px 20px rgba(0,0,0,0.4); }
        @media (min-width: 1024px) { header { flex-direction: row; justify-content: space-between; padding: 25px 80px; } }
        .club-info h1 { font-size: 1.8rem; font-weight: 900; text-transform: uppercase; margin: 0; letter-spacing: 2px; }
        nav { margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        nav a { color: white; text-decoration: none; font-weight: 700; font-size: 0.9rem; cursor: pointer; text-transform: uppercase; }
        .admin-trigger { background: var(--sari); color: var(--yesil) !important; padding: 8px 15px; border-radius: 10px; font-weight: 900; border: none; cursor: pointer; }

        .main-content { padding: 40px 5%; box-sizing: border-box; }
        @media (min-width: 1024px) { .main-content { padding: 40px 80px; } }
        .page { display: none; }
        .page.active { display: block; }
        .section-title { font-weight: 900; font-size: 2rem; color: var(--yesil); border-left: 12px solid var(--sari); padding-left: 20px; text-transform: uppercase; margin-bottom: 30px; }

        .home-layout { display: flex; flex-direction: column; gap: 30px; }
        @media (min-width: 1024px) { .home-layout { display: grid; grid-template-columns: 3fr 1.2fr; gap: 40px; align-items: start; } }
        
        .vitrin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .vitrin-img { width: 100%; height: 220px; object-fit: cover; border-radius: 20px; border: 5px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; }

        .ann-sidebar { background: white; padding: 25px; border-radius: 30px; border-top: 10px solid var(--sari); box-shadow: 0 10px 30px rgba(0,0,0,0.06); height: auto; transition: 0.5s ease; }
        .ann-box { background: #fafafa; padding: 18px; border-radius: 15px; margin-bottom: 15px; border-left: 6px solid var(--yesil); }

        .grid-responsive { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; padding: 30px 15px; border-radius: 25px; text-align: center; border-bottom: 6px solid var(--yesil); box-shadow: 0 10px 25px rgba(0,0,0,0.04); }
        .card img { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; border: 5px solid var(--yesil); margin-bottom: 15px; }

        /* KİBAR İLETİŞİM */
        .info-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-top: 6px solid var(--sari); margin-bottom: 20px; }
        .contact-item { font-size: 0.95rem; margin-bottom: 8px; display: flex; justify-content: space-between; font-weight: 600; }
        
        #admin-panel { display: none; position: fixed; inset: 0; background: #fff; z-index: 5000; flex-direction: column; }
        .admin-nav { background: var(--dark); color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid var(--sari); }
        .admin-layout { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        @media (min-width: 1024px) { .admin-layout { flex-direction: row; } }
        .admin-sidebar { background: #1a1a1a; padding: 20px; display: flex; overflow-x: auto; gap: 10px; }
        @media (min-width: 1024px) { .admin-sidebar { width: 260px; flex-direction: column; } }
        .sidebar-btn { color: #aaa; padding: 15px; cursor: pointer; border-radius: 12px; font-weight: 700; }
        .sidebar-btn.active { background: var(--yesil); color: white; }
        .admin-main { flex: 1; padding: 30px; overflow-y: auto; background: #f4f6f5; }
        .admin-card { background: white; padding: 15px 25px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 6000; justify-content: center; align-items: center; padding: 20px; }
        .modal-box { background: white; padding: 40px; border-radius: 30px; width: 100%; max-width: 450px; text-align: center; position: relative; }
        .pos-btn { padding: 4px 8px; font-size: 0.7rem; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; margin: 2px; background: white; }
        .pos-btn.active { background: var(--yesil); color: white; border-color: var(--yesil); }

        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; justify-content: center; align-items: center; }
        #lb-img { max-width: 90%; max-height: 85vh; border: 4px solid white; border-radius: 10px; }
        .lb-close { position: absolute; top: 20px; right: 30px; color: white; font-size: 50px; font-weight: bold; cursor: pointer; }
        
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-family: inherit; }
        .btn-add { background: var(--yesil); color: white; padding: 15px; width: 100%; border: none; border-radius: 12px; cursor: pointer; font-weight: 800; }
    </style>
</head>
<body>

    <div id="lightbox" onclick="this.style.display='none'"><span class="lb-close">&times;</span><img id="lb-img" src=""></div>

    <header>
        <div class="club-info"><h1>Kütahya Yeşilay Futbol Okulu</h1></div>
        <nav>
            <a onclick="showPage('home')">ANASAYFA</a>
            <a onclick="showPage('groups')">GRUPLAR</a>
            <a onclick="showPage('coaches')">HOCALAR</a>
            <a onclick="showPage('contact')">İLETİŞİM</a>
            <button class="admin-trigger" onclick="openModal('login-modal')">YÖNETİM</button>
        </nav>
    </header>

    <div class="main-content">
        <div id="page-home" class="page active">
            <div class="home-layout">
                <div><h2 class="section-title">ANTRENMAN KARELERİ</h2><div id="public-vitrin" class="vitrin-grid"></div></div>
                <div class="ann-sidebar"><h3 style="color:var(--yesil); margin:0 0 20px 0;">📢 DUYURULAR</h3><div id="public-anns"></div></div>
            </div>
        </div>
        <div id="page-groups" class="page"><h2 class="section-title">Gruplarımız</h2><div id="public-groups" class="grid-responsive"></div></div>
        <div id="page-coaches" class="page"><h2 class="section-title">Teknik Kadro</h2><div id="public-coaches" class="grid-responsive"></div></div>
        <div id="page-contact" class="page">
            <h2 class="section-title">İletişim & Adres</h2>
            <div class="info-card" id="p-con-list"><h4>Yetkili Rehberi</h4></div>
            <div class="info-card"><h4>Okul Adresi</h4><div id="p-adr-text" style="font-size:0.95rem; line-height:1.5; color:#555;"></div></div>
            <h2 class="section-title">Bize Yazın</h2>
            <div style="background:white; padding:30px; border-radius:25px; box-shadow:0 10px 30px rgba(0,0,0,0.05); border-left:10px solid var(--yesil); max-width:600px; margin:0 auto;">
                <input type="text" id="v-ad" placeholder="Ad Soyad"><input type="tel" id="v-tel" placeholder="Telefon"><textarea id="v-mesaj" rows="3" placeholder="Mesajınız..."></textarea>
                <button class="btn-add" onclick="sendVeliMsg()">GÖNDER</button>
            </div>
        </div>
    </div>

    <div id="admin-panel">
        <div class="admin-nav"><b>YÖNETİCİ KABİNİ</b><button onclick="location.reload()" style="background:red; color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;">ÇIKIŞ</button></div>
        <div class="admin-layout"><div class="admin-sidebar" id="sidebar-menu"></div><div id="admin-view-content" class="admin-main"></div></div>
    </div>

    <div id="login-modal" class="modal-overlay" onclick="closeModal('login-modal')">
        <div class="modal-box" onclick="event.stopPropagation()"><span style="position:absolute; top:15px; right:20px; font-size:30px; cursor:pointer;" onclick="closeModal('login-modal')">&times;</span><h3 style="color:var(--yesil)">Giriş</h3><input type="text" id="u" placeholder="Kullanıcı"><input type="password" id="p" placeholder="Şifre"><button class="btn-add" onclick="tryLogin()">GİRİŞ YAP</button></div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://yesilay-futbol-okulu-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let db = { vitrin: [], gruplar: [], hocalar: [], duyurular: [], iletisim: { rehber: [], adres: "" }, users: [], mesajlar: [] };
        let currentUser = null;

        database.ref('/').on('value', (s) => { 
            if(s.val()) db = s.val(); 
            if(!db.iletisim) db.iletisim = { rehber: [], adres: "" };
            renderAll();
            if(currentUser) adminTab(document.querySelector('.sidebar-btn.active')?.dataset.tab || 'vitrin', document.querySelector('.sidebar-btn.active'));
        });

        function renderAll() {
            const vG = document.getElementById('public-vitrin'); vG.innerHTML = "";
            (db.vitrin || []).forEach(img => { const src = typeof img === 'string' ? img : img.src; const pos = typeof img === 'string' ? 'center' : (img.pos || 'center'); vG.innerHTML += `<img src="${src}" class="vitrin-img" style="object-position:${pos}" onclick="openLB('${src}')">`; });
            const aL = document.getElementById('public-anns'); aL.innerHTML = "";
            (db.duyurular || []).slice(0, 4).forEach(a => { aL.innerHTML += `<div class="ann-box"><h4>${a.baslik}</h4><p>${a.metin}</p></div>`; });
            const gG = document.getElementById('public-groups'); gG.innerHTML = "";
            (db.gruplar || []).forEach(g => { gG.innerHTML += `<div class="card" onclick="showPage('groups')"><h3>${g.ad}</h3><p style="color:var(--yesil); font-weight:bold;">${g.saat || ''}</p></div>`; });
            const hG = document.getElementById('public-coaches'); hG.innerHTML = "";
            (db.hocalar || []).forEach(h => { const src = h.img ? (typeof h.img === 'string' ? h.img : h.img.src) : ""; const pos = h.img ? (typeof h.img === 'string' ? 'center' : (h.img.pos || 'center')) : 'center'; hG.innerHTML += `<div class="card"><img src="${src}" style="object-position:${pos}"><h3>${h.ad}</h3><p>${h.unvan || ''}</p></div>`; });
            const cL = document.getElementById('p-con-list'); cL.innerHTML = "<h4>Yetkili Rehberi</h4>";
            (db.iletisim.rehber || []).forEach(c => { cL.innerHTML += `<div class="contact-item">${c.ad} <span>${c.tel}</span></div>`; });
            document.getElementById('p-adr-text').innerHTML = `📍 ${db.iletisim.adres || 'Henüz eklenmemiş.'}`;
        }

        async function compress(b64) {
            return new Promise(r => {
                const img = new Image(); img.src = b64;
                img.onload = () => {
                    const canvas = document.createElement('canvas'); const m = 1200;
                    let w = img.width, h = img.height;
                    if(w > h) { if(w > m) { h *= m/w; w = m; } } else { if(h > m) { w *= m/h; h = m; } }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, w, h);
                    r(canvas.toDataURL('image/jpeg', 0.75));
                };
            });
        }

        function tryLogin() { 
            const u=document.getElementById('u').value.trim().toUpperCase(), p=document.getElementById('p').value.trim().toUpperCase(); 
            if(u==="ALİ" && p==="ALİ43") { currentUser={u:"ALİ", perms:{vit:true,ann:true,grp:true,hoc:true,con:true,msg:true}}; buildSidebar(); closeModal('login-modal'); document.getElementById('admin-panel').style.display='flex'; } else alert("Hata!"); 
        }

        function buildSidebar() { 
            const s = document.getElementById('sidebar-menu'); s.innerHTML = "";
            const menu = [{id:'vit', n:'🖼️ Vitrin'}, {id:'ann', n:'📢 Duyurular'}, {id:'grp', n:'⚽ Gruplar'}, {id:'hoc', n:'👤 Hocalar'}, {id:'con', n:'📞 Rehber'}, {id:'msg', n:'📩 Mesajlar'}];
            menu.forEach(m => { s.innerHTML += `<div class="sidebar-btn" data-tab="${m.id}" onclick="adminTab('${m.id}', this)">${m.n}</div>`; });
            s.firstChild.click(); 
        }

        function adminTab(tab, btn) {
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
            const v = document.getElementById('admin-view-content'); v.innerHTML = `<h3>${btn.innerText}</h3>`;
            if(tab === 'vit') {
                v.innerHTML += `<input type="file" multiple onchange="upVit(event)"><div id="v-sort" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(130px, 1fr)); gap:15px; margin-top:20px;"></div>`;
                const c = document.getElementById('v-sort');
                (db.vitrin || []).forEach((img, i) => { const src = typeof img === 'string' ? img : img.src; const pos = typeof img === 'string' ? 'center' : (img.pos || 'center'); c.innerHTML += `<div data-id="${i}" style="position:relative; background:white; padding:10px; border-radius:15px;"><img src="${src}" style="width:100%; height:90px; object-fit:cover; object-position:${pos}; border-radius:10px;"><div style="text-align:center; margin-top:5px;"><button class="pos-btn ${pos==='top'?'active':''}" onclick="setVPos(${i},'top')">Ü</button><button class="pos-btn ${pos==='center'?'active':''}" onclick="setVPos(${i},'center')">O</button><button class="pos-btn ${pos==='bottom'?'active':''}" onclick="setVPos(${i},'bottom')">A</button></div><button onclick="del('vitrin',${i})" style="position:absolute; top:0; right:0; background:red; color:white; border:none; cursor:pointer;">X</button></div>`; });
                new Sortable(c, { animation: 150, onEnd: () => { db.vitrin = Array.from(c.children).map(el => db.vitrin[el.dataset.id]); database.ref('/').set(db); } });
            } else if(tab === 'ann') {
                v.innerHTML += `<button class="btn-add" style="width:auto; padding:10px 20px;" onclick="addA()">+ Ekle</button><div id="a-list"></div>`;
                (db.duyurular || []).forEach((a, i) => { v.querySelector('#a-list').innerHTML += `<div class="admin-card"><b>${a.baslik}</b><button onclick="del('duyurular',${i})" style="color:red;">Sil</button></div>`; });
            } else if(tab === 'con') {
                v.innerHTML += `<h4>Rehber</h4><button class="btn-add" style="width:auto; padding:10px 20px;" onclick="addCt()">+ Yetkili</button><div id="ct-list"></div><h4>Adres</h4><textarea id="adr-in">${db.iletisim.adres||''}</textarea><button class="btn-add" onclick="saveAdr()">Kaydet</button>`;
                (db.iletisim.rehber || []).forEach((c, i) => { v.querySelector('#ct-list').innerHTML += `<div class="admin-card"><b>${c.ad}: ${c.tel}</b><button onclick="delCt(${i})" style="color:red;">Sil</button></div>`; });
            } else if(tab === 'msg') {
                (db.mesajlar || []).forEach((m, i) => { v.innerHTML += `<div class="admin-card" style="flex-direction:column; align-items:flex-start;"><small>${m.tarih}</small><b>${m.ad} (${m.tel})</b><p>${m.msg}</p><button onclick="del('mesajlar',${i})" style="color:red;">Sil</button></div>`; });
            }
        }

        async function upVit(e) { const files = Array.from(e.target.files); for(let f of files) { const b64 = await new Promise(r => { const fr = new FileReader(); fr.onload = ev => r(ev.target.result); fr.readAsDataURL(f); }); const comp = await compress(b64); if(!db.vitrin) db.vitrin=[]; db.vitrin.unshift({src:comp, pos:'center'}); } database.ref('/').set(db); }
        function setVPos(i, p) { db.vitrin[i].pos = p; database.ref('/').set(db); }
        function addA() { const b=prompt("Başlık:"), m=prompt("Mesaj:"); if(b){ if(!db.duyurular) db.duyurular=[]; db.duyurular.unshift({baslik:b, metin:m}); database.ref('/').set(db); } }
        function addCt() { const n=prompt("İsim:"), t=prompt("Tel:"); if(n){ if(!db.iletisim.rehber) db.iletisim.rehber=[]; db.iletisim.rehber.push({ad:n, tel:t}); database.ref('/').set(db); } }
        function saveAdr() { db.iletisim.adres = document.getElementById('adr-in').value; database.ref('/').set(db); alert("Kaydedildi."); }
        function del(p, i) { if(confirm("Sil?")) { db[p].splice(i,1); database.ref('/').set(db); } }
        function delCt(i) { if(confirm("Sil?")) { db.iletisim.rehber.splice(i,1); database.ref('/').set(db); } }
        function openLB(s) { document.getElementById('lb-img').src = s; document.getElementById('lightbox').style.display = 'flex'; }
        function openModal(id) { document.getElementById(id).style.display='flex'; }
        function closeModal(id) { document.getElementById(id).style.display='none'; }
        function showPage(p) { document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active')); document.getElementById('page-' + p).classList.add('active'); window.scrollTo(0,0); }
        function sendVeliMsg() { const ad=document.getElementById('v-ad').value, msg=document.getElementById('v-mesaj').value, tel=document.getElementById('v-tel').value; if(!ad || !msg) return alert("Eksik!"); if(!db.mesajlar) db.mesajlar=[]; db.mesajlar.unshift({ad, tel, msg, tarih:new Date().toLocaleString()}); database.ref('/').set(db); alert("İletildi."); }
    </script>
</body>
</html>
