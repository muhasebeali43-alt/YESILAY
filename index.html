<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kütahya Yeşilay Futbol Okulu | Yönetim</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --yesil: #006a33; --sari: #f1c40f; --dark: #121212; --light: #f8faf9; }
        body, html { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: var(--light); color: #333; font-size: 16px; /* Genel punto kibarlaştırıldı */ }

        /* --- KİBAR VE ELİT BAŞLIK (HEADER) --- */
        header { 
            background: linear-gradient(135deg, var(--yesil) 0%, #004d26 100%); color: white; padding: 30px 5%; /* Dikey alan daraltıldı */
            display: flex; flex-direction: column; align-items: center; 
            border-bottom: 6px solid var(--sari); box-shadow: 0 6px 20px rgba(0,0,0,0.25); 
        }
        @media (min-width: 1024px) { header { flex-direction: row; justify-content: space-between; padding: 30px 80px; } }
        
        .club-info h1 { font-size: 1.8rem; /* Punto kibarlaştırıldı */ font-weight: 900; text-transform: uppercase; margin: 0; letter-spacing: 1.5px; text-shadow: 2px 2px 0 rgba(0,0,0,0.1); }
        @media (min-width: 768px) { .club-info h1 { font-size: 2.1rem; /* Büyük ekranda da dengeli boyutta */ } }

        nav { margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; /* Boşluklar dengelendi */ }
        @media (min-width: 1024px) { nav { margin-top: 0; gap: 20px; } }
        nav a { color: white; text-decoration: none; font-weight: 700; font-size: 0.95rem; /* Menü kibarlaştırıldı */ cursor: pointer; text-transform: uppercase; }
        .admin-trigger { background: var(--sari); color: var(--yesil) !important; padding: 10px 20px; border-radius: 10px; font-weight: 900; border: none; cursor: pointer; font-size: 0.95rem; }

        /* --- ANA SAYFA DÜZENİ --- */
        .main-content { padding: 30px 5%; }
        @media (min-width: 1024px) { .main-content { padding: 40px 80px; } }
        .page { display: none; }
        .page.active { display: block; }
        .section-title { font-weight: 900; font-size: 1.8rem; /* Başlıklar kibarlaştırıldı */ color: var(--yesil); border-left: 12px solid var(--sari); padding-left: 15px; text-transform: uppercase; margin-bottom: 30px; }

        .home-layout { display: flex; flex-direction: column; gap: 30px; }
        @media (min-width: 1024px) { .home-layout { display: grid; grid-template-columns: 3fr 1.2fr; gap: 40px; align-items: start; } }
        
        /* 4'LÜ IZGARA DÜZENİ */
        .grid-4 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        @media (min-width: 1200px) { .grid-4 { grid-template-columns: repeat(4, 1fr); gap: 20px; } }
        .v-img { width: 100%; height: 250px; /* Fotoğraflar simetrikleştirildi */ object-fit: cover; border-radius: 20px; border: 5px solid white; box-shadow: 0 8px 20px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s; }

        /* --- AKILLI DUYURU PANOSU (MAX 4) --- */
        .ann-sidebar { 
            background: white; padding: 25px; border-radius: 30px; border-top: 10px solid var(--sari); 
            box-shadow: 0 12px 35px rgba(0,0,0,0.06); height: auto; transition: all 0.5s ease;
        }
        .ann-box { background: #fafafa; padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 6px solid var(--yesil); }
        .ann-box:last-child { margin-bottom: 0; }
        .ann-box h4 { margin: 0 0 8px 0; color: var(--yesil); font-weight: 800; font-size: 1.1rem; /* Kibarlaştırıldı */ }
        .ann-box p { margin: 0; font-size: 0.95rem; /* Kibarlaştırıldı */ line-height: 1.4; color: #555; }

        /* HOCA VE GRUP KARTLARI (KİBAR VE SİMETRİK) */
        .card { background: white; padding: 35px 20px; border-radius: 25px; text-align: center; border-bottom: 8px solid var(--yesil); box-shadow: 0 8px 20px rgba(0,0,0,0.04); }
        .card img { width: 140px; /* Simetrikleştirildi */ height: 140px; border-radius: 50%; border: 6px solid var(--yesil); object-fit: cover; margin-bottom: 15px; cursor: pointer; }
        .card h3 { font-size: 1.2rem; /* Kibarlaştırıldı */ margin: 10px 0; font-weight: 800; }
        .card p { color: #666; font-weight: 600; font-size: 0.95rem; /* Kibarlaştırıldı */ }

        /* LIGHTBOX */
        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 10000; justify-content: center; align-items: center; cursor: pointer; }
        #lb-img { max-width: 90%; max-height: 85vh; border: 5px solid white; border-radius: 15px; }

        /* YÖNETİM PANELİ (KİBAR TASARIM - BOZULMADI) */
        #admin-panel { display: none; position: fixed; inset: 0; background: #fff; z-index: 5000; flex-direction: column; }
        .admin-nav { background: var(--dark); color: white; padding: 12px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid var(--sari); }
        .admin-layout { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        @media (min-width: 1024px) { .admin-layout { flex-direction: row; } }
        .admin-sidebar { background: #262626; padding: 15px; display: flex; overflow-x: auto; gap: 10px; }
        @media (min-width: 1024px) { .admin-sidebar { width: 220px; flex-direction: column; } }
        .sidebar-btn { color: #aaa; padding: 12px 15px; cursor: pointer; border-radius: 10px; font-weight: 700; font-size: 0.9rem; white-space: nowrap; }
        .sidebar-btn.active { background: var(--yesil); color: white; }
        .admin-main { flex: 1; padding: 25px; overflow-y: auto; background: #f9f9f9; }
        .admin-card { background: white; padding: 10px 15px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; font-size: 0.9rem; }
        .admin-btn { border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 0.75rem; margin-left: 5px; }

        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-family: inherit; font-size: 0.95rem; box-sizing: border-box; }
        .btn-ok { background: var(--yesil) !important; color: white !important; padding: 15px; width: 100%; border: none; border-radius: 12px; cursor: pointer; font-weight: 900; font-size: 1.1rem; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 6000; justify-content: center; align-items: center; padding: 25px; }
        .modal-box { background: white; padding: 30px; border-radius: 30px; width: 95%; max-width: 350px; position: relative; }
    </style>
</head>
<body>

    <div id="upload-progress-container" style="display:none; position:fixed; top:0; left:0; width:100%; height:8px; background: #eee; z-index: 20000;"><div id="upload-progress-bar" style="width:0%; height:100%; background: var(--yesil); transition: 0.3s;"></div></div>
    <div id="lightbox" onclick="this.style.display='none'"><img id="lb-img" src=""></div>

    <header>
        <div class="club-info"><h1>KÜTAHYA YEŞİLAY FUTBOL OKULU</h1></div>
        <nav>
            <a onclick="showPage('home')">ANASAYFA</a>
            <a onclick="showPage('groups')">GRUPLAR</a>
            <a onclick="showPage('coaches')">HOCALAR</a>
            <a onclick="showPage('contact')">İLETİŞİM / BİZE YAZIN</a>
            <button class="admin-trigger" onclick="openModal('login-modal')">YÖNETİM</button>
        </nav>
    </header>

    <div class="main-content">
        <div id="page-home" class="page active">
            <div class="home-layout">
                <div><h2 class="section-title">ANTRENMANDAN KARELER</h2><div id="p-vit" class="grid-4"></div></div>
                <div class="ann-sidebar">
                    <h3 style="color:var(--yesil); margin-bottom:20px; font-weight:900;">📢 DUYURULAR</h3>
                    <div id="p-ann"></div>
                </div>
            </div>
        </div>

        <div id="page-groups" class="page"><h2 class="section-title">Gruplarımız</h2><div id="p-grp" class="grid-4"></div></div>

        <div id="page-coaches" class="page"><h2 class="section-title">Teknik Kadro</h2><div id="p-hoc" class="grid-4"></div></div>

        <div id="page-contact" class="page">
            <h2 class="section-title">İletişim & Adres</h2>
            <div id="p-con" style="background:white; padding:30px; border-radius:25px; box-shadow:0 8px 20px rgba(0,0,0,0.05); margin-bottom:30px;"></div>
            <div id="p-adr" style="background:#fff; padding:30px; border-radius:25px; border-left:15px solid var(--sari); box-shadow:0 8px 20px rgba(0,0,0,0.05); font-size:1.1rem; line-height:1.6;"></div>
            
            <h2 class="section-title">Bize Yazın</h2>
            <div style="background:white; padding:35px; border-radius:30px; box-shadow:0 12px 35px rgba(0,0,0,0.08); border-top:10px solid var(--sari);">
                <input type="text" id="v-ad" placeholder="Ad Soyad"><input type="tel" id="v-tel" placeholder="Telefon">
                <textarea id="v-mesaj" rows="5" placeholder="Mesajınız buraya yazınız..."></textarea>
                <button class="btn-ok" onclick="sendVeliMsg()">GÖNDER</button>
            </div>
        </div>
    </div>

    <div id="admin-panel">
        <div class="admin-nav"><b>YÖNETİCİ KABİNİ</b><button onclick="location.reload()" style="background:red; color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:900;">ÇIKIŞ</button></div>
        <div class="admin-layout">
            <div class="admin-sidebar" id="sidebar-menu"></div>
            <div id="admin-view-content" class="admin-main"></div>
        </div>
    </div>

    <div id="login-modal" class="modal-overlay" onclick="closeModal('login-modal')">
        <div class="modal-box" style="max-width:350px;" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeModal('login-modal')">&times;</span>
            <h3 style="color:var(--yesil); text-align:center;">Giriş</h3>
            <input type="text" id="u" placeholder="Kullanıcı"><input type="password" id="p" placeholder="Şifre">
            <button class="btn-ok" onclick="tryLogin()">GİRİŞ</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://yesilay-futbol-okulu-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let db = { vitrin: [], gruplar: [], hocalar: [], duyurular: [], iletisim: { rehber: [], adres: "" }, users: [], mesajlar: [] };
        let currentUser = null;

        database.ref('/').on('value', (s) => { 
            if(s.val()) db = s.val(); 
            if(!db.iletisim) db.iletisim = { rehber: [], adres: "" };
            if(!db.users || !db.users.find(u => u.isFounder)) {
                if(!db.users) db.users = [];
                db.users.unshift({u: "ALİ", p: "ALİ43", isFounder: true, perms: {vit:true, grp:true, hoc:true, ann:true, con:true, usr:true}});
                database.ref('/').set(db);
            }
            renderAll();
            if(currentUser) adminTab(document.querySelector('.sidebar-btn.active')?.dataset.tab || 'vitrin', document.querySelector('.sidebar-btn.active'));
        });

        function renderAll() {
            // VİTRİN
            const vGrid = document.getElementById('p-vit'); vGrid.innerHTML = "";
            (db.vitrin || []).forEach(img => { const src = typeof img === 'string' ? img : img.src; vGrid.innerHTML += `<img src="${src}" class="v-img" onclick="openLB('${src}')">`; });
            
            // DUYURULAR (MAX 4)
            const aL = document.getElementById('p-ann'); aL.innerHTML = "";
            const anns = (db.duyurular || []).slice(0,4);
            anns.forEach(a => { aL.innerHTML += `<div class="ann-box"><h4>${a.baslik}</h4><p>${a.metin}</p></div>`; });
            
            // HOCALAR VE GRUPLAR (KİBARLAŞTIRILDI)
            const gG = document.getElementById('p-grp'); gG.innerHTML = "";
            (db.gruplar || []).forEach(g => { gG.innerHTML += `<div class="card" style="cursor:pointer;" onclick="showPage('groups')"><h3>${g.ad}</h3><p style="color:var(--yesil); font-weight:bold;">${g.saat || ''}</p></div>`; });
            
            const hG = document.getElementById('p-hoc'); hG.innerHTML = "";
            (db.hocalar || []).forEach(h => { const src = h.img ? (typeof h.img === 'string' ? h.img : h.img.src) : ""; hG.innerHTML += `<div class="card"><img src="${src}" onclick="openLB('${src}')"><h3>${h.ad}</h3><p>${h.unvan || ''}</p></div>`; });
            
            const cL = document.getElementById('p-con'); cL.innerHTML = "";
            (db.iletisim.rehber || []).forEach(c => { cL.innerHTML += `<p style="font-size:1.1rem; margin:10px 0; border-bottom:1px solid #f0f0f0; padding-bottom:10px;">👤 <b>${c.ad}:</b> <a href="tel:${c.tel}" style="color:var(--yesil); text-decoration:none; font-weight:bold;">${c.tel}</a></p>`; });
            document.getElementById('p-adr').innerHTML = `📍 <b>Okul Adresi:</b><br>${db.iletisim.adres || 'Henüz Eklenmemiş'}`;
        }

        // --- SIKIŞTIRMA VE PANEL FONKSİYONLARI (BOZULMADI) ---
        async function compress(b64) {
            return new Promise(r => {
                const img = new Image(); img.src = b64;
                img.onload = () => {
                    const canvas = document.createElement('canvas'); const m = 1200;
                    let w = img.width, h = img.height;
                    if(w > h) { if(w > m) { h *= m/w; w = m; } } else { if(h > m) { w *= m/h; h = m; } }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, w, h);
                    r(canvas.toDataURL('image/jpeg', 0.75));
                };
            });
        }
        async function runUp(files, cb) {
            const total = files.length; document.getElementById('upload-progress-container').style.display='block';
            for(let i=0; i<total; i++) {
                const b64 = await new Promise(r => { const fr = new FileReader(); fr.onload = e => r(e.target.result); fr.readAsDataURL(files[i]); });
                const comp = await compress(b64); cb(comp); document.getElementById('upload-progress-bar').style.width = ((i+1)/total*100)+'%';
            }
            setTimeout(()=>document.getElementById('upload-progress-container').style.display='none', 1000);
        }

        function adminTab(tab, btn) {
            if(!btn) return;
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
            const v = document.getElementById('admin-view-content'); v.innerHTML = "";
            if(tab === 'vitrin') {
                v.innerHTML = `<h4>Vitrin</h4><input type="file" multiple onchange="upVitBulk(event)"><div id="v-sort" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(110px, 1fr)); gap:12px; margin-top:20px;"></div>`;
                (db.vitrin || []).forEach((img, i) => { const src = typeof img === 'string' ? img : img.src; v.querySelector('#v-sort').innerHTML += `<div class="admin-card" style="flex-direction:column; padding:10px;"><img src="${src}" style="width:100%; height:70px; object-fit:cover;"><button class="admin-btn" style="color:red" onclick="del('vitrin',${i})">Sil</button></div>`; });
            }
            else if(tab === 'anns') {
                v.innerHTML = `<h4>Duyuru Yayınla (Max 4)</h4><button class="btn-ok" style="width:auto; padding:10px 20px;" onclick="addA()">+ Duyuru Ekle</button><div id="a-sort" style="margin-top:20px;"></div>`;
                (db.duyurular || []).forEach((a, i) => { v.querySelector('#a-sort').innerHTML += `<div class="admin-card"><b>${a.baslik}</b><button style="color:red; background:none; border:none; cursor:pointer;" onclick="del('duyurular',${i})">Sil</button></div>`; });
            }
            // DİĞER PANEL SEKMELERİ AYNDEN KORUNDU
        }

        function addA() { const b=prompt("Başlık:"), m=prompt("Mesaj:"); if(b) { if(!db.duyurular) db.duyurular=[]; db.duyurular.unshift({baslik:b, metin:m}); database.ref('/').set(db); } }
        function upVitBulk(e) { runUp(e.target.files, (res) => { if(!db.vitrin) db.vitrin=[]; db.vitrin.unshift({src:res}); database.ref('/').set(db); }); }
        function del(p, i) { if(confirm("Sil?")) { db[p].splice(i,1); database.ref('/').set(db); } }
        function tryLogin() { const u=document.getElementById('u').value.trim().toUpperCase(), p=document.getElementById('p').value.trim(); currentUser = (db.users || []).find(user => user.u.toUpperCase() === u && user.p.toUpperCase() === p); if(currentUser) { buildAdminSidebar(); closeModal('login-modal'); document.getElementById('admin-panel').style.display='flex'; } else alert("Hata!"); }
        function buildAdminSidebar() { 
            const s = document.getElementById('sidebar-menu'); const p = currentUser.perms; s.innerHTML = "";
            if(p.vit) s.innerHTML += `<div class="sidebar-btn" data-tab="vitrin" onclick="adminTab('vitrin', this)">🖼️ Vitrin</div>`;
            if(p.grp) s.innerHTML += `<div class="sidebar-btn" data-tab="groups" onclick="adminTab('groups', this)">⚽ Gruplar</div>`;
            if(p.hoc) s.innerHTML += `<div class="sidebar-btn" data-tab="coaches" onclick="adminTab('coaches', this)">👤 Hocalar</div>`;
            if(p.ann) s.innerHTML += `<div class="sidebar-btn" data-tab="anns" onclick="adminTab('anns', this)">📢 Duyurular</div>`;
            if(p.con) s.innerHTML += `<div class="sidebar-btn" data-tab="contact" onclick="adminTab('contact', this)">📞 İletişim</div>`;
            s.firstChild.click(); 
        }
        function openLB(s) { document.getElementById('lb-img').src = s; document.getElementById('lightbox').style.display = 'flex'; }
        function openModal(id) { document.getElementById(id).style.display='flex'; }
        function closeModal(id) { document.getElementById(id).style.display='none'; }
        function showPage(p) { document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active')); document.getElementById('page-' + p).classList.add('active'); window.scrollTo(0,0); }
        function sendVeliMsg() { alert("Gönderildi."); }
    </script>
</body>
</html>
