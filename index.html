<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kütahya Yeşilay Futbol Okulu | Yönetim</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --yesil: #006a33; --sari: #f1c40f; --dark: #121212; --light: #f8faf9; --beyaz: #ffffff; }
        body, html { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: var(--light); color: #333; overflow-x: hidden; }

        header { background: linear-gradient(135deg, var(--yesil) 0%, #004d26 100%); color: white; padding: 25px 5%; display: flex; flex-direction: column; align-items: center; border-bottom: 7px solid var(--sari); box-shadow: 0 5px 20px rgba(0,0,0,0.4); }
        @media (min-width: 1024px) { header { flex-direction: row; justify-content: space-between; padding: 25px 80px; } }
        .club-info h1 { font-size: 1.6rem; font-weight: 700; text-transform: uppercase; margin: 0; letter-spacing: 2px; }
        
        nav { margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        nav a { color: white; text-decoration: none; font-weight: 600; font-size: 0.85rem; cursor: pointer; text-transform: uppercase; }
        .admin-trigger { background: var(--sari); color: var(--yesil) !important; padding: 6px 12px; border-radius: 8px; font-weight: 700; border: none; cursor: pointer; }

        .main-content { padding: 40px 5%; max-width: 1400px; margin: 0 auto; }
        .page { display: none; }
        .page.active { display: block; }
        .section-title { font-weight: 700; font-size: 1.8rem; color: var(--yesil); border-left: 10px solid var(--sari); padding-left: 15px; text-transform: uppercase; margin-bottom: 30px; }

        /* HOCA VE GRUP KARTLARI */
        .grid-responsive { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        @media (min-width: 1200px) { .hoca-grid { grid-template-columns: repeat(4, 1fr); } }

        .card { background: white; padding: 25px; border-radius: 20px; text-align: center; border-bottom: 5px solid var(--yesil); box-shadow: 0 8px 20px rgba(0,0,0,0.05); cursor: pointer; }
        .card img { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; border: 4px solid var(--yesil); margin-bottom: 15px; }
        .saat-kutu { background: var(--sari); color: var(--yesil); font-size: 0.75rem; font-weight: 700; padding: 4px 10px; border-radius: 15px; margin-top: 10px; display: inline-block; }

        /* İLETİŞİM */
        .contact-container { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 1024px) { .contact-container { grid-template-columns: 1.5fr 1fr; } }
        .contact-box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .write-us { background: var(--yesil); color: white; padding: 30px; border-radius: 20px; text-align: center; }
        .write-us a { background: var(--sari); color: var(--yesil); padding: 10px 20px; border-radius: 10px; display: inline-block; margin-top: 15px; text-decoration: none; font-weight: 700; }

        /* LIGHTBOX */
        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center; }
        #lightbox img { max-width: 90%; max-height: 85vh; border: 3px solid white; border-radius: 10px; }
        .lb-close { position: absolute; top: 30px; right: 30px; color: white; font-size: 30px; cursor: pointer; background: rgba(255,255,255,0.2); width: 50px; height: 50px; display: flex; justify-content: center; align-items: center; border-radius: 50%; }

        /* ADMIN PANEL */
        #admin-panel { display: none; position: fixed; inset: 0; background: #fff; z-index: 5000; flex-direction: column; }
        .admin-sidebar { background: #1a1a1a; padding: 15px; display: flex; overflow-x: auto; gap: 10px; }
        @media (min-width: 1024px) { .admin-sidebar { width: 220px; flex-direction: column; height: 100%; } }
        .sidebar-btn { color: #aaa; padding: 12px; cursor: pointer; border-radius: 8px; font-weight: 600; white-space: nowrap; }
        .sidebar-btn.active { background: var(--yesil); color: white; }
        .admin-main { flex: 1; padding: 30px; overflow-y: auto; background: #f4f6f5; }
        
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        .btn-add { background: var(--yesil); color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; width: 100%; }
    </style>
</head>
<body>

    <div id="lightbox" onclick="this.style.display='none'">
        <span class="lb-close">&times;</span>
        <img id="lb-img" src="" onclick="event.stopPropagation()">
    </div>

    <header>
        <div class="club-info"><h1>Kütahya Yeşilay Futbol Okulu</h1></div>
        <nav>
            <a onclick="showPage('home')">ANASAYFA</a>
            <a onclick="showPage('groups')">GRUPLAR</a>
            <a onclick="showPage('coaches')">HOCALAR</a>
            <a onclick="showPage('contact')">İLETİŞİM</a>
            <button class="admin-trigger" onclick="openModal('login-modal')">YÖNETİM</button>
        </nav>
    </header>

    <div class="main-content">
        <div id="page-home" class="page active">
            <h2 class="section-title">Antrenman Kareleri</h2>
            <div id="public-vitrin" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px;"></div>
        </div>

        <div id="page-groups" class="page">
            <h2 class="section-title">Gruplarımız</h2>
            <div id="public-groups" class="grid-responsive"></div>
        </div>

        <div id="page-coaches" class="page">
            <h2 class="section-title">Teknik Kadro</h2>
            <div id="public-coaches" class="grid-responsive hoca-grid"></div>
        </div>

        <div id="page-contact" class="page">
            <h2 class="section-title">İletişim</h2>
            <div class="contact-container">
                <div class="contact-box" id="contact-info-area"></div>
                <div class="write-us">
                    <h3>BİZE YAZIN</h3>
                    <p id="contact-text-display"></p>
                    <a id="whatsapp-link" href="#" target="_blank">WHATSAPP İLE MESAJ AT</a>
                </div>
            </div>
        </div>
    </div>

    <div id="admin-panel">
        <div style="background:var(--dark); color:white; padding:15px; display:flex; justify-content:space-between; align-items:center;">
            <b>YÖNETİM PANELİ</b>
            <button onclick="location.reload()" style="background:red; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">ÇIKIŞ</button>
        </div>
        <div style="display:flex; flex:1; overflow:hidden; flex-direction: row;" class="admin-body">
            <div class="admin-sidebar" id="sidebar-menu">
                <div class="sidebar-btn" onclick="adminTab('vitrin', this)">🖼️ VİTRİN</div>
                <div class="sidebar-btn" onclick="adminTab('groups', this)">⚽ GRUPLAR</div>
                <div class="sidebar-btn" onclick="adminTab('coaches', this)">👤 HOCALAR</div>
                <div class="sidebar-btn" onclick="adminTab('contact', this)">📞 İLETİŞİM</div>
            </div>
            <div id="admin-view-content" class="admin-main"></div>
        </div>
    </div>

    <div id="login-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:6000; justify-content:center; align-items:center;" onclick="closeModal('login-modal')">
        <div style="background:white; padding:30px; border-radius:20px; width:300px;" onclick="event.stopPropagation()">
            <h3 style="margin:0 0 15px 0; text-align:center;">Giriş</h3>
            <input type="text" id="u" placeholder="Kullanıcı Adı">
            <input type="password" id="p" placeholder="Şifre">
            <button onclick="tryLogin()" class="btn-add">GİRİŞ YAP</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://yesilay-futbol-okulu-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let db = { vitrin: [], gruplar: [], hocalar: [], iletisim: { tel: "", adres: "", wp: "", metin: "" } };

        database.ref('/').on('value', (snapshot) => { if(snapshot.val()) db = snapshot.val(); renderAll(); });
        function syncDB() { database.ref('/').set(db); }

        function compressImage(file, maxWidth = 800) {
            return new Promise((resolve) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image(); img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const scale = maxWidth / img.width;
                        canvas.width = maxWidth; canvas.height = img.height * scale;
                        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                };
            });
        }

        function renderAll() {
            // Vitrin
            const vGrid = document.getElementById('public-vitrin'); vGrid.innerHTML = "";
            (db.vitrin || []).forEach(img => { vGrid.innerHTML += `<img src="${img.src || img}" style="width:100%; height:200px; object-fit:cover; border-radius:15px; cursor:pointer;" onclick="openLB('${img.src || img}')" loading="lazy">`; });

            // Gruplar
            const gGrid = document.getElementById('public-groups'); gGrid.innerHTML = "";
            (db.gruplar || []).forEach(g => {
                const f = (g.fotos || [])[0];
                const src = f ? (f.src || f) : "";
                gGrid.innerHTML += `<div class="card" onclick="openLB('${src}')"><h3>${g.ad}</h3><div class="saat-kutu">${g.saat}</div><br><small>${(g.fotos || []).length} Fotoğraf</small></div>`;
            });

            // Hocalar
            const hGrid = document.getElementById('public-coaches'); hGrid.innerHTML = "";
            (db.hocalar || []).forEach(h => {
                const src = h.img ? (h.img.src || h.img) : "";
                hGrid.innerHTML += `<div class="card" onclick="openLB('${src}')"><img src="${src}"><h3>${h.ad}</h3><p>${h.unvan}</p></div>`;
            });

            // İletişim
            const c = db.iletisim || {};
            document.getElementById('contact-info-area').innerHTML = `<h3>İletişim Bilgileri</h3><p>📍 <b>Adres:</b> ${c.adres || ''}</p><p>📞 <b>Tel:</b> ${c.tel || ''}</p>`;
            document.getElementById('contact-text-display').innerText = c.metin || "";
            document.getElementById('whatsapp-link').href = `https://wa.me/${c.wp}`;
        }

        function adminTab(tab, btn) {
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
            const v = document.getElementById('admin-view-content'); v.innerHTML = "";
            
            if(tab === 'contact') {
                const c = db.iletisim || {};
                v.innerHTML = `<h3>İletişim Ayarları</h3>
                <label>Telefon:</label><input id="adm-tel" value="${c.tel||''}">
                <label>WhatsApp (905...):</label><input id="adm-wp" value="${c.wp||''}">
                <label>Adres:</label><textarea id="adm-adres" rows="3">${c.adres||''}</textarea>
                <label>Bize Yazın Metni:</label><input id="adm-metin" value="${c.metin||''}">
                <button class="btn-add" onclick="saveC()">KAYDET</button>`;
            } else if(tab === 'vitrin') {
                v.innerHTML = `<h3>Vitrin Yönetimi</h3><input type="file" multiple onchange="upV(event)"><div id="v-sort" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(100px, 1fr)); gap:10px; margin-top:20px;"></div>`;
                (db.vitrin || []).forEach((img, i) => {
                    document.getElementById('v-sort').innerHTML += `<div style="position:relative;"><img src="${img.src||img}" style="width:100%; height:80px; object-fit:cover;"><button onclick="delV(${i})" style="position:absolute; top:0; right:0; background:red; color:white; border:none;">X</button></div>`;
                });
            } else if(tab === 'coaches') {
                v.innerHTML = `<h3>Teknik Kadro</h3><button class="btn-add" onclick="addH()">+ Yeni Hoca</button><div id="h-list" style="margin-top:20px;"></div>`;
                (db.hocalar || []).forEach((h, i) => {
                    document.getElementById('h-list').innerHTML += `<div style="background:white; padding:10px; margin-bottom:5px; display:flex; justify-content:space-between; align-items:center;"><span>${h.ad}</span><button onclick="delH(${i})" style="color:red; border:none; background:none; cursor:pointer;">SİL</button></div>`;
                });
            } else if(tab === 'groups') {
                v.innerHTML = `<h3>Gruplar</h3><button class="btn-add" onclick="addG()">+ Yeni Grup</button><div id="g-list" style="margin-top:20px;"></div>`;
                (db.gruplar || []).forEach((g, i) => {
                    document.getElementById('g-list').innerHTML += `<div style="background:white; padding:10px; margin-bottom:5px; display:flex; justify-content:space-between;"><span>${g.ad}</span><div><button onclick="upGImg(${i})">Foto Ekle</button> <button onclick="delG(${i})" style="color:red;">SİL</button></div></div>`;
                });
            }
        }

        // --- YÖNETİM FONKSİYONLARI ---
        function saveC() { db.iletisim = { tel: document.getElementById('adm-tel').value, wp: document.getElementById('adm-wp').value, adres: document.getElementById('adm-adres').value, metin: document.getElementById('adm-metin').value }; syncDB(); alert("Kaydedildi!"); }
        async function upV(e) { for(let f of e.target.files) { const c = await compressImage(f); if(!db.vitrin) db.vitrin=[]; db.vitrin.unshift({src:c}); } syncDB(); adminTab('vitrin', document.querySelector('.sidebar-btn.active')); }
        function delV(i) { db.vitrin.splice(i, 1); syncDB(); adminTab('vitrin', document.querySelector('.sidebar-btn.active')); }
        function addH() { const ad = prompt("Ad:"); if(ad) { const inp=document.createElement('input'); inp.type='file'; inp.onchange=async e=>{ const c=await compressImage(e.target.files[0], 400); if(!db.hocalar) db.hocalar=[]; db.hocalar.push({ad, unvan:"Antrenör", img:{src:c}}); syncDB(); adminTab('coaches', document.querySelector('.sidebar-btn.active')); }; inp.click(); } }
        function delH(i) { if(confirm("Sil?")) { db.hocalar.splice(i, 1); syncDB(); adminTab('coaches', document.querySelector('.sidebar-btn.active')); } }
        function addG() { const ad = prompt("Grup Adı:"), saat = prompt("Saat:"); if(ad) { if(!db.gruplar) db.gruplar=[]; db.gruplar.push({ad, saat, fotos:[]}); syncDB(); adminTab('groups', document.querySelector('.sidebar-btn.active')); } }
        function upGImg(i) { const inp=document.createElement('input'); inp.type='file'; inp.onchange=async e=>{ const c=await compressImage(e.target.files[0]); if(!db.gruplar[i].fotos) db.gruplar[i].fotos=[]; db.gruplar[i].fotos.push({src:c}); syncDB(); alert("Eklendi"); }; inp.click(); }
        function delG(i) { if(confirm("Sil?")) { db.gruplar.splice(i, 1); syncDB(); adminTab('groups', document.querySelector('.sidebar-btn.active')); } }

        function tryLogin() { if(document.getElementById('u').value.toUpperCase()==="ALİ" && document.getElementById('p').value==="ALİ43") { document.getElementById('admin-panel').style.display='flex'; closeModal('login-modal'); adminTab('vitrin', document.querySelector('.sidebar-btn')); } else alert("Hatalı!"); }
        function openLB(s) { if(s){ document.getElementById('lb-img').src=s; document.getElementById('lightbox').style.display='flex'; } }
        function showPage(p) { document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active')); document.getElementById('page-' + p).classList.add('active'); window.scrollTo(0,0); }
        function openModal(id) { document.getElementById(id).style.display='flex'; }
        function closeModal(id) { document.getElementById(id).style.display='none'; }
    </script>
</body>
</html>
