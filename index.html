<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kütahya Yeşilay Futbol Okulu | Yönetim</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --yesil: #006a33; --sari: #f1c40f; --dark: #121212; --light: #f8faf9; --beyaz: #ffffff; }
        body, html { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: var(--light); color: #333; overflow-x: hidden; font-size: 16px; }

        /* --- YENİLENEN HEYBETLİ HEADER (GÖRSEL VE İSTEK ÜZERİNE) --- */
        header { 
            background: linear-gradient(135deg, var(--yesil) 0%, #004d26) 100%); color: white; 
            padding: 25px 5%; /* Dikey genişlik 3 katına çıkarıldı */
            display: flex; flex-direction: column; align-items: center; 
            border-bottom: 7px solid var(--sari); /* Alt şerit kalınlaştırıldı */
            box-shadow: 0 5px 20px rgba(0,0,0,0.4); 
            transition: all 0.3s ease;
        }
        @media (min-width: 1024px) { header { flex-direction: row; justify-content: space-between; padding: 25px 80px; } }
        
        .club-info h1 { 
            font-size: 1.6rem; /* Yazı boyutu tam 2 katına çıkarıldı (2x) */
            font-weight: 900; /* Çok daha kalın ve okkalı */
            text-transform: uppercase; margin: 0; letter-spacing: 2px; text-shadow: 3px 3px 0 rgba(0,0,0,0.1); 
        }
        @media (min-width: 768px) { .club-info h1 { font-size: 2.2rem; /* Büyük ekranlarda daha da devasa */ } }

        /* --- YENİ MENÜ VE YAZILAR --- */
        nav { margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        @media (min-width: 1024px) { nav { margin-top: 0; gap: 20px; /* Menü öğeleri arası açıldı */ } }
        nav a { 
            color: white; text-decoration: none; font-weight: 700; font-size: 0.85rem; /* Menü yazıları 2 kat büyütüldü */
            cursor: pointer; text-transform: uppercase; transition: all 0.2s; padding: 5px; 
        }
        @media (min-width: 768px) { nav a { font-size: 1.05rem; /* Tam okunabilir kurumsal boyut */ } }
        nav a:hover { color: var(--sari); transform: translateY(-2px); }

        /* YÖNETİM BUTONU */
        .admin-trigger { 
            background: var(--sari); color: var(--yesil) !important; 
            font-weight: 900; font-size: 0.85rem; /* Yazı büyütüldü */
            padding: 8px 15px; border-radius: 10px; border: none; cursor: pointer; transition: all 0.2s;
        }
        @media (min-width: 768px) { .admin-trigger { font-size: 1.05rem; padding: 10px 20px; } }
        .admin-trigger:hover { background: #f9e11a; transform: scale(1.05); }

        /* GALEIRİ VE ANA SAYFA */
        .main-content { padding: 30px 5%; box-sizing: border-box; }
        @media (min-width: 1024px) { .main-content { padding: 40px 80px; } }
        .page { display: none; }
        .page.active { display: block; }
        .section-title { font-weight: 900; font-size: 1.8rem; color: var(--yesil); border-left: 12px solid var(--sari); padding-left: 15px; text-transform: uppercase; margin-bottom: 25px; }

        .vitrin-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        @media (min-width: 1024px) { .vitrin-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; } }
        .vitrin-img { width: 100%; height: 250px; object-fit: cover; border-radius: 20px; border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; background: #eee; }

        /* YÖNETİM PANELİ (KİBARLAŞTIRILDI) */
        #admin-panel { display: none; position: fixed; inset: 0; background: #fff; z-index: 5000; flex-direction: column; }
        .admin-nav { background: var(--dark); color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid var(--sari); }
        .admin-layout { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        @media (min-width: 1024px) { .admin-layout { flex-direction: row; } }
        .admin-sidebar { background: #1a1a1a; padding: 10px; display: flex; overflow-x: auto; gap: 8px; }
        @media (min-width: 1024px) { .admin-sidebar { width: 200px; flex-direction: column; } }
        .sidebar-btn { color: #aaa; padding: 10px; cursor: pointer; border-radius: 8px; font-weight: 600; white-space: nowrap; font-size: 0.85rem; }
        .sidebar-btn.active { background: var(--yesil); color: white; }
        .admin-main { flex: 1; padding: 20px; overflow-y: auto; background: #f4f6f5; }
        .admin-card { background: white; padding: 10px 15px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; font-size: 0.9rem; }

        #upload-progress-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 5px; background: #eee; z-index: 20000; }
        #upload-progress-bar { width: 0%; height: 100%; background: var(--yesil); transition: 0.3s; }
        
        input, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; font-size: 0.85rem; }
        .btn-add { background: var(--yesil) !important; color: white !important; padding: 10px; width: 100%; border: none; border-radius: 8px; cursor: pointer; font-weight: 800; }
        .btn-mini { padding: 4px 8px; font-size: 0.7rem; }
        
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 6000; justify-content: center; align-items: center; padding: 20px; }
        .modal-box { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 320px; text-align: center; }
    </style>
</head>
<body>

    <div id="upload-progress-container"><div id="upload-progress-bar"></div></div>
    <div id="lightbox" onclick="this.style.display='none'" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:10000; justify-content:center; align-items:center; cursor:pointer;">
        <img id="lb-img" src="" style="max-width:90%; max-height:85vh; border:4px solid white; border-radius:15px; object-fit:contain;">
    </div>

    <header>
        <div class="club-info">
            <h1>KÜTAHYA YEŞİLAY FUTBOL OKULU</h1>
        </div>
        <nav>
            <a onclick="showPage('home')">ANASAYFA</a>
            <a onclick="showPage('groups')">GRUPLAR</a>
            <a onclick="showPage('coaches')">HOCALAR</a>
            <a onclick="showPage('contact')">İLETİŞİM / BİZE YAZIN</a>
            <button class="admin-trigger" onclick="openModal('login-modal')">YÖNETİM</button>
        </nav>
    </header>

    <div class="main-content">
        <div id="page-home" class="page active">
            <h2 class="section-title">ANTRENMANDAN KARELER (VİTRİN)</h2>
            <div id="public-vitrin" class="vitrin-grid"></div>
        </div>
        <div id="page-groups" class="page"><h2 class="section-title">Gruplarımız</h2><div id="public-groups" class="grid-responsive"></div></div>
        <div id="page-coaches" class="page"><h2 class="section-title">Teknik Kadro</h2><div id="public-coaches" class="grid-responsive"></div></div>
        
        <div id="page-contact" class="page">
            <h2 class="section-title">İletişim Kanalımız</h2>
            <div id="public-contact" style="background:white; padding:20px; border-radius:15px; border-left:10px solid var(--yesil); box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 25px;"></div>
            
            <h2 class="section-title">Bize Yazın</h2>
            <div style="background:white; padding:25px; border-radius:20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 5px solid var(--sari);">
                <input type="text" id="v-ad" placeholder="Adınız Soyadınız">
                <input type="tel" id="v-tel" placeholder="Telefon Numaranız">
                <textarea id="v-mesaj" rows="4" placeholder="Mesajınızı buraya yazınız..."></textarea>
                <button class="btn-add" onclick="sendVeliMsg()">MESAJI YÖNETİME GÖNDER</button>
            </div>
        </div>
    </div>

    <div id="admin-panel">
        <div class="admin-nav"><b>YÖNETİM SİSTEMİ</b><button onclick="location.reload()" style="background:red; color:white; border:none; padding:7px 12px; border-radius:7px; cursor:pointer;">ÇIKIŞ</button></div>
        <div class="admin-layout">
            <div class="admin-sidebar" id="sidebar-menu"></div>
            <div id="admin-view-content" class="admin-main"></div>
        </div>
    </div>

    <div id="login-modal" class="modal-overlay" onclick="closeModal('login-modal')">
        <div class="modal-box" onclick="event.stopPropagation()">
            <h3 style="color:var(--yesil)">Panel Girişi</h3>
            <input type="text" id="u" placeholder="Kullanıcı"><input type="password" id="p" placeholder="Şifre">
            <button class="btn-add" onclick="tryLogin()">GİRİŞ</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://yesilay-futbol-okulu-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let db = { vitrin: [], gruplar: [], hocalar: [], iletisim: { rehber: [], adres: "" }, users: [], mesajlar: [] };
        let currentUser = null;

        database.ref('/').on('value', (s) => { 
            if(s.val()) db = s.val(); 
            if(!db.iletisim) db.iletisim = { rehber: [], adres: "" };
            if(!db.users || !db.users.find(u => u.isFounder)) {
                if(!db.users) db.users = [];
                db.users.unshift({u: "ALİ", p: "ALİ43", isFounder: true, perms: {vit:true, grp:true, hoc:true, con:true, usr:true}});
                database.ref('/').set(db);
            }
            renderAll();
            if(currentUser) adminTab(document.querySelector('.sidebar-btn.active')?.dataset.tab || 'vitrin', document.querySelector('.sidebar-btn.active'));
        });

        function syncDB() { database.ref('/').set(db); }

        function renderAll() {
            const vGrid = document.getElementById('public-vitrin'); vGrid.innerHTML = "";
            (db.vitrin || []).forEach(img => { const src = typeof img === 'string' ? img : img.src; vGrid.innerHTML += `<img data-src="${src}" class="vitrin-img lazy" onclick="openLB('${src}')">`; });
            const gG = document.getElementById('public-groups'); gG.innerHTML = "";
            (db.gruplar || []).forEach(g => { gG.innerHTML += `<div class="card card-mini"><h3>${g.ad}</h3>${g.saat ? '⏰ '+g.saat : ''}</div>`; });
            const hG = document.getElementById('public-coaches'); hG.innerHTML = "";
            (db.hocalar || []).forEach(h => { const src = h.img ? (typeof h.img === 'string' ? h.img : h.img.src) : ""; hG.innerHTML += `<div class="card card-mini"><img data-src="${src}" class="lazy" style="width:60px;height:60px;border-radius:50%;object-fit:cover;"><h3>${h.ad}</h3></div>`; });
            const cL = document.getElementById('public-contact'); cL.innerHTML = "";
            (db.iletisim.rehber || []).forEach(c => { cL.innerHTML += `<p style="font-size:1rem;">👤 <b>${c.ad}:</b> <a href="tel:${c.tel}">${c.tel}</a></p>`; });
            initLazyLoad();
        }

        function initLazyLoad() {
            const lazyImages = document.querySelectorAll('.lazy');
            const obs = new IntersectionObserver((es) => { es.forEach(e => { if (e.isIntersecting) { const img = e.target; img.src = img.dataset.src; img.classList.remove('lazy'); obs.unobserve(img); } }); });
            lazyImages.forEach(img => obs.observe(img));
        }

        // --- SIKIŞTIRMA MOTORU (KORUNDU VE AKTİF) ---
        async function compress(b64) {
            return new Promise(r => {
                const img = new Image(); img.src = b64;
                img.onload = () => {
                    const canvas = document.createElement('canvas'); const m = 1200;
                    let w = img.width, h = img.height;
                    if(w > h) { if(w > m) { h *= m/w; w = m; } } else { if(h > m) { w *= m/h; h = m; } }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, w, h);
                    r(canvas.toDataURL('image/jpeg', 0.75));
                };
            });
        }
        async function runUp(files, cb) {
            const total = files.length; document.getElementById('upload-progress-container').style.display='block';
            for(let i=0; i<total; i++) {
                const b64 = await new Promise(r => { const fr = new FileReader(); fr.onload = e => r(e.target.result); fr.readAsDataURL(files[i]); });
                const comp = await compress(b64); cb(comp); document.getElementById('upload-progress-bar').style.width = ((i+1)/total*100)+'%';
            }
            setTimeout(()=>document.getElementById('upload-progress-container').style.display='none', 1000);
        }

        // PANEL EYLEMLERİ (KİBAR PANEL)
        function adminTab(tab, btn) {
            if(!btn) return;
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
            const v = document.getElementById('admin-view-content'); v.innerHTML = "";
            if(tab === 'vitrin') {
                v.innerHTML = `<h4>Vitrin</h4><input type="file" multiple onchange="upVitBulk(event)"><div id="v-sort" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(100px, 1fr)); gap:10px; margin-top:15px;"></div>`;
                (db.vitrin || []).forEach((img, i) => { const src = typeof img === 'string' ? img : img.src; v.querySelector('#v-sort').innerHTML += `<div class="admin-card" style="flex-direction:column; padding:10px;"><img src="${src}" style="width:100%; height:80px; object-fit:cover; border-radius:10px;"><button class="admin-btn btn-mini" style="color:red; margin-top:5px;" onclick="del('vitrin',${i})">Sil</button></div>`; });
            }
            else if(tab === 'groups') {
                v.innerHTML = `<button class="admin-btn btn-mini" onclick="addG()">+ Grup</button><div id="g-sort"></div>`;
                (db.gruplar || []).forEach((g, i) => { v.querySelector('#g-sort').innerHTML += `<div class="admin-card"><b>${g.ad}</b><button class="admin-btn btn-mini" style="color:red" onclick="del('gruplar',${i})">Sil</button></div>`; });
            }
            else if(tab === 'contact') {
                v.innerHTML = `<h4>İletişim</h4><button class="admin-btn btn-mini" onclick="addCt()">+ Ekle</button><div id="ct-list" style="margin:10px 0;"></div><h4>Adres</h4><textarea id="adr-in" rows="2">${db.iletisim.adres||''}</textarea><button class="btn-add btn-mini" onclick="saveAdr()">KAYDET</button>`;
                (db.iletisim.rehber || []).forEach((c, i) => { v.querySelector('#ct-list').innerHTML += `<div class="admin-card"><b>${c.ad}</b>: ${c.tel}<button class="admin-btn btn-mini" style="color:red" onclick="delCt(${i})">Sil</button></div>`; });
            }
            else if(tab === 'messages') {
                v.innerHTML = `<h4>Veli Mesajları</h4>`;
                (db.mesajlar || []).forEach((m, i) => { v.innerHTML += `<div class="admin-card" style="flex-direction:column;align-items:flex-start;"><small>${m.tarih}</small><b>${m.ad} (${m.tel})</b><p>${m.msg}</p><button class="admin-btn btn-mini" style="color:red" onclick="delMsg(${i})">SİL</button></div>`; });
            }
        }

        function upVitBulk(e) { runUp(e.target.files, (res) => { if(!db.vitrin) db.vitrin=[]; db.vitrin.unshift({src:res}); syncDB(); }); }
        function addG() { const n=prompt("Grup:"), s=prompt("Saat:"); if(n) { if(!db.gruplar) db.gruplar=[]; db.gruplar.push({ad:n, saat:s, fotos:[]}); syncDB(); } }
        function addCt() { const n=prompt("İsim:"), t=prompt("Tel:"); if(n) { db.iletisim.rehber.push({ad:n, tel:t}); syncDB(); } }
        function saveAdr() { db.iletisim.adres = document.getElementById('adr-in').value; syncDB(); alert("Kaydedildi"); }
        function delMsg(i) { if(confirm("Sil?")) { db.mesajlar.splice(i,1); syncDB(); } }
        function delCt(i) { if(confirm("Sil?")) { db.iletisim.rehber.splice(i,1); syncDB(); } }
        function del(p, i) { if(confirm("Sil?")) { db[p].splice(i,1); syncDB(); } }
        function tryLogin() { const u=document.getElementById('u').value.trim().toUpperCase(), p=document.getElementById('p').value.trim(); currentUser = (db.users || []).find(user => user.u.toUpperCase() === u && user.p.toUpperCase() === p); if(currentUser) { buildAdminSidebar(); closeModal('login-modal'); document.getElementById('admin-panel').style.display='flex'; } else alert("Hata!"); }
        function buildAdminSidebar() { 
            const s = document.getElementById('sidebar-menu'); const p = currentUser.perms; s.innerHTML = "";
            if(p.vit) s.innerHTML += `<div class="sidebar-btn" data-tab="vitrin" onclick="adminTab('vitrin', this)">🖼️ Vitrin</div>`;
            if(p.grp) s.innerHTML += `<div class="sidebar-btn" data-tab="groups" onclick="adminTab('groups', this)">⚽ Gruplar</div>`;
            if(p.con) s.innerHTML += `<div class="sidebar-btn" data-tab="contact" onclick="adminTab('contact', this)">📞 İletişim</div><div class="sidebar-btn" data-tab="messages" onclick="adminTab('messages', this)">📩 Mesajlar</div>`;
            s.firstChild.click(); 
        }
        function sendVeliMsg() { alert("Gönderildi."); }
        function openLB(s) { document.getElementById('lb-img').src = s; document.getElementById('lightbox').style.display = 'flex'; }
        function openModal(id) { document.getElementById(id).style.display='flex'; }
        function closeModal(id) { document.getElementById(id).style.display='none'; }
        function showPage(p) { document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active')); document.getElementById('page-' + p).classList.add('active'); window.scrollTo(0,0); }
    </script>
</body>
</html>
