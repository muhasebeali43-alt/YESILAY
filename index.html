<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kütahya Yeşilay Futbol Okulu | Yönetim</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --yesil: #006a33; --sari: #f1c40f; --dark: #121212; --light: #f8faf9; --beyaz: #ffffff; }
        body, html { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: var(--light); color: #333; overflow-x: hidden; }

        header { background: linear-gradient(135deg, var(--yesil) 0%, #004d26 100%); color: white; padding: 20px 5%; display: flex; flex-direction: column; align-items: center; border-bottom: 7px solid var(--sari); box-shadow: 0 5px 20px rgba(0,0,0,0.4); }
        @media (min-width: 1024px) { header { flex-direction: row; justify-content: space-between; padding: 20px 80px; } }
        .club-info h1 { font-size: 1.5rem; font-weight: 900; text-transform: uppercase; margin: 0; letter-spacing: 2px; }
        
        nav { margin-top: 15px; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        nav a { color: white; text-decoration: none; font-weight: 700; font-size: 0.85rem; cursor: pointer; text-transform: uppercase; }
        .admin-trigger { background: var(--sari); color: var(--yesil) !important; padding: 6px 12px; border-radius: 8px; font-weight: 900; border: none; cursor: pointer; }

        /* ANA SAYFA: YAN YANA 4'LÜ GALERİ */
        .vitrin-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        @media (min-width: 768px) { .vitrin-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1024px) { .vitrin-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; } }
        .vitrin-img { width: 100%; height: 250px; object-fit: cover; border-radius: 20px; border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; background: #eee; }

        .main-content { padding: 30px 5%; box-sizing: border-box; }
        @media (min-width: 1024px) { .main-content { padding: 40px 80px; } }
        .page { display: none; }
        .page.active { display: block; }
        .section-title { font-weight: 900; font-size: 1.8rem; color: var(--yesil); border-left: 10px solid var(--sari); padding-left: 15px; text-transform: uppercase; margin-bottom: 25px; }

        .home-layout { display: flex; flex-direction: column; gap: 30px; }
        @media (min-width: 1024px) { .home-layout { display: grid; grid-template-columns: 3fr 1.2fr; gap: 40px; } }
        .ann-sidebar { background: white; padding: 20px; border-radius: 25px; border-top: 8px solid var(--sari); box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .ann-box { background: #fafafa; padding: 15px; border-radius: 15px; margin-bottom: 15px; border-left: 5px solid var(--yesil); }

        .grid-responsive { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; padding: 25px 15px; border-radius: 25px; text-align: center; border-bottom: 5px solid var(--yesil); box-shadow: 0 8px 20px rgba(0,0,0,0.04); cursor: pointer; }
        .card img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid var(--yesil); margin-bottom: 10px; }

        /* YÖNETİM PANELİ */
        #admin-panel { display: none; position: fixed; inset: 0; background: #fff; z-index: 5000; flex-direction: column; }
        .admin-nav { background: var(--dark); color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid var(--sari); }
        .admin-layout { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        @media (min-width: 1024px) { .admin-layout { flex-direction: row; } }
        .admin-sidebar { background: #1a1a1a; padding: 15px; display: flex; overflow-x: auto; gap: 10px; }
        @media (min-width: 1024px) { .admin-sidebar { width: 240px; flex-direction: column; } }
        .sidebar-btn { color: #aaa; padding: 12px; cursor: pointer; border-radius: 10px; font-weight: 700; white-space: nowrap; }
        .sidebar-btn.active { background: var(--yesil); color: white; }
        .admin-main { flex: 1; padding: 25px; overflow-y: auto; background: #f4f6f5; }
        .admin-card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .admin-btn { border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: 700; margin-left: 5px; font-family: inherit; font-size: 0.8rem; }

        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-family: inherit; }
        .btn-add { background: var(--yesil) !important; color: white !important; padding: 12px; width: 100%; border: none; border-radius: 10px; cursor: pointer; font-weight: 800; }
        .pos-btn { padding: 4px 8px; font-size: 0.7rem; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; margin: 2px; background: white; }
        .pos-btn.active { background: var(--yesil); color: white; border-color: var(--yesil); }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 6000; justify-content: center; align-items: center; padding: 20px; }
        .modal-box { background: white; padding: 30px; border-radius: 25px; width: 100%; max-width: 450px; text-align: center; max-height: 90vh; overflow-y: auto; }
        .msg-box { background: white; padding: 20px; border-radius: 20px; border-left: 10px solid var(--sari); margin-bottom: 15px; position: relative; text-align: left; }
    </style>
</head>
<body>

    <div id="upload-progress-container" style="display:none; position:fixed; top:0; left:0; width:100%; height:5px; background: #eee; z-index: 20000;"><div id="upload-progress-bar" style="width:0%; height:100%; background: var(--yesil); transition: 0.3s;"></div></div>

    <div id="lightbox" onclick="this.style.display='none'" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:10000; justify-content:center; align-items:center; cursor:pointer;">
        <img id="lb-img" src="" style="max-width:90%; max-height:85vh; border:4px solid white; border-radius:15px; object-fit:contain;">
    </div>

    <header>
        <div class="club-info"><h1>Kütahya Yeşilay Futbol Okulu</h1></div>
        <nav>
            <a onclick="showPage('home')">ANASAYFA</a>
            <a onclick="showPage('groups')">GRUPLAR</a>
            <a onclick="showPage('coaches')">HOCALAR</a>
            <a onclick="showPage('contact')">İLETİŞİM / BİZE YAZIN</a>
            <button class="admin-trigger" onclick="openModal('login-modal')">YÖNETİM</button>
        </nav>
    </header>

    <div class="main-content">
        <div id="page-home" class="page active">
            <div class="home-layout">
                <div>
                    <h2 class="section-title">ANTRENMANDAN KARELER</h2>
                    <div id="public-vitrin" class="vitrin-grid"></div>
                </div>
                <div class="ann-sidebar"><h3 style="color:var(--yesil); margin:0 0 15px 0;">📢 DUYURULAR</h3><div id="public-anns"></div></div>
            </div>
        </div>
        <div id="page-groups" class="page"><h2 class="section-title">Gruplarımız</h2><div id="public-groups" class="grid-responsive"></div></div>
        <div id="page-coaches" class="page"><h2 class="section-title">Teknik Kadro</h2><div id="public-coaches" class="grid-responsive"></div></div>
        <div id="page-contact" class="page">
            <h2 class="section-title">İletişim & Bize Yazın</h2>
            <div id="public-contact" style="background:white; padding:35px; border-radius:30px; border-left:20px solid var(--yesil); margin-bottom: 40px;"></div>
            <div style="background:white; padding:35px; border-radius:30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 10px solid var(--sari);">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px;">
                    <input type="text" id="v-ad" placeholder="Adınız Soyadınız">
                    <input type="tel" id="v-tel" placeholder="Telefon Numaranız">
                </div>
                <textarea id="v-mesaj" rows="5" placeholder="Mesajınızı buraya yazınız..."></textarea>
                <button class="btn-add" onclick="sendVeliMsg()">MESAJI YÖNETİME GÖNDER</button>
            </div>
        </div>
    </div>

    <div id="admin-panel">
        <div class="admin-nav"><b>YÖNETİM SİSTEMİ</b><button onclick="location.reload()" style="background:red; color:white; border:none; padding:7px 12px; border-radius:7px; cursor:pointer;">ÇIKIŞ</button></div>
        <div class="admin-layout">
            <div class="admin-sidebar" id="sidebar-menu"></div>
            <div id="admin-view-content" class="admin-main"></div>
        </div>
    </div>

    <div id="login-modal" class="modal-overlay" onclick="closeModal('login-modal')">
        <div class="modal-box" style="max-width:320px;" onclick="event.stopPropagation()">
            <h3 style="color:var(--yesil)">Giriş</h3>
            <input type="text" id="u" placeholder="Kullanıcı"><input type="password" id="p" placeholder="Şifre">
            <button class="btn-add" onclick="tryLogin()">GİRİŞ</button>
        </div>
    </div>

    <div id="user-modal" class="modal-overlay" onclick="closeModal('user-modal')">
        <div class="modal-box" onclick="event.stopPropagation()">
            <h3 id="user-modal-title">Yetkili Ayarları</h3>
            <input type="text" id="new-u" placeholder="Kullanıcı"><input type="password" id="new-p" placeholder="Şifre">
            <div id="perm-container" style="text-align:left; margin:10px 0;">
                <b>Yetkiler:</b><br>
                <label><input type="checkbox" id="p-vit"> Vitrin</label><br>
                <label><input type="checkbox" id="p-grp"> Gruplar</label><br>
                <label><input type="checkbox" id="p-hoc"> Hocalar</label><br>
                <label><input type="checkbox" id="p-ann"> Duyurular</label><br>
                <label><input type="checkbox" id="p-con"> İletişim</label>
            </div>
            <button class="btn-add" onclick="saveUser()">KAYDET</button>
        </div>
    </div>

    <div id="group-photo-modal" class="modal-overlay" onclick="closeModal('group-photo-modal')">
        <div class="modal-box" style="max-width:750px;" onclick="event.stopPropagation()">
            <h3 id="gp-title">Albüm</h3><input type="file" multiple onchange="upGroupBulk(event)">
            <div id="gp-list" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(130px, 1fr)); gap:12px; margin-top:20px;"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://yesilay-futbol-okulu-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let db = { vitrin: [], gruplar: [], hocalar: [], duyurular: [], iletisim: [], users: [], mesajlar: [] };
        let currentUser = null, editingUserIdx = null;

        database.ref('/').on('value', (s) => { 
            if(s.val()) db = s.val(); 
            if(!db.users || !db.users.find(u => u.isFounder)) {
                if(!db.users) db.users = [];
                db.users.unshift({u: "ALİ", p: "ALİ43", isFounder: true, perms: {vit:true, grp:true, hoc:true, ann:true, con:true, usr:true}});
                database.ref('/').set(db);
            }
            renderAll();
            if(currentUser) adminTab(document.querySelector('.sidebar-btn.active')?.dataset.tab || 'vitrin', document.querySelector('.sidebar-btn.active'));
        });

        function syncDB() { database.ref('/').set(db); }

        function renderAll() {
            const vGrid = document.getElementById('public-vitrin'); vGrid.innerHTML = "";
            (db.vitrin || []).forEach(img => { const src = typeof img === 'string' ? img : img.src; const pos = typeof img === 'string' ? 'center' : (img.pos || 'center'); vGrid.innerHTML += `<img data-src="${src}" class="vitrin-img lazy" style="object-position:${pos}" onclick="openLB('${src}')">`; });
            const aL = document.getElementById('public-anns'); aL.innerHTML = "";
            (db.duyurular || []).forEach(a => { aL.innerHTML += `<div class="ann-box"><h4>${a.baslik}</h4><p>${a.metin}</p></div>`; });
            const gG = document.getElementById('public-groups'); gG.innerHTML = "";
            (db.gruplar || []).forEach(g => { const f = (g.fotos || [])[0]; const src = f ? (typeof f === 'string' ? f : f.src) : ''; gG.innerHTML += `<div class="card" onclick="showPage('groups')"><h3>${g.ad}</h3>${g.saat ? '⏰ '+g.saat : ''}</div>`; });
            const hG = document.getElementById('public-coaches'); hG.innerHTML = "";
            (db.hocalar || []).forEach(h => { const src = h.img ? (typeof h.img === 'string' ? h.img : h.img.src) : ""; const pos = h.img ? (typeof h.img === 'string' ? 'center' : (h.img.pos || 'center')) : 'center'; hG.innerHTML += `<div class="card"><img data-src="${src}" class="lazy" style="object-position:${pos}"><h3>${h.ad}</h3><p>${h.unvan}</p></div>`; });
            const cA = document.getElementById('public-contact'); cA.innerHTML = "";
            (db.iletisim || []).forEach(c => { cA.innerHTML += `<div style="border-bottom:1px solid #eee; padding:15px 0;">👤 <b>${c.ad}:</b> <a href="tel:${c.tel}">${c.tel}</a>${c.adres ? '<br>📍 '+c.adres : ''}</div>`; });
            initLazyLoad();
        }

        function initLazyLoad() {
            const lazyImages = document.querySelectorAll('.lazy');
            const obs = new IntersectionObserver((es) => { es.forEach(e => { if (e.isIntersecting) { const img = e.target; img.src = img.dataset.src; img.classList.remove('lazy'); obs.unobserve(img); } }); });
            lazyImages.forEach(img => obs.observe(img));
        }

        async function compress(b64) {
            return new Promise(r => {
                const img = new Image(); img.src = b64;
                img.onload = () => {
                    const canvas = document.createElement('canvas'); const m = 1200;
                    let w = img.width, h = img.height;
                    if(w > h) { if(w > m) { h *= m/w; w = m; } } else { if(h > m) { w *= m/h; h = m; } }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, w, h);
                    r(canvas.toDataURL('image/jpeg', 0.7));
                };
            });
        }
        async function runUp(files, cb) {
            const total = files.length; document.getElementById('upload-progress-container').style.display='block';
            for(let i=0; i<total; i++) {
                const b64 = await new Promise(r => { const fr = new FileReader(); fr.onload = e => r(e.target.result); fr.readAsDataURL(files[i]); });
                const comp = await compress(b64); cb(comp);
                document.getElementById('upload-progress-bar').style.width = ((i+1)/total*100)+'%';
            }
            setTimeout(()=>document.getElementById('upload-progress-container').style.display='none', 1500);
        }

        function adminTab(tab, btn) {
            if(!btn) return;
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
            const v = document.getElementById('admin-view-content'); v.innerHTML = "";
            
            if(tab === 'vitrin') {
                v.innerHTML = `<input type="file" multiple onchange="upVitBulk(event)"><div id="v-sort" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(140px, 1fr)); gap:15px; margin-top:20px;"></div>`;
                const c = document.getElementById('v-sort');
                (db.vitrin || []).forEach((img, i) => {
                    const src = typeof img === 'string' ? img : img.src; const pos = typeof img === 'string' ? 'center' : (img.pos || 'center');
                    c.innerHTML += `<div class="admin-card" data-id="${i}" style="flex-direction:column; cursor:move; padding:10px;"><img src="${src}" style="width:100%; height:100px; object-fit:cover; object-position:${pos}; border-radius:10px;"><div><button class="pos-btn ${pos==='top'?'active':''}" onclick="setVPos(${i},'top')">Ü</button><button class="pos-btn ${pos==='center'?'active':''}" onclick="setVPos(${i},'center')">O</button><button class="pos-btn ${pos==='bottom'?'active':''}" onclick="setVPos(${i},'bottom')">A</button><button class="admin-btn" style="color:red; font-size:0.7rem;" onclick="delVit(${i})">Sil</button></div></div>`;
                });
                new Sortable(c, { animation: 150, onEnd: () => { db.vitrin = Array.from(c.children).map(el => db.vitrin[el.dataset.id]); syncDB(); }});
            }
            else if(tab === 'groups') {
                v.innerHTML = `<button class="btn-add" onclick="addG()">+ Yeni Grup</button><div id="g-sort" style="margin-top:20px;"></div>`;
                const c = document.getElementById('g-sort');
                (db.gruplar || []).forEach((g, i) => { c.innerHTML += `<div class="admin-card" data-id="${i}" style="cursor:move;"><b>${g.ad}</b> (${g.saat || 'Saat Yok'})<div><button class="admin-btn" onclick="editG(${i})">Düzenle</button><button class="admin-btn" onclick="openGPhotos(${i})">Albüm</button><button class="admin-btn" style="color:red;" onclick="del('gruplar',${i})">Sil</button></div></div>`; });
                new Sortable(c, { animation: 150, onEnd: () => { db.gruplar = Array.from(c.children).map(el => db.gruplar[el.dataset.id]); syncDB(); }});
            }
            else if(tab === 'coaches') {
                v.innerHTML = `<button class="btn-add" onclick="addC()">+ Yeni Hoca</button><div id="c-sort" style="margin-top:20px;"></div>`;
                const c = document.getElementById('c-sort');
                (db.hocalar || []).forEach((h, i) => { 
                    const src = h.img ? (typeof h.img === 'string' ? h.img : h.img.src) : ""; const pos = h.img ? (typeof h.img === 'string' ? 'center' : (h.img.pos || 'center')) : 'center';
                    c.innerHTML += `<div class="admin-card" data-id="${i}" style="cursor:move;"><div style="display:flex; align-items:center; gap:10px;"><img src="${src}" style="width:40px; height:40px; border-radius:50%; object-fit:cover; object-position:${pos}; border:2px solid #ddd;"><b>${h.ad}</b></div><div><button class="pos-btn ${pos==='top'?'active':''}" onclick="setHPos(${i},'top')">Ü</button><button class="pos-btn ${pos==='center'?'active':''}" onclick="setHPos(${i},'center')">O</button><button class="pos-btn ${pos==='bottom'?'active':''}" onclick="setHPos(${i},'bottom')">A</button><button class="admin-btn" onclick="editC(${i})">Düzenle</button><button class="admin-btn" onclick="upHImg(${i})">Foto</button><button class="admin-btn" style="color:red;" onclick="del('hocalar',${i})">Sil</button></div></div>`; 
                });
                new Sortable(c, { animation: 150, onEnd: () => { db.hocalar = Array.from(c.children).map(el => db.hocalar[el.dataset.id]); syncDB(); }});
            }
            else if(tab === 'anns') {
                v.innerHTML = `<button class="btn-add" onclick="addA()">+ Yeni Duyuru</button><div id="a-sort" style="margin-top:20px;"></div>`;
                const c = document.getElementById('a-sort');
                (db.duyurular || []).forEach((a, i) => { c.innerHTML += `<div class="admin-card" data-id="${i}" style="cursor:move;"><b>${a.baslik}</b><button class="admin-btn" style="color:red;" onclick="del('duyurular',${i})">Sil</button></div>`; });
                new Sortable(c, { animation: 150, onEnd: () => { db.duyurular = Array.from(c.children).map(el => db.duyurular[el.dataset.id]); syncDB(); }});
            }
            else if(tab === 'contact') {
                v.innerHTML = `<button class="btn-add" onclick="addCt()">+ İletişim Ekle</button><div id="ct-list" style="margin-top:20px;"></div>`;
                (db.iletisim || []).forEach((c, i) => { document.getElementById('ct-list').innerHTML += `<div class="admin-card"><b>${c.ad}</b><div><button class="admin-btn" onclick="editCt(${i})">Düzenle</button><button class="admin-btn" style="color:red;" onclick="del('iletisim',${i})">Sil</button></div></div>`; });
            }
            else if(tab === 'messages') {
                v.innerHTML = `<h2>Gelen Mesajlar</h2>`;
                (db.mesajlar || []).forEach((m, i) => { v.innerHTML += `<div class="msg-box"><small>${m.tarih}</small><br><b>${m.ad}</b> - ${m.tel}<p>${m.msg}</p><button class="admin-btn" style="color:red; font-size:0.7rem;" onclick="delMsg(${i})">SİL</button></div>`; });
            }
            else if(tab === 'users') {
                v.innerHTML = `<button class="btn-add" onclick="openUserModal()">+ Yetkili Ekle</button><div id="u-list" style="margin-top:20px;"></div>`;
                (db.users || []).forEach((u, i) => { v.innerHTML += `<div class="admin-card"><b>${u.u} ${u.isFounder?'(K)':''}</b><button class="admin-btn" onclick="openUserModal(${i})">Düzenle</button>${u.isFounder?'':`<button class="admin-btn" style="color:red;" onclick="del('users',${i})">Sil</button>`}</div>`; });
            }
        }

        // PANEL EYLEMLERİ
        function setVPos(i, p) { if(typeof db.vitrin[i]==='string') db.vitrin[i]={src:db.vitrin[i], pos:p}; else db.vitrin[i].pos=p; syncDB(); }
        function setHPos(i, p) { if(typeof db.hocalar[i].img==='string') db.hocalar[i].img={src:db.hocalar[i].img, pos:p}; else db.hocalar[i].img.pos=p; syncDB(); }
        function setGPos(idx, p) { if(typeof db.gruplar[curG].fotos[idx]==='string') db.gruplar[curG].fotos[idx]={src:db.gruplar[curG].fotos[idx], pos:p}; else db.gruplar[curG].fotos[idx].pos=p; syncDB(); renderGP(); }
        function upVitBulk(e) { runUp(e.target.files, (res) => { if(!db.vitrin) db.vitrin=[]; db.vitrin.unshift({src:res, pos:'center'}); syncDB(); }); }
        function upGroupBulk(e) { runUp(e.target.files, (res) => { if(!db.gruplar[curG].fotos) db.gruplar[curG].fotos=[]; db.gruplar[curG].fotos.unshift({src:res, pos:'center'}); syncDB(); renderGP(); }); }
        function upHImg(i) { const inp=document.createElement('input'); inp.type='file'; inp.onchange=e=>{ runUp(e.target.files, (res) => { db.hocalar[i].img={src:res, pos:'center'}; syncDB(); }); }; inp.click(); }
        function addG() { const n=prompt("Grup:"), s=prompt("Saat:"); if(n) { db.gruplar.push({ad:n, saat:s, fotos:[]}); syncDB(); } }
        function editG(i) { const n=prompt("Grup:", db.gruplar[i].ad), s=prompt("Saat:", db.gruplar[i].saat); if(n) { db.gruplar[i].ad=n; db.gruplar[i].saat=s; syncDB(); } }
        function addC() { const n=prompt("Hoca:"), u=prompt("Unvan:"); if(n) { db.hocalar.push({ad:n, unvan:u, img:""}); syncDB(); } }
        function editC(i) { const n=prompt("Hoca:", db.hocalar[i].ad), u=prompt("Unvan:", db.hocalar[i].unvan); if(n) { db.hocalar[i].ad=n; db.hocalar[i].unvan=u; syncDB(); } }
        function addA() { const b=prompt("Başlık:"), m=prompt("Mesaj:"); if(b) { db.duyurular.unshift({baslik:b, metin:m}); syncDB(); } }
        function addCt() { const n=prompt("İsim:"), t=prompt("Tel:"), a=prompt("Adres:"); if(n) { db.iletisim.push({ad:n, tel:t, adres:a}); syncDB(); } }
        function editCt(i) { const n=prompt("İsim:", db.iletisim[i].ad), t=prompt("Tel:", db.iletisim[i].tel), a=prompt("Adres:", db.iletisim[i].adres); if(n) { db.iletisim[i]={ad:n, tel:t, adres:a}; syncDB(); } }
        
        let curG = null; function openGPhotos(i) { curG=i; document.getElementById('gp-title').innerText=db.gruplar[i].ad; openModal('group-photo-modal'); renderGP(); }
        function renderGP() {
            const c = document.getElementById('gp-list'); c.innerHTML = "";
            (db.gruplar[curG].fotos || []).forEach((img, idx) => {
                const src = typeof img === 'string' ? img : img.src; const pos = typeof img === 'string' ? 'center' : (img.pos || 'center');
                c.innerHTML += `<div data-id="${idx}" style="position:relative; background:#eee; padding:5px; border-radius:10px; text-align:center;"><img src="${src}" style="width:100%; height:80px; object-fit:cover; object-position:${pos}; border-radius:8px;"><div style="margin-top:3px;"><button class="pos-btn ${pos==='top'?'active':''}" onclick="setGPos(${idx},'top')">Ü</button><button class="pos-btn ${pos==='center'?'active':''}" onclick="setGPos(${idx},'center')">O</button><button class="pos-btn ${pos==='bottom'?'active':''}" onclick="setGPos(${idx},'bottom')">A</button><button onclick="delGP(${idx})" style="background:red; color:white; border:none; border-radius:50%; width:20px; height:20px; cursor:pointer;">&times;</button></div></div>`;
            });
            new Sortable(c, { animation: 150, onEnd: () => { db.gruplar[curG].fotos = Array.from(c.children).map(el => db.gruplar[curG].fotos[el.dataset.id]); syncDB(); }});
        }

        // TEMEL FONKSİYONLAR
        function tryLogin() { const u = document.getElementById('u').value.trim().toUpperCase(), p = document.getElementById('p').value.trim().toUpperCase(); currentUser = (db.users || []).find(user => user.u.toUpperCase() === u && user.p.toUpperCase() === p); if(currentUser) { closeModal('login-modal'); buildAdminSidebar(); document.getElementById('admin-panel').style.display='flex'; } else alert("Hata!"); }
        function buildAdminSidebar() { const s = document.getElementById('sidebar-menu'); s.innerHTML = ""; const p = currentUser.perms; if(p.vit) s.innerHTML += `<div class="sidebar-btn" data-tab="vitrin" onclick="adminTab('vitrin', this)">🖼️ VİTRİN</div>`; if(p.grp) s.innerHTML += `<div class="sidebar-btn" data-tab="groups" onclick="adminTab('groups', this)">⚽ GRUPLAR</div>`; if(p.hoc) s.innerHTML += `<div class="sidebar-btn" data-tab="coaches" onclick="adminTab('coaches', this)">👤 HOCALAR</div>`; if(p.ann) s.innerHTML += `<div class="sidebar-btn" data-tab="anns" onclick="adminTab('anns', this)">📢 DUYURULAR</div>`; if(p.con) { s.innerHTML += `<div class="sidebar-btn" data-tab="contact" onclick="adminTab('contact', this)">📞 İLETİŞİM</div>`; s.innerHTML += `<div class="sidebar-btn" data-tab="messages" onclick="adminTab('messages', this)" style="background:var(--sari); color:var(--yesil)">📩 MESAJLAR</div>`; } if(p.usr) s.innerHTML += `<div class="sidebar-btn" data-tab="users" onclick="adminTab('users', this)" style="color:var(--sari)">🔑 YETKİLİLER</div>`; if(s.firstChild) s.firstChild.click(); }
        function openUserModal(idx = null) { editingUserIdx = idx; const u = idx !== null ? db.users[idx] : null; document.getElementById('new-u').value = u ? u.u : ""; document.getElementById('new-p').value = u ? u.p : ""; document.getElementById('perm-container').style.display = (u && u.isFounder) ? "none" : "block"; if(u && !u.isFounder) { document.getElementById('p-vit').checked = u.perms.vit; document.getElementById('p-grp').checked = u.perms.grp; document.getElementById('p-hoc').checked = u.perms.hoc; document.getElementById('p-ann').checked = u.perms.ann; document.getElementById('p-con').checked = u.perms.con; } openModal('user-modal'); }
        function saveUser() { const u = document.getElementById('new-u').value.trim(), p = document.getElementById('new-p').value.trim(); if(!u || !p) return alert("Hata!"); let perms = { vit:document.getElementById('p-vit').checked, grp:document.getElementById('p-grp').checked, hoc:document.getElementById('p-hoc').checked, ann:document.getElementById('p-ann').checked, con:document.getElementById('p-con').checked, usr:false }; if(editingUserIdx !== null) { const f = db.users[editingUserIdx].isFounder; db.users[editingUserIdx] = {u, p, perms: f ? {vit:true,grp:true,hoc:true,ann:true,con:true,usr:true} : perms, isFounder: f}; } else { db.users.push({u, p, perms, isFounder:false}); } syncDB(); closeModal('user-modal'); }
        function sendVeliMsg() { const ad = document.getElementById('v-ad').value, tel = document.getElementById('v-tel').value, msg = document.getElementById('v-mesaj').value; if(!ad || !msg) return alert("Hata!"); if(!db.mesajlar) db.mesajlar = []; db.mesajlar.unshift({ad, tel, msg, tarih: new Date().toLocaleString()}); syncDB(); alert("İletildi."); }
        function openLB(s) { document.getElementById('lb-img').src=s; document.getElementById('lightbox').style.display='flex'; }
        function openModal(id) { document.getElementById(id).style.display='flex'; }
        function closeModal(id) { document.getElementById(id).style.display='none'; }
        function showPage(p) { document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active')); document.getElementById('page-' + p).classList.add('active'); window.scrollTo(0,0); }
        function delVit(i) { if(confirm("Sil?")) { db.vitrin.splice(i, 1); syncDB(); } }
        function delGP(i) { db.gruplar[curG].fotos.splice(i, 1); syncDB(); renderGP(); }
        function delMsg(i) { if(confirm("Sil?")) { db.mesajlar.splice(i, 1); syncDB(); } }
        function del(p, i) { if(confirm("Sil?")) { db[p].splice(i, 1); syncDB(); } }
    </script>
</body>
</html>
